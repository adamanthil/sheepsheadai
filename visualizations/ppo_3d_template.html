<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sheepshead PPO — 3D Architecture</title>
<style>
  :root {
    --bg: #05070f;
    --panel: rgba(15, 21, 48, 0.78);
    --line: #2a3470;
    --text: #e6ecff;
    --muted: #8e9bd1;
    --accent: #7cc4ff;
    --accent-2: #b58bff;
    --pulse: #fffa9e;
    --good: #80ed99;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.45;
  }
  canvas { display: block; }
  #ui-top {
    position: fixed; top: 14px; left: 14px; right: 14px;
    z-index: 20;
    display: flex; gap: 14px; align-items: center; pointer-events: none;
    flex-wrap: wrap;
  }
  .panel {
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    pointer-events: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  #title { font-size: 15px; font-weight: 600; }
  #title .sub { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .controls button, #scenario-bar button, #network-bar button {
    background: rgba(20,26,54,0.9);
    border: 1px solid var(--line); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    transition: border-color .15s, background .15s;
  }
  .controls button:hover, #scenario-bar button:hover, #network-bar button:hover { border-color: var(--accent); background: rgba(35,45,90,0.95); }
  .controls button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020; font-weight: 600; border: none;
  }
  .controls label { color: var(--muted); font-size: 11px; display: flex; gap: 6px; align-items: center; }
  .controls input[type=range] { accent-color: var(--accent); width: 90px; }

  #scenario-bar, #network-bar { display: flex; gap: 8px; align-items: center; }
  #scenario-bar .scen-head, #network-bar .scen-head {
    font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); margin-right: 4px;
  }
  #scenario-bar button.active, #network-bar button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020; font-weight: 600; border-color: transparent;
  }
  #network-bar button.net-oracle.active {
    background: linear-gradient(135deg, #8b6cff, #c9b8ff);
  }
  .mini-badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    border-radius: 8px; font-size: 9px; font-weight: 700;
    letter-spacing: 0.4px; text-transform: uppercase;
    background: rgba(255,198,92,0.18); color: #ffc65c;
    border: 1px solid rgba(255,198,92,0.5);
  }
  #network-bar button.net-oracle.active .mini-badge {
    background: rgba(11,16,32,0.35); color: #0b1020; border-color: rgba(11,16,32,0.4);
  }

  #ui-side {
    position: fixed; top: 70px; right: 14px; width: 340px;
    z-index: 20; pointer-events: none;
  }
  #info {
    pointer-events: auto;
    max-height: calc(100vh - 90px);
    overflow: auto;
  }
  #info h2 { margin: 0 0 4px 0; font-size: 14px; }
  #info .stage-num { color: var(--accent); font-weight: 600; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; }
  #info p { margin: 8px 0; color: var(--text); }
  #info .meta { color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 8px; }
  #info code { background: rgba(0,0,0,0.35); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

  #legend {
    position: fixed; bottom: 14px; left: 14px;
    z-index: 20; max-width: 320px;
  }
  #legend .row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); margin: 2px 0; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 3px; box-shadow: 0 0 6px currentColor; }

  #status {
    position: fixed; bottom: 14px; right: 14px;
    z-index: 20;
    min-width: 320px;
  }
  #status .step-line { display: flex; justify-content: space-between; align-items: center; }
  #status .step-label { font-weight: 600; }
  #status .step-counter { color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  #status .progress { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  #status .progress > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.4s; }

  #stage-nav {
    position: fixed; top: 126px; left: 14px;
    z-index: 20; width: 232px;
    max-height: calc(100vh - 300px);
    overflow: auto;
    display: flex; flex-direction: column; gap: 2px;
  }
  #stage-nav .nav-head {
    font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  #stage-nav .nav-item {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid transparent;
    color: var(--text); text-align: left; width: 100%;
    padding: 5px 8px; border-radius: 8px; cursor: pointer;
    font-size: 11px; font-family: inherit; line-height: 1.3;
    transition: background .12s, border-color .12s;
  }
  #stage-nav .nav-item:hover { background: rgba(35,45,90,0.6); }
  #stage-nav .nav-item.active { background: rgba(35,45,90,0.95); border-color: var(--accent); }
  #stage-nav .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: currentColor; box-shadow: 0 0 6px currentColor; flex: 0 0 auto;
  }

  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(10, 14, 32, 0.95);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 11px;
    padding: 6px 9px;
    border-radius: 6px;
    transform: translate(12px, 12px);
    z-index: 30;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: pre;
    display: none;
    max-width: 260px;
  }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 999px;
    margin-right: 6px; vertical-align: middle;
    border: 1px solid currentColor;
  }
  .b-input { color: #b58bff; }
  .b-enc { color: #4cc9f0; }
  .b-share { color: #f4a261; }
  .b-actor { color: #80ed99; }
  .b-critic { color: #ff9ec7; }
  .b-output { color: #ff6b6b; }

  #head-chips { display: flex; gap: 5px; align-items: center; }
  #head-chips .chips-head {
    font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); margin: 0 2px 0 6px;
  }
  #head-chips button {
    width: 26px; padding: 4px 0; text-align: center;
    font-size: 10px; font-weight: 600;
    background: rgba(20,26,54,0.9);
    border: 1px solid var(--hc, var(--line));
    color: var(--hc, var(--text));
    border-radius: 8px; cursor: pointer;
    box-shadow: 0 0 7px color-mix(in srgb, var(--hc) 55%, transparent);
    transition: opacity .15s, box-shadow .15s;
  }
  #head-chips button.off {
    opacity: 0.32; box-shadow: none; border-color: var(--line); color: var(--muted);
  }

  .pill {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    margin-left: 6px;
  }
  .kv { display: grid; grid-template-columns: 110px 1fr; row-gap: 3px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; margin: 8px 0; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); }
</style>
</head>
<body>

<div id="ui-top">
  <div class="panel" id="title">
    Sheepshead PPO <span class="sub" id="title-sub">3D · perceiver-shared-v2 forward pass</span>
  </div>
  <div class="panel controls">
    <button id="btn-play" class="primary">▶ Play tour</button>
    <button id="btn-prev">◀ Prev</button>
    <button id="btn-next">Next ▶</button>
    <button id="btn-reset">↻ Reset</button>
    <label>speed
      <input type="range" id="speed" min="1200" max="6000" step="200" value="3000" />
    </label>
    <label><input type="checkbox" id="chk-rotate" /> auto-rotate</label>
    <label><input type="checkbox" id="chk-emphasis" /> emphasize connections</label>
    <label><input type="checkbox" id="chk-flow" checked /> flow</label>
    <span id="head-chips"><span class="chips-head">heads</span></span>
  </div>
  <div class="panel" id="scenario-bar"></div>
  <div class="panel" id="network-bar">
    <span class="scen-head">Network</span>
    <button id="net-policy" class="active">Policy</button>
    <button id="net-oracle" class="net-oracle">Oracle critic<span class="mini-badge" id="oracle-badge">untrained</span></button>
  </div>
</div>

<div id="ui-side">
  <div class="panel" id="info">
    <div class="stage-num" id="i-stage"></div>
    <h2 id="i-title">Sheepshead PPO — 3D architecture</h2>
    <div id="i-body"><p>Loading…</p></div>
    <div class="meta" id="i-meta"></div>
  </div>
</div>

<div class="panel" id="stage-nav"></div>

<div class="panel" id="legend"></div>

<div class="panel" id="status">
  <div class="step-line">
    <span class="step-label" id="s-label">Ready</span>
    <span class="step-counter" id="s-counter">— / —</span>
  </div>
  <div class="progress"><div id="s-bar"></div></div>
</div>

<div id="tooltip"></div>

<script type="module">
// three.js is inlined by build_3d_html.py (vendor/three.module.min.js +
// vendor/OrbitControls.js) and loaded through blob URLs, so the built
// single-file HTML works with no network access.
const THREE_SRC = __THREE_SRC_JSON__;
const ORBIT_SRC = __ORBIT_SRC_JSON__;
const ADDONS_SRC = __ADDONS_SRC_JSON__;
const threeUrl = URL.createObjectURL(new Blob([THREE_SRC], { type: "text/javascript" }));
const THREE = await import(threeUrl);
const importAddon = (src) => import(URL.createObjectURL(new Blob(
  [src.replace(/from\s*['"]three['"]/g, () => `from "${threeUrl}"`)],
  { type: "text/javascript" },
)));
const { OrbitControls } = await importAddon(ORBIT_SRC);
const {
  EffectComposer, RenderPass, UnrealBloomPass, OutputPass,
  Line2, LineMaterial, LineGeometry,
  RoundedBoxGeometry, RoomEnvironment,
} = await importAddon(ADDONS_SRC);

const DATA = __DATA_JSON__;

// ============================================================
// Color palette
// ============================================================
const C = {
  bgTop: 0x0b1020,
  bgBot: 0x05070f,
  input: 0xb58bff,
  enc: 0x4cc9f0,
  share: 0xf4a261,
  actor: 0x80ed99,
  critic: 0xff9ec7,
  output: 0xff6b6b,
  pulse: 0xfffa9e,
  dim: 0x223060,
  text: 0xe6ecff,
};
// One hue per attention head — used by the transformer chords, the shared
// readout fans, and the H1–H4 toggle chips (keep in sync with the legend /
// chip CSS colors).
const HEAD_COLORS = [0x4cc9f0, 0x3ee6b0, 0x6f8dff, 0xc77bff];
// The SHARED encoder readout renders in an amber/gold family (it is trunk
// infrastructure, feeding actor and critic alike). Per-gem hue varies
// slightly by grid position so neighboring gems stay distinguishable.
const READOUT_GOLD = 0xffc65c;
// The ORACLE CRITIC renders in a violet/indigo "privileged information"
// family — instantly distinct from the policy's cyan/amber/green/pink.
const ORACLE_VIOLET = 0x8b6cff;
const ORACLE_LIGHT = 0xc9b8ff;
// One tint per opponent seat (rel +1..+4) for the 32 opp-hand tokens.
const OPP_SEAT_COLORS = [0x8f7bff, 0xa86ef5, 0xc17bea, 0xd88fdd];
// The secret partner's seat block pops in warm gold.
const PARTNER_GOLD = 0xffd166;
function readoutGemColor(q) {
  const row = Math.floor(q / 4), col = q % 4;
  if (NETWORK_MODE === 1) {
    // Oracle: 4 gems in a violet family.
    return new THREE.Color().setHSL(0.72 + q * 0.012, 0.75, 0.58 + row * 0.03);
  }
  return new THREE.Color().setHSL(0.085 + col * 0.010, 0.82, 0.50 + row * 0.035);
}

// ============================================================
// Scene setup
// ============================================================
const scene = new THREE.Scene();
// Vertical gradient backdrop (bgTop → bgBot); fog still blends to bgBot.
{
  const bgCanvas = document.createElement("canvas");
  bgCanvas.width = 2; bgCanvas.height = 512;
  const bctx = bgCanvas.getContext("2d");
  const grad = bctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, "#0d1330");
  grad.addColorStop(0.55, "#070b1c");
  grad.addColorStop(1, "#05070f");
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, 2, 512);
  const bgTex = new THREE.CanvasTexture(bgCanvas);
  bgTex.colorSpace = THREE.SRGBColorSpace;
  scene.background = bgTex;
}
scene.fog = new THREE.Fog(C.bgBot, 220, 900);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1200);
camera.position.set(35, 38, 70);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Soft image-based lighting so metallic surfaces pick up believable
// reflections; intensity is dialed down per material after each build.
{
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
}

// Post-processing: bloom makes the emissive "glow" the legend promises real.
const composer = new EffectComposer(renderer);
composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.5,   // strength
  0.55,  // radius
  0.6,   // luminance threshold
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(0, 5, 0);

// Lights
scene.add(new THREE.AmbientLight(0x445588, 0.45));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(20, 50, 40);
scene.add(dirLight);
const rim = new THREE.PointLight(0xb58bff, 0.6, 200);
rim.position.set(-30, 20, -30);
scene.add(rim);

// Floor grid for spatial reference — translucent so it recedes
const grid = new THREE.GridHelper(220, 44, 0x27336b, 0x151c3d);
grid.position.y = -10;
grid.material.transparent = true;
grid.material.opacity = 0.45;
scene.add(grid);

// Subtle background nebula spheres (static; survives scenario rebuilds)
for (let i = 0; i < 30; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 8, 6),
    new THREE.MeshBasicMaterial({
      color: i % 2 === 0 ? 0x7cc4ff : 0xb58bff, transparent: true, opacity: 0.4,
    }),
  );
  s.position.set(
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.3) * 60,
    (Math.random() - 0.5) * 80,
  );
  scene.add(s);
}

// ============================================================
// Helpers
// ============================================================
// Sprite labels fade out with camera distance (fine detail shouldn't smear
// the overview) — registry is consulted every few frames in the render loop.
const labelRegistry = [];
function makeLabel(text, color = "#e6ecff", scale = 1) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const SS = 2; // supersample so text stays crisp on hidpi screens
  const px = 64 * scale * SS;
  ctx.font = `600 ${px}px ui-sans-serif, system-ui, -apple-system`;
  const w = ctx.measureText(text).width + 32 * SS;
  canvas.width = w;
  canvas.height = px + 24 * SS;
  ctx.font = `600 ${px}px ui-sans-serif, system-ui, -apple-system`;
  ctx.fillStyle = color;
  ctx.textBaseline = "middle";
  ctx.fillText(text, 16 * SS, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  const aspect = canvas.width / canvas.height;
  const h = 1.4 * scale;
  sprite.scale.set(h * aspect, h, 1);
  // Smaller labels are finer detail → they disappear sooner as you zoom out.
  const near = scale <= 0.45 ? 48 : scale <= 0.6 ? 75 : 130;
  labelRegistry.push({ sprite, mat, near });
  return sprite;
}

function updateLabelFade() {
  for (const L of labelRegistry) {
    const d = camera.position.distanceTo(L.sprite.position);
    const t = clamp((L.near * 1.35 - d) / (L.near * 0.55), 0, 1);
    const dim = L.sprite.userData.dimFactor ?? 1;
    L.mat.opacity = t * dim;
    L.sprite.visible = t * dim > 0.03;
  }
}

// Stage labels are painted flat on the ground, reading along Z (perpendicular
// to the +X data flow) so they never overlap each other or face the camera.
function makeStageLabel(text, color = "#7cc4ff") {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = "bold 56px ui-sans-serif, system-ui";
  const w = ctx.measureText(text).width + 60;
  canvas.width = w; canvas.height = 80;
  // faint backing strip so text stays legible against the floor grid
  ctx.fillStyle = "rgba(8,11,28,0.5)";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(4, 10, w - 8, 60, 12); ctx.fill(); }
  ctx.font = "bold 56px ui-sans-serif, system-ui";
  ctx.fillStyle = color;
  ctx.textBaseline = "middle";
  ctx.fillText(text, 30, 42);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const ph = 1.9, pw = (w / 80) * ph;
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(pw, ph), mat);
  mesh.rotateX(-Math.PI / 2); // lay flat on the ground
  mesh.rotateZ(Math.PI / 2);  // turn text to run along Z, across the flow
  return mesh;
}

function vecMag(arr) {
  let s = 0;
  for (const v of arr) s += v * v;
  return Math.sqrt(s);
}
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function softmax(logits) {
  const m = Math.max(...logits);
  const ex = logits.map(v => Math.exp(v - m));
  const s = ex.reduce((a, b) => a + b, 0);
  return ex.map(v => v / s);
}

// ============================================================
// Static data prep (scenario-independent)
// ============================================================
const trumpCardCodes = DATA.constants.TRUMP;
const trumpCardIds = DATA.constants.trump_card_ids;
const deckIds = DATA.constants.DECK_IDS;
const ACTIONS = DATA.constants.ACTIONS;
const idToCode = {};
for (const [code, id] of Object.entries(deckIds)) idToCode[id] = code;
idToCode[0] = "PAD";
idToCode[33] = "UNDER";

// Policy token bank order: context(1), memory(1), hand(8), trick(5),
// blind(2), bury(2) — 19 tokens.
const POLICY_TOKEN_INFO = [
  { type: "context", color: 0xf4a261 },
  { type: "memory", color: 0xf4a261 },
];
for (let i = 0; i < 8; i++) POLICY_TOKEN_INFO.push({ type: "hand", color: 0x4cc9f0, idx: i });
for (let i = 0; i < 5; i++) POLICY_TOKEN_INFO.push({ type: "trick", color: 0x6fb1ff, idx: i });
for (let i = 0; i < 2; i++) POLICY_TOKEN_INFO.push({ type: "blind", color: 0x88e0e8, idx: i });
for (let i = 0; i < 2; i++) POLICY_TOKEN_INFO.push({ type: "bury", color: 0xa6f0c1, idx: i });

// Oracle token bank: the 19 familiar tokens (blind/bury violet-shifted —
// they carry the TRUE cards here) + 32 opponent-hand tokens in per-seat
// tints — 51 tokens.
const ORACLE_TOKEN_INFO = [
  { type: "context", color: 0xf4a261 },
  { type: "memory", color: 0xf4a261 },
];
for (let i = 0; i < 8; i++) ORACLE_TOKEN_INFO.push({ type: "hand", color: 0x4cc9f0, idx: i });
for (let i = 0; i < 5; i++) ORACLE_TOKEN_INFO.push({ type: "trick", color: 0x6fb1ff, idx: i });
for (let i = 0; i < 2; i++) ORACLE_TOKEN_INFO.push({ type: "blind", color: 0xb58bff, idx: i });
for (let i = 0; i < 2; i++) ORACLE_TOKEN_INFO.push({ type: "bury", color: 0x9d7bff, idx: i });
for (let s = 0; s < 4; s++) {
  for (let i = 0; i < 8; i++) {
    ORACLE_TOKEN_INFO.push({ type: "opp", color: OPP_SEAT_COLORS[s], seat: s, idx: i });
  }
}

let TOKEN_INFO = POLICY_TOKEN_INFO;

// Scenario-dependent token color: the secret partner's opp block glows gold.
function tokenColor(i) {
  const info = TOKEN_INFO[i];
  if (
    NETWORK_MODE === 1 && info.type === "opp" && SO
    && SO.sample.secret_partner_rel >= 2
    && info.seat === SO.sample.secret_partner_rel - 2
  ) return PARTNER_GOLD;
  return info.color;
}

// ============================================================
// Scenario state
// ============================================================
let scenIdx = 0;
let S = DATA.scenarios[0];
let SO = null;          // current scenario's oracle payload (S.oracle)
let handCardIds = [];   // length 8 with 0 padding
let handCardCodes = []; // real cards only
// 0 = policy network walkthrough, 1 = oracle critic walkthrough.
let NETWORK_MODE = 0;

function setScenarioData(i) {
  scenIdx = i;
  S = DATA.scenarios[i];
  SO = S.oracle || null;
  handCardIds = S.sample.hand_ids;
  handCardCodes = S.sample.hand_cards;
}
setScenarioData(0);

// ---- Mode accessors: one place absorbs the policy/oracle schema split ----
function curDims() { return NETWORK_MODE === 1 ? DATA.oracle.dims : DATA.dims; }
function curEmbedding() {
  return NETWORK_MODE === 1 ? DATA.oracle.card_embedding : DATA.card_embedding;
}
function curMemory() { return NETWORK_MODE === 1 ? SO.memory : S.memory; }
function curReadout() {
  return NETWORK_MODE === 1 ? SO.encoder_readout : S.encoder_readout;
}
function curLayers() {
  return NETWORK_MODE === 1 ? SO.transformer.layers : S.transformer.layers;
}
function tokenMask(i) {
  return NETWORK_MODE === 1
    ? !!SO.tokens_pre.mask[i]
    : !!S.tokens_pre_attn.mask[i];
}
function tokenPreNorm(i) {
  if (NETWORK_MODE === 1) return SO.tokens_pre.norms[i];
  const p = S.tokens_pre_attn;
  const flat = [p.context, p.memory, ...p.hand, ...p.trick, ...p.blind, ...p.bury];
  return vecMag(flat[i]);
}
// Directed attention triples {h, i, j, w} of layer l — dense policy maps
// and the oracle's sparse top-K serialization meet here.
function layerTriples(l) {
  if (NETWORK_MODE === 1) {
    return SO.transformer.layers[l].attn_topk.map(
      ([h, i, j, w]) => ({ h, i, j, w }));
  }
  const L = S.transformer.layers[l];
  const out = [];
  for (let h = 0; h < N_HEADS; h++) {
    for (let i = 0; i < N_TOK; i++) {
      if (!tokenMask(i)) continue;
      for (let j = 0; j < N_TOK; j++) {
        if (j === i || !tokenMask(j)) continue;
        out.push({ h, i, j, w: L.attn[h][i][j] });
      }
    }
  }
  return out;
}

// Which actual card (if any) a token carries. The oracle mode reveals the
// privileged cards (true blind/bury, opponent hands); the policy mode must
// keep hiding them — gate on NETWORK_MODE, not data presence.
function tokenCardCode(i) {
  const info = TOKEN_INFO[i];
  if (info.type === "hand") {
    const code = idToCode[handCardIds[info.idx]];
    return code && code !== "PAD" ? code : null;
  }
  if (info.type === "trick") {
    const code = S.sample.trick_card_codes[info.idx];
    return code && code !== "PAD" ? code : null;
  }
  if (NETWORK_MODE === 1 && SO) {
    if (info.type === "opp") {
      const cid = SO.sample.opp_hand_ids[info.seat][info.idx];
      const code = idToCode[cid];
      return cid && code && code !== "PAD" ? code : null;
    }
    if (info.type === "blind") return SO.sample.blind_cards[info.idx] || null;
    if (info.type === "bury") return SO.sample.bury_cards[info.idx] || null;
  }
  return null;
}

// Which policy head actually drives this scenario's decision.
function liveHead() {
  const kind = S.sample.kind;
  if (kind === "pick") return "pick";
  if (kind === "call") return "call";
  return "pointer"; // bury / lead / follow all score hand slots
}

// ============================================================
// Stage layout (X positions)
// ============================================================
const N_LAYERS = DATA.dims.n_layers;   // transformer reasoning layers (4)
const N_HEADS = DATA.dims.n_heads;     // attention heads per layer (4)
const XS = {
  input: -74,
  embed: -56,
  tokensPre: -38,
  xf0: -22,        // first transformer layer ring
  xfSpacing: 10,   // ring-to-ring distance (FFN lens sits halfway)
  gru: 14,
  readout: 22,     // shared 4×4 query-gem grid, centered on the tunnel axis
  hub: 32,         // features hub: concat 16×64 → Linear+LN → 256
  actor: 44,       // actor adapter; pick / call heads spread to the right
  heads: 50,
  pointer: 58,     // pointer assembly (ghost hand row + combine nodes)
  output: 76,
  criticTrunk: 44, // value lane (z −12)
  criticV: 54,
  aux: 44,         // aux lane (z −24)
};
// Oracle spine: value-only walkthrough, larger rings, wider spacing. Shares
// key NAMES with XS so the mode-shared builders read either via XSA.
const XS_O = {
  input: -72,
  embed: -52,
  tokensPre: -32,
  xf0: -12,
  xfSpacing: 12,   // rings at −12, 0, 12, 24
  gru: 36,
  readout: 40,     // 2×2 query-gem grid (exit plane sits at x = 33)
  hub: 50,
  trunk: 60,
  value: 70,
};
let XSA = XS;                                       // active spine
const xfX = (l) => XSA.xf0 + l * XSA.xfSpacing;    // ring x of layer l
let RING_R = 9;    // 14 in oracle mode (51 tokens per ring)
const RING_CY = 5; // ring center height
let N_TOK = 19;    // 51 in oracle mode

// ============================================================
// Rebuildable scene root + registries
// ============================================================
let sceneRoot = null;
let stageGroups = {};
let PICKABLES = [];
let connLines = [];
let allChords = []; // every attention chord (tunnel + readouts), for styling
let inputInfo, embedInfo, tokensInfo, xfInfo, memInfo, readoutInfo,
  actorInfo, pointerInfo, outputInfo, criticVInfo, criticAuxInfo,
  oracleValueInfo;

function group(name) {
  if (!stageGroups[name]) {
    stageGroups[name] = new THREE.Group();
    stageGroups[name].name = name;
    sceneRoot.add(stageGroups[name]);
  }
  return stageGroups[name];
}

function registerPickable(mesh, info) {
  mesh.userData.pickInfo = info;
  PICKABLES.push(mesh);
}

function registerConn(obj, baseOpacity) {
  connLines.push({ obj, base: baseOpacity });
  return obj;
}

// Fat lines (Line2): WebGL ignores LineBasicMaterial.linewidth, so classic
// lines render as flickery 1px hairlines. These rasterize at a real width.
function makeFatLine(points, color, opacity, linewidth = 1.7) {
  const positions = [];
  for (const p of points) positions.push(p.x, p.y, p.z);
  const geom = new LineGeometry();
  geom.setPositions(positions);
  const mat = new LineMaterial({
    color, transparent: true, opacity, linewidth,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  mat.resolution.set(window.innerWidth, window.innerHeight);
  const line = new Line2(geom, mat);
  line.computeLineDistances();
  return line;
}
function makeGlowLine(p0, p1, color, opacity = 0.4) {
  const line = registerConn(makeFatLine([p0, p1], color, opacity), opacity);
  // Flow particles ride this edge (see buildFlowSystem).
  line.userData.flowCurve = new THREE.LineCurve3(p0.clone(), p1.clone());
  line.userData.flowColor = color;
  line.userData.flowIntensity = opacity;
  return line;
}

function disposeScene() {
  if (!sceneRoot) return;
  sceneRoot.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      for (const m of mats) {
        if (m.map) m.map.dispose();
        m.dispose();
      }
    }
  });
  scene.remove(sceneRoot);
  sceneRoot = null;
  stageGroups = {};
  PICKABLES = [];
  connLines = [];
  allChords = [];
  labelRegistry.length = 0;
  flowState = null;
  hovered = null;
  selectedQuery = null;
}

// ---- Connection emphasis -------------------------------------------------
// When ON, strong attention chords get thicker / brighter / more opaque and
// the weakest ones drop out, so high-strength token→token links pop. All other
// connection lines are boosted too.
let emphasize = false;
// Per-head visibility, driven by the H1–H4 chips in the HUD.
const headOn = new Array(N_HEADS).fill(true);
// Shared-readout gem selection: clicking a gem reveals its FULL per-head
// attention fan (and hides its default top-3 chords); null = none selected.
let selectedQuery = null;
function selectQuery(q) {
  selectedQuery = selectedQuery === q ? null : q;
  styleChords();
}
function chordRadius(norm) {
  return emphasize ? 0.06 + Math.pow(norm, 1.15) * 0.62 : 0.035 + norm * 0.18;
}
function chordBaseOpacity(norm) {
  return emphasize ? clamp(0.4 + norm * 0.6, 0, 1) : 0.18 + norm * 0.5;
}
function chordVisible(c) {
  // Readout gem fans: a gem's full per-head fan shows only while selected;
  // its default top-3 (head-averaged) chords hide while the fan is up.
  if (c.qSel !== undefined && c.qSel !== selectedQuery) return false;
  if (c.qTop !== undefined && c.qTop === selectedQuery) return false;
  if (c.head !== undefined && !headOn[c.head]) return false;
  return emphasize ? c.norm >= 0.18 : true;
}
function chordGeometry(curve, norm) {
  return new THREE.TubeGeometry(curve, 18, chordRadius(norm), 6, false);
}
// Every chord keeps its own hue (head color / query color); strength shows
// as brightness toward the hot pulse tone plus thickness.
function chordColor(c) {
  const t = emphasize ? Math.pow(c.norm, 0.55) : c.norm;
  const cold = new THREE.Color(c.baseColor).multiplyScalar(0.42);
  const hot = new THREE.Color(c.baseColor).lerp(new THREE.Color(C.pulse), 0.55);
  return cold.lerp(hot, t);
}
function styleChords() {
  for (const c of allChords) {
    c.mesh.visible = chordVisible(c);
    c.mesh.geometry.dispose();
    c.mesh.geometry = chordGeometry(c.curve, c.norm);
    c.baseOpacity = chordBaseOpacity(c.norm);
    c.mesh.material.color.copy(chordColor(c));
    c.mesh.material.opacity = c.baseOpacity;
  }
}
// Shared factory: a curved additive tube whose thickness/brightness encode an
// attention weight. `group` ties it into stage dimming; `head` into toggles.
function addChord(g, curve, norm, baseColor, groupName, head) {
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: chordBaseOpacity(norm),
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const mesh = new THREE.Mesh(chordGeometry(curve, norm), mat);
  g.add(mesh);
  const c = { mesh, curve, norm, baseColor, group: groupName, head,
    baseOpacity: chordBaseOpacity(norm) };
  mat.color.copy(chordColor(c));
  allChords.push(c);
  return c;
}
function styleConn() {
  // Write into baseOpacity: applyStageDim() owns the final material opacity.
  for (const c of connLines) {
    c.obj.material.userData.baseOpacity = Math.min(0.95, c.base * (emphasize ? 2.3 : 1));
    c.obj.material.opacity = c.obj.material.userData.baseOpacity;
  }
}

// ============================================================
// STAGE 1: OBSERVATION (hand + trick on table + header + memory)
// ============================================================
function buildInputCards() {
  const g = group("input");
  const handLabel = makeStageLabel("1 · OBSERVATION", "#b58bff");
  handLabel.position.set(XS.input, -9.7, 0);
  g.add(handLabel);

  const n = handCardCodes.length;
  const spacing = n <= 6 ? 2.0 : 1.75;
  const topY = 8;
  const cardObjs = [];
  for (let i = 0; i < n; i++) {
    const code = handCardCodes[i];
    const cardGeom = new RoundedBoxGeometry(3.6, 5, 0.3, 3, 0.18);
    const isTrump = trumpCardCodes.includes(code);
    const color = isTrump ? 0xd4af37 : 0x8aa0e0;
    const mat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.15,
      metalness: 0.4,
      roughness: 0.35,
    });
    const card = new THREE.Mesh(cardGeom, mat);
    // Fan the hand: slight z-stagger + a yaw that faces the stage camera,
    // so the cards read as cards instead of edge-on slabs.
    card.position.set(XS.input, topY - i * spacing, i * 0.32);
    card.rotation.y = 0.45;
    card.userData.baseY = card.position.y; // idle bob anchors here
    g.add(card);
    cardObjs.push(card);

    const lab = makeLabel(code, isTrump ? "#ffe89c" : "#cdd9ff", 0.7);
    lab.position.set(XS.input + 2.8, topY - i * spacing, i * 0.32 + 0.5);
    g.add(lab);

    registerPickable(card, {
      title: code,
      badge: "input",
      body: `<p>${isTrump ? "<b>Trump.</b> " : ""}Card id ${handCardIds[i]} (DECK_IDS). Will be looked up in the 34×16 embedding table on the right.</p>`,
    });
  }

  // Cards already on the table this trick (play scenarios)
  const trickCodes = S.sample.trick_card_codes
    .map((code, seatOff) => ({ code, seatOff }))
    .filter(t => t.code !== "PAD");
  const trickObjs = [];
  if (trickCodes.length) {
    const tLab = makeLabel("on the table", "#b58bff", 0.55);
    tLab.position.set(XS.input, topY + 2.2, 7);
    g.add(tLab);
    for (let i = 0; i < trickCodes.length; i++) {
      const { code } = trickCodes[i];
      const isTrump = trumpCardCodes.includes(code);
      const color = isTrump ? 0xd4af37 : 0x7286c9;
      const card = new THREE.Mesh(
        new RoundedBoxGeometry(2.6, 3.6, 0.24, 3, 0.14),
        new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 0.12,
          metalness: 0.4, roughness: 0.4,
        }),
      );
      card.position.set(XS.input, topY - 0.4 - i * 1.6, 7 + i * 0.28);
      card.rotation.y = 0.45;
      g.add(card);
      trickObjs.push(card);
      const lab = makeLabel(code, isTrump ? "#ffe89c" : "#b9c6f2", 0.5);
      lab.position.set(XS.input + 2.1, topY - 0.4 - i * 1.6, 7.4);
      g.add(lab);
      registerPickable(card, {
        title: `${code} (on table)`,
        badge: "input",
        body: `<p>Played earlier this trick. Feeds a trick token (with is-picker / is-known-partner flags) so the network can reason about what it must beat.</p>`,
      });
    }
  }

  // header chip + memory chip
  const chipY = topY - n * spacing - 0.6;
  const headerGeom = new RoundedBoxGeometry(3.6, 1.4, 0.3, 3, 0.14);
  const headerMat = new THREE.MeshStandardMaterial({
    color: 0x9d7bff, emissive: 0x9d7bff, emissiveIntensity: 0.2, roughness: 0.4
  });
  const headerChip = new THREE.Mesh(headerGeom, headerMat);
  headerChip.position.set(XS.input, chipY, 0);
  headerChip.rotation.y = 0.45;
  g.add(headerChip);
  const headerLab = makeLabel("header (10)", "#e6ddff", 0.6);
  headerLab.position.set(XS.input + 3, chipY, 0.5);
  g.add(headerLab);
  registerPickable(headerChip, {
    title: "Header scalars (10)",
    badge: "input",
    body: `<p>partner_mode, is_leaster, play_started, current_trick, alone_called, called_under, picker_rel, partner_rel, leader_rel, picker_position — the game-phase context for this decision (trick ${S.sample.trick + 1}, ${S.sample.phase.toLowerCase()}).</p>`,
  });

  const memMag = vecMag(S.memory.memory_in);
  const memGeom = new RoundedBoxGeometry(3.6, 1.4, 0.3, 3, 0.14);
  const memMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261,
    emissiveIntensity: 0.15 + clamp(memMag / 10, 0, 1) * 0.5, roughness: 0.4
  });
  const memChip = new THREE.Mesh(memGeom, memMat);
  memChip.position.set(XS.input, chipY - 2.2, 0);
  memChip.rotation.y = 0.45;
  g.add(memChip);
  const memLab = makeLabel(`memory hₜ₋₁ (256) · ‖${memMag.toFixed(1)}‖`, "#ffd99c", 0.6);
  memLab.position.set(XS.input + 3, chipY - 2.2, 0.5);
  g.add(memLab);
  registerPickable(memChip, {
    title: "Prior memory hₜ₋₁",
    badge: "input",
    kv: { "‖memory_in‖": memMag.toFixed(2) },
    body: memMag < 1e-6
      ? `<p>256-d recurrent state from this player's previous decision. Zeros here — this is the seat's first decision of the hand. Carried via a GRU cell — see stage 5.</p>`
      : `<p>256-d recurrent state carried from this seat's previous decisions — it has already seen the earlier phases of this hand. Updated by the GRU cell in stage 5.</p>`,
  });

  return { cardObjs, trickObjs, chipY, spacing, topY };
}

// ============================================================
// STAGE 2: CARD EMBEDDING TABLE (34 × 16) — instanced
// ============================================================
function buildEmbeddingTable() {
  const g = group("embed");
  const lab = makeStageLabel(
    NETWORK_MODE === 1
      ? "2 · ORACLE CARD EMBEDDINGS · own (34 × 16)"
      : "2 · CARD EMBEDDINGS · (34 × 16)",
    NETWORK_MODE === 1 ? "#c9b8ff" : "#4cc9f0");
  lab.position.set(XSA.embed, -9.7, 0);
  g.add(lab);

  const ROWS = 34, COLS = 16;
  const cellW = 0.32, cellH = 0.42, gap = 0.04;
  const totalW = COLS * (cellW + gap);
  const totalH = ROWS * (cellH + gap);

  // Rows referenced by this scenario: hand + cards on the table + called card
  const usedIds = new Set(handCardIds.filter(id => id !== 0));
  for (const code of S.sample.trick_card_codes) {
    if (code !== "PAD") usedIds.add(code === "UNDER" ? 33 : deckIds[code]);
  }
  if (S.sample.called_card && deckIds[S.sample.called_card]) {
    usedIds.add(deckIds[S.sample.called_card]);
  }
  if (NETWORK_MODE === 1 && SO) {
    // The oracle also embeds every hidden card it sees.
    for (const row of SO.sample.opp_hand_ids) {
      for (const cid of row) if (cid) usedIds.add(cid);
    }
    for (const code of [...SO.sample.blind_cards, ...SO.sample.bury_cards]) {
      if (deckIds[code]) usedIds.add(deckIds[code]);
    }
    if (SO.sample.under_card && deckIds[SO.sample.under_card]) {
      usedIds.add(deckIds[SO.sample.under_card]);
    }
  }

  const geom = new THREE.BoxGeometry(cellW, cellH, 0.25);
  const inst = new THREE.InstancedMesh(geom, new THREE.MeshStandardMaterial({
    metalness: 0.2, roughness: 0.55, vertexColors: false,
  }), ROWS * COLS);
  inst.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(ROWS * COLS * 3), 3);

  const tempColor = new THREE.Color();
  const dummy = new THREE.Object3D();

  const emb = curEmbedding();
  const embMin = emb.min;
  const embMax = emb.max;
  const embRange = Math.max(1e-6, embMax - embMin);
  const table = emb.table;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      const xLocal = (c - COLS / 2) * (cellW + gap) + cellW / 2;
      const yLocal = (ROWS / 2 - r) * (cellH + gap) - cellH / 2;
      dummy.position.set(XSA.embed, yLocal, xLocal); // table standing in YZ plane
      dummy.updateMatrix();
      inst.setMatrixAt(i, dummy.matrix);

      tempColor.setHex(C.dim);
      if (usedIds.has(r)) {
        const v = table[r][c];
        const norm = (v - embMin) / embRange; // 0..1
        // diverging-ish: cool blue for low, white-ish mid, warm for high
        tempColor.setHSL(0.6 - norm * 0.55, 0.9, 0.25 + norm * 0.45);
      }
      inst.setColorAt(i, tempColor);
    }
  }
  inst.instanceMatrix.needsUpdate = true;
  if (inst.instanceColor) inst.instanceColor.needsUpdate = true;

  g.add(inst);

  // Row labels (only used rows)
  const usedRowYs = {};
  for (const r of usedIds) {
    const yLocal = (ROWS / 2 - r) * (cellH + gap) - cellH / 2;
    const code = idToCode[r] || `id ${r}`;
    const rowLab = makeLabel(`${code} (row ${r})`, "#ffe89c", 0.5);
    rowLab.position.set(XSA.embed, yLocal, totalW / 2 + 1.4);
    g.add(rowLab);
    usedRowYs[r] = yLocal;
  }

  // Connections: each input card → its row.
  if (NETWORK_MODE === 0) {
    for (let i = 0; i < handCardCodes.length; i++) {
      const cid = handCardIds[i];
      if (!(cid in usedRowYs)) continue;
      const start = new THREE.Vector3(XS.input + 2, inputInfo.topY - i * inputInfo.spacing, 0);
      const end = new THREE.Vector3(XSA.embed - 0.1, usedRowYs[cid], 0);
      g.add(makeGlowLine(start, end, C.input, 0.3));
    }
    // ... and each on-table card → its row
    let trickIdx = 0;
    for (const code of S.sample.trick_card_codes) {
      if (code === "PAD") continue;
      const cid = code === "UNDER" ? 33 : deckIds[code];
      if (cid in usedRowYs) {
        const start = new THREE.Vector3(
          XS.input + 2, inputInfo.topY - 0.4 - trickIdx * 1.6, 7);
        const end = new THREE.Vector3(XSA.embed - 0.1, usedRowYs[cid], 0);
        g.add(makeGlowLine(start, end, C.input, 0.22));
      }
      trickIdx++;
    }
  } else {
    // Oracle: one line per revealed fan (own + 4 opponents) into the table.
    for (const a of (inputInfo.fanAnchors || [])) {
      g.add(makeGlowLine(
        a.clone(),
        new THREE.Vector3(XSA.embed - 0.1, 0, 0),
        ORACLE_VIOLET, 0.25));
    }
  }

  // Click-target for the whole table
  const tableProxy = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, totalH + 0.5, totalW + 0.5),
    new THREE.MeshBasicMaterial({ visible: false }),
  );
  tableProxy.position.set(XSA.embed, 0, 0);
  g.add(tableProxy);
  registerPickable(tableProxy, {
    title: "nn.Embedding(34, 16)",
    badge: "enc",
    body: NETWORK_MODE === 1
      ? `<p>The ORACLE'S OWN card embedding table — zero parameters are shared with the policy stack (the isolation guarantee: privileged gradients can never shape the actor). Same 34×16 layout and informed init as the policy's table.</p>
        <p>The highlighted rows are every card the oracle sees this scenario — including all four hidden hands and the true blind/bury.</p>`
      : `<p>The card embedding table. 34 rows (PAD, 32 real cards, UNDER token) × 16 dims. Dims 0–3 = suit one-hot · 4–7 = per-suit rank · 8 = points/11 · 9 = UNDER flag · 10–15 = free to learn.</p>
      <p>The highlighted rows are the cards this scenario touches (hand, table, called card). The same table is reused by the actor's two-tower CALL scorer, so any update here propagates everywhere.</p>`,
  });

  return { usedRowYs, totalW, totalH };
}

// ============================================================
// STAGE 3: TOKEN BANK (19 tokens, 64-d each)
// ============================================================
function buildTokens() {
  const g = group("tokens");
  const lab = makeStageLabel(
    `3 · TOKENIZE · (${N_TOK} × ${curDims().d_token})`,
    NETWORK_MODE === 1 ? "#c9b8ff" : "#4cc9f0");
  lab.position.set(XSA.tokensPre, -9.7, 0);
  g.add(lab);

  const tokenObjs = [];

  // One chip per token — shared between the policy column and the oracle
  // column + opp grid layouts.
  const addChip = (i, pos, labelDX, labelScale) => {
    const info = TOKEN_INFO[i];
    const active = tokenMask(i);
    const mag = tokenPreNorm(i);
    const dims = NETWORK_MODE === 1 ? [3.0, 0.5, 0.5] : [4.5, 0.6, 0.6];
    // PAD slots collapse to small ghost chips: present, but not clutter.
    const tokGeom = active
      ? new THREE.BoxGeometry(dims[0], dims[1], dims[2])
      : new THREE.BoxGeometry(1.4, 0.26, 0.26);
    const color = active ? tokenColor(i) : C.dim;
    const intensity = active ? 0.35 : 0.05;
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: intensity,
      metalness: 0.3, roughness: 0.4,
      transparent: !active, opacity: active ? 1 : 0.18,
    });
    const tok = new THREE.Mesh(tokGeom, mat);
    tok.position.copy(pos);
    g.add(tok);
    tokenObjs.push({
      mesh: tok, y: pos.y, pos: pos.clone(), info, active, magnitude: mag,
    });

    let labText = info.type;
    const code = tokenCardCode(i);
    if (info.type === "hand") labText = `hand[${info.idx}] ${code || "PAD"}`;
    else if (info.type === "trick") labText = `trick[${info.idx}]${code ? " " + code : ""}`;
    else if (info.type === "blind") labText = `blind[${info.idx}]${code ? " " + code : ""}`;
    else if (info.type === "bury") labText = `bury[${info.idx}]${code ? " " + code : ""}`;
    else if (info.type === "opp") labText = code || "PAD";
    if (active) {
      const tlab = makeLabel(labText, code ? "#e6dcff" : "#cfe9ff", labelScale);
      tlab.position.copy(pos).add(new THREE.Vector3(labelDX, 0, 0));
      g.add(tlab);
    }

    const isPartnerTok =
      NETWORK_MODE === 1 && info.type === "opp" && SO
      && SO.sample.secret_partner_rel >= 2
      && info.seat === SO.sample.secret_partner_rel - 2;
    registerPickable(tok, {
      title: `Token ${i}: ${labText}`,
      badge: "enc",
      kv: { "type": info.type, "active": active ? "yes" : "PAD", "‖vec‖": mag.toFixed(2) },
      body: info.type === "opp"
        ? `<p>A HIDDEN card in relative seat +${info.seat + 1}'s hand${isPartnerTok ? " — <b>the secret partner's seat</b> (gold)" : ""}. The oracle sees it; the acting player never does. Built from card ⊕ seat ⊕ role embeddings → MLP.</p>`
        : `<p>One of ${N_TOK} entity tokens. Built by the type-specific MLP, then has the <code>card_type</code> embedding added in (so attention can tell context vs memory vs hand-card etc.).</p>
        <p>Rides its residual rail through ${N_LAYERS} transformer layers next.</p>`,
    });
  };

  if (NETWORK_MODE === 0) {
    // Column geometry: 19 rows must fit between the floor grid (y = −10,
    // where the stage label lies) and a reasonable top. Center at +2 with
    // 1.15 spacing puts the last token (bury[1]) at y ≈ −8.4 — above the
    // floor even when trick tokens are live.
    const spacingY = 1.15;
    const topY = 2 + ((19 - 1) * spacingY) / 2;
    for (let i = 0; i < N_TOK; i++) {
      addChip(i, new THREE.Vector3(XSA.tokensPre, topY - i * spacingY, 0), 3.5, 0.45);
    }
  } else {
    // Oracle: the 19 familiar tokens in a column, plus the 32 opponent-hand
    // tokens as a 4-column grid (one column per hidden seat) beside it.
    const spacingY = 1.05;
    const topY = 2 + ((19 - 1) * spacingY) / 2;
    for (let i = 0; i < 19; i++) {
      addChip(i, new THREE.Vector3(XSA.tokensPre, topY - i * spacingY, -8), 3.0, 0.4);
    }
    const gSpacing = 1.3;
    const gTop = 2 + ((8 - 1) * gSpacing) / 2;
    for (let s = 0; s < 4; s++) {
      const z = -2 + s * 3.4;
      const isPartnerSeat = SO && SO.sample.secret_partner_rel >= 2
        && s === SO.sample.secret_partner_rel - 2;
      const head = makeLabel(
        `seat +${s + 1}${isPartnerSeat ? " ★ partner" : ""}`,
        isPartnerSeat ? "#ffe1a3" : "#d9ccff", 0.42);
      head.position.set(XSA.tokensPre, gTop + 1.5, z);
      g.add(head);
      for (let k = 0; k < 8; k++) {
        const i = 19 + s * 8 + k;
        addChip(i, new THREE.Vector3(XSA.tokensPre, gTop - k * gSpacing, z), 2.0, 0.34);
      }
    }
  }

  // context ← header chip
  const ctxStart = new THREE.Vector3(XSA.input + 2, inputInfo.chipY, 0);
  const ctxEnd = tokenObjs[0].pos.clone().add(new THREE.Vector3(-2.3, 0, 0));
  g.add(makeGlowLine(ctxStart, ctxEnd, C.share, 0.4));
  // memory chip → token 1
  const memStart = new THREE.Vector3(XSA.input + 2, inputInfo.chipY - 2.2, 0);
  const memEnd = tokenObjs[1].pos.clone().add(new THREE.Vector3(-2.3, 0, 0));
  g.add(makeGlowLine(memStart, memEnd, C.share, 0.4));

  // Card-bearing tokens ← their embedding rows (hand + trick in policy;
  // plus true blind/bury and all opp cards in oracle mode, where
  // tokenCardCode reveals them).
  for (let i = 0; i < N_TOK; i++) {
    const code = tokenCardCode(i);
    if (!code) continue;
    const cid = code === "UNDER" ? 33 : deckIds[code];
    const rowY = embedInfo.usedRowYs[cid];
    if (rowY === undefined) continue;
    const start = new THREE.Vector3(XSA.embed + 0.3, rowY, 0);
    const end = tokenObjs[i].pos.clone().add(new THREE.Vector3(-2.3, 0, 0));
    g.add(makeGlowLine(start, end, C.enc, NETWORK_MODE === 1 ? 0.16 : 0.32));
  }

  return { tokenObjs };
}

// ============================================================
// STAGE 4: TRANSFORMER TUNNEL — one ring per reasoning layer,
// per-head attention chords inside each ring, FFN lens after it,
// straight residual-stream rails carrying each token through.
// ============================================================
function ringPoint(l, i) {
  const theta = (i / N_TOK) * Math.PI * 2 - Math.PI / 2;
  return new THREE.Vector3(
    xfX(l),
    Math.sin(theta) * RING_R + RING_CY,
    Math.cos(theta) * RING_R,
  );
}
function tokName(i) {
  const code = tokenCardCode(i);
  if (code) return code;
  const info = TOKEN_INFO[i];
  return info.type === "hand" || info.type === "trick"
    ? `${info.type}[${info.idx}]` : info.type;
}

function buildTransformerTunnel() {
  const g = group("xf"); // rails + entry lines + shared labels
  const lab = makeStageLabel(
    `4 · TRANSFORMER · ${N_LAYERS} layers × ${N_HEADS} heads · ${N_TOK} tokens`,
    NETWORK_MODE === 1 ? "#c9b8ff" : "#4cc9f0");
  lab.position.set(xfX(0) + XSA.xfSpacing, -9.7, 0);
  g.add(lab);

  const layers = curLayers();
  const ringPosByLayer = [];
  for (let l = 0; l < N_LAYERS; l++) {
    ringPosByLayer.push(Array.from({ length: N_TOK }, (_, i) => ringPoint(l, i)));
  }
  const layerObjs = [];

  for (let l = 0; l < N_LAYERS; l++) {
    const gl = group(`xf${l}`);
    const L = layers[l];
    const pos = ringPosByLayer[l];
    const center = new THREE.Vector3(xfX(l), RING_CY, 0);

    // Translucent layer disc — the residual/LayerNorm boundary of this layer.
    const disc = new THREE.Mesh(
      new THREE.TorusGeometry(RING_R + 1.2, 0.14, 10, 72),
      new THREE.MeshStandardMaterial({
        color: C.enc, emissive: C.enc, emissiveIntensity: 0.28,
        metalness: 0.5, roughness: 0.3,
        transparent: true, opacity: 0.5,
      }),
    );
    disc.position.copy(center);
    disc.rotateY(Math.PI / 2);
    gl.add(disc);
    const dLab = makeLabel(`layer ${l + 1}`, "#9fd8ff", 0.6);
    dLab.position.set(xfX(l), RING_CY + RING_R + 2.6, 0);
    gl.add(dLab);
    registerPickable(disc, {
      title: `Transformer layer ${l + 1} / ${N_LAYERS}`,
      badge: "enc",
      kv: { "attention": `${N_HEADS} heads · ${DATA.dims.d_token}d`, "FFN": `${DATA.dims.d_token}→${DATA.dims.d_token * 2}→${DATA.dims.d_token} · SiLU`, "norms": "post-LN ×2 (after attn, after FFN)" },
      body: `<p>One reasoning layer: multi-head self-attention over the ${N_TOK} tokens (chords, colored by head), residual + LayerNorm, then the position-wise FFN (the lens behind the ring), residual + LayerNorm.</p>
        <p>The ring itself marks the residual boundary — every token passes straight through on its rail and is only <i>updated</i>, never replaced.</p>`,
    });

    // Token nodes — radius tracks this layer's post-FFN token norm, so the
    // representation visibly evolves ring to ring.
    const normsFfn = L.token_norms_ffn;
    const maxNorm = Math.max(...normsFfn.filter((_, i) => tokenMask(i)));
    const nodeObjs = [];
    for (let i = 0; i < N_TOK; i++) {
      const info = TOKEN_INFO[i];
      const active = tokenMask(i);
      const mag = normsFfn[i];
      const rBase = NETWORK_MODE === 1 ? 0.28 : 0.42;
      const rSpan = NETWORK_MODE === 1 ? 0.42 : 0.62;
      const r = active ? rBase + clamp(mag / Math.max(maxNorm, 1e-6), 0, 1) * rSpan : 0.14;
      const sph = new THREE.Mesh(
        new THREE.SphereGeometry(r, 18, 14),
        new THREE.MeshStandardMaterial({
          color: active ? tokenColor(i) : C.dim,
          emissive: active ? tokenColor(i) : C.dim,
          emissiveIntensity: active ? 0.45 : 0.05,
          metalness: 0.3, roughness: 0.4,
          transparent: !active, opacity: active ? 1 : 0.15,
        }),
      );
      sph.position.copy(pos[i]);
      gl.add(sph);
      nodeObjs.push({ mesh: sph, r });

      const code = tokenCardCode(i);
      const isTrump = code && trumpCardCodes.includes(code);
      // Labels on the first and last rings only — inner rings stay clean.
      if ((l === 0 || l === N_LAYERS - 1)
          && (code || info.type === "context" || info.type === "memory")) {
        const labText = code || info.type;
        const labColor = code ? (isTrump ? "#ffe89c" : "#cfe9ff") : "#ffd9a0";
        const labScale = NETWORK_MODE === 1 ? (code ? 0.4 : 0.36) : (code ? 0.55 : 0.48);
        const tlab = makeLabel(labText, labColor, labScale);
        const outward = pos[i].clone().sub(center).normalize();
        tlab.position.copy(pos[i]).addScaledVector(outward, r + 1.3);
        gl.add(tlab);
      }

      registerPickable(sph, {
        title: code
          ? `L${l + 1} · token ${i} · ${code}${isTrump ? " (trump)" : ""}`
          : `L${l + 1} · token ${i} · ${info.type}`,
        badge: "enc",
        kv: {
          "type": info.type,
          "card": code || (active ? "—" : "PAD"),
          [`‖after L${l + 1}‖`]: mag.toFixed(2),
        },
        body: `<p>This token's ${DATA.dims.d_token}-d state after layer ${l + 1}'s attention + FFN. <b>Sphere size</b> = its L2 norm at this depth — watch it change ring to ring as the layers rewrite the representation.</p>`,
      });
    }

    // Per-head attention chords: symmetrized weight per (i, j, head),
    // normalized within the layer, strongest kept. Additive tubes; hue =
    // head. Both modes flow through layerTriples() — dense policy maps and
    // the oracle's sparse top-K serialization (a missing direction of a
    // pair counts as 0).
    const MAX_CHORDS_PER_LAYER = NETWORK_MODE === 1 ? 60 : 36;
    const CHORD_FLOOR = NETWORK_MODE === 1 ? 0.10 : 0.07;
    const directed = layerTriples(l);
    let maxW = 0;
    for (const t of directed) maxW = Math.max(maxW, t.w);
    const wmap = new Map();
    for (const t of directed) wmap.set((t.h * N_TOK + t.i) * N_TOK + t.j, t.w);
    const seenPairs = new Set();
    const triples = [];
    for (const t of directed) {
      const i = Math.min(t.i, t.j), j = Math.max(t.i, t.j);
      const key = (t.h * N_TOK + i) * N_TOK + j;
      if (seenPairs.has(key)) continue;
      seenPairs.add(key);
      const wij = wmap.get((t.h * N_TOK + i) * N_TOK + j) || 0;
      const wji = wmap.get((t.h * N_TOK + j) * N_TOK + i) || 0;
      const norm = ((wij + wji) / 2) / Math.max(maxW, 1e-6);
      if (norm >= CHORD_FLOOR) triples.push({ h: t.h, i, j, norm });
    }
    triples.sort((a, b) => b.norm - a.norm);
    for (const { h, i, j, norm } of triples.slice(0, MAX_CHORDS_PER_LAYER)) {
      const start = pos[i];
      const end = pos[j];
      const mid = start.clone().add(end).multiplyScalar(0.5).lerp(center, 0.6);
      // Nudge each head's chords onto its own shallow x-offset plane so
      // overlapping pairs from different heads stay distinguishable.
      mid.x += (h - (N_HEADS - 1) / 2) * 0.55;
      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      addChord(gl, curve, norm, HEAD_COLORS[h], `xf${l}`, h);
    }

    // FFN lens: a slim luminous disc + per-token gems on the rails right
    // behind the ring — the 64→128→64 SiLU expansion, gem glow = hidden norm.
    const lensX = xfX(l) + XSA.xfSpacing * 0.45;
    const ffnMax = Math.max(...L.ffn_hidden_norms.filter((_, i) => tokenMask(i)));
    const lens = new THREE.Mesh(
      new THREE.CylinderGeometry(RING_R * 0.99, RING_R * 0.99, 0.10, 48, 1, true),
      new THREE.MeshBasicMaterial({
        color: 0x2a6fae, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false,
        side: THREE.DoubleSide,
      }),
    );
    lens.position.set(lensX, RING_CY, 0);
    lens.rotation.z = Math.PI / 2;
    gl.add(lens);
    const ffnLab = makeLabel(
      `FFN ${DATA.dims.d_token}→${DATA.dims.d_token * 2}→${DATA.dims.d_token} · SiLU`,
      "#9fd8ff", 0.42);
    ffnLab.position.set(lensX, RING_CY - RING_R - 1.7, 0);
    gl.add(ffnLab);
    for (let i = 0; i < N_TOK; i++) {
      if (!tokenMask(i)) continue;
      const hNorm = L.ffn_hidden_norms[i] / Math.max(ffnMax, 1e-6);
      const gem = new THREE.Mesh(
        new THREE.OctahedronGeometry((NETWORK_MODE === 1 ? 0.17 : 0.24) + hNorm * 0.22),
        new THREE.MeshStandardMaterial({
          color: C.enc, emissive: C.enc,
          emissiveIntensity: 0.15 + hNorm * 0.75,
          metalness: 0.5, roughness: 0.3,
        }),
      );
      const p = ringPoint(l, i);
      gem.position.set(lensX, p.y, p.z);
      gl.add(gem);
      registerPickable(gem, {
        title: `L${l + 1} FFN · ${tokName(i)}`,
        badge: "enc",
        kv: { "‖hidden (128d)‖": L.ffn_hidden_norms[i].toFixed(2) },
        body: `<p>The position-wise FFN expands this token to ${DATA.dims.d_token * 2}d (SiLU), then projects back to ${DATA.dims.d_token}d. Gem glow = how strongly the hidden layer fired for this token.</p>`,
      });
    }

    layerObjs.push({ disc, nodeObjs });
  }

  // Exit plane: the final layer's FFN lens sits behind ring N, so the rails
  // continue THROUGH it and every downstream tap (readout chords, GRU wire,
  // pointer tethers) originates past it — the final FFN's output IS the
  // all_tokens tensor everything downstream reads.
  const exitPos = ringPosByLayer[N_LAYERS - 1].map(
    p => p.clone().add(new THREE.Vector3(XSA.xfSpacing * 0.75, 0, 0)));

  // Output tokens: the transformer's product, re-materialized as spheres on
  // the exit plane — no ring disc, no layer label; this is what LEAVES the
  // tunnel — so the readout / GRU / pointer taps attach to tokens, not to
  // bare rail ends. Grouped with the final layer so they stay lit in the
  // gru / readout / pointer stages.
  {
    const gOut = group(`xf${N_LAYERS - 1}`);
    const outNorms = layers[N_LAYERS - 1].token_norms_ffn;
    const outMax = Math.max(...outNorms.filter((_, i) => tokenMask(i)));
    const driverIdx = curMemory().driver === "memory" ? 1 : 0;
    for (let i = 0; i < N_TOK; i++) {
      if (!tokenMask(i)) continue;
      const rBase = NETWORK_MODE === 1 ? 0.26 : 0.38;
      const rSpan = NETWORK_MODE === 1 ? 0.36 : 0.52;
      const r = rBase + clamp(outNorms[i] / Math.max(outMax, 1e-6), 0, 1) * rSpan;
      const sph = new THREE.Mesh(
        new THREE.SphereGeometry(r, 18, 14),
        new THREE.MeshStandardMaterial({
          color: tokenColor(i), emissive: tokenColor(i), emissiveIntensity: 0.5,
          metalness: 0.3, roughness: 0.4,
        }),
      );
      sph.position.copy(exitPos[i]);
      gOut.add(sph);
      registerPickable(sph, {
        title: `output token · ${tokName(i)}`,
        badge: "enc",
        kv: { "‖vec‖": outNorms[i].toFixed(2), "dim": `${curDims().d_token} (post final FFN + LN)` },
        body: `<p>The transformer's output for this token — projected back to ${curDims().d_token}d by the final FFN, residual-added and LayerNormed. This exact vector is what the readout queries read${i === driverIdx ? ", and it drives the GRU memory write" : ""}${NETWORK_MODE === 0 && TOKEN_INFO[i].type === "hand" ? " — and the pointer scorer reads it directly" : ""}.</p>`,
      });
    }
  }

  // Residual-stream rails: each active token rides a straight rail through
  // every ring (same angle on each) — the transformer only nudges it —
  // and on out through the final FFN lens to the exit plane.
  for (let i = 0; i < N_TOK; i++) {
    if (!tokenMask(i)) continue;
    const p0 = ringPosByLayer[0][i];
    const p1 = exitPos[i];
    const rail = registerConn(
      makeFatLine([p0, p1], tokenColor(i), 0.16, 1.1), 0.16);
    rail.userData.flowCurve = new THREE.LineCurve3(p0.clone(), p1.clone());
    rail.userData.flowColor = tokenColor(i);
    rail.userData.flowIntensity = 0.3;
    g.add(rail);
  }

  // Entry lines: token bank column → first ring.
  for (let i = 0; i < N_TOK; i++) {
    if (!tokenMask(i)) continue;
    const start = tokensInfo.tokenObjs[i].pos.clone().add(new THREE.Vector3(2.3, 0, 0));
    g.add(makeGlowLine(start, ringPosByLayer[0][i].clone(), C.enc, NETWORK_MODE === 1 ? 0.10 : 0.16));
  }

  return { ringPosByLayer, exitPos, layerObjs };
}

// Strongest attention pairs of one layer (head-tagged), for the stage text.
function topPairsHtml(l, k = 5) {
  const triples = layerTriples(l).slice().sort((a, b) => b.w - a.w);
  const seen = new Set();
  const rows = [];
  for (const t of triples) {
    const key = `${Math.min(t.i, t.j)}-${Math.max(t.i, t.j)}-${t.h}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const hue = "#" + HEAD_COLORS[t.h].toString(16).padStart(6, "0");
    rows.push(
      `<span style="color:${hue}">●</span> <b>${tokName(t.i)}</b> → <b>${tokName(t.j)}</b> ${(t.w * 100).toFixed(0)}%`);
    if (rows.length >= k) break;
  }
  return rows.join("<br>");
}

// ============================================================
// STAGE 5: GRU + MEMORY FEEDBACK (reads the CONTEXT token in v2)
// ============================================================
function buildMemory() {
  const g = group("gru");
  const lab = makeStageLabel("5 · GRU MEMORY UPDATE", "#f4a261");
  lab.position.set(XSA.gru, -9.7, 0);
  g.add(lab);

  const GRU_Y = RING_CY + RING_R + 6;
  const gruGeom = new THREE.CylinderGeometry(1.8, 1.8, 3, 6);
  const gruMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261, emissiveIntensity: 0.4,
    metalness: 0.4, roughness: 0.3,
  });
  const gru = new THREE.Mesh(gruGeom, gruMat);
  gru.position.set(XSA.gru, GRU_Y, 0);
  g.add(gru);
  const gruLab = makeLabel(`GRUCell · ${DATA.dims.d_token} → ${DATA.dims.d_model}`, "#ffd99c", 0.55);
  gruLab.position.set(XSA.gru, GRU_Y + 3, 0);
  g.add(gruLab);

  const mem = curMemory();
  const memInMag = vecMag(mem.memory_in);
  const memOutMag = vecMag(mem.memory_out);
  const driverIsMemory = mem.driver === "memory";
  const driverName = driverIsMemory ? "memory token" : "context token";
  registerPickable(gru, {
    title: "memory_gru (GRUCell)",
    badge: "share",
    kv: { "‖memory_in‖": memInMag.toFixed(2), "‖memory_out‖": memOutMag.toFixed(2), "driver": driverName },
    body: `<p>The only true recurrence in the network. memory_out = GRU(<b>${driverName}</b> after reasoning, memory_in) — ${driverIsMemory
      ? "the transformer's own \"what to remember\" slot drives the write (the perceiver wiring; the policy network feeds the GRU the context token instead)"
      : "shared-v2 keeps <code>full</code>'s wiring: the context token, a strong prior at game start, drives the write (the original perceiver used the memory token instead)"}.</p>
      <p>Stored per-player and read back on the next decision step — the curved arc going back to the left is exactly that feedback.</p>`,
  });

  // Driver token on the final ring → GRU (context @ index 0 in v2).
  const memTokPos = xfInfo.exitPos[driverIsMemory ? 1 : 0];
  g.add(makeGlowLine(memTokPos.clone(), gru.position.clone(), C.share, 0.6));
  const wireLab = makeLabel(`post-reasoning ${driverName}`, "#ffd99c", 0.45);
  wireLab.position.copy(memTokPos).lerp(gru.position, 0.5).add(new THREE.Vector3(0, 1.2, 0));
  g.add(wireLab);

  // Feedback arc: from gru position back to the memory chip at input
  const start = new THREE.Vector3(XSA.gru - 1.5, GRU_Y, 0);
  const end = new THREE.Vector3(XSA.input + 2, inputInfo.chipY - 2.2, 0);
  const curve = new THREE.CubicBezierCurve3(
    start,
    new THREE.Vector3(start.x - 5, GRU_Y + 12, 0),
    new THREE.Vector3(end.x + 5, GRU_Y + 12, 0),
    end,
  );
  const arc = registerConn(makeFatLine(curve.getPoints(80), 0xf4a261, 0.55, 2.2), 0.55);
  // The recurrence loop gets a denser particle stream — the one piece of
  // state that literally flows back in time deserves a comet.
  arc.userData.flowCurve = curve;
  arc.userData.flowColor = 0xffc98a;
  arc.userData.flowIntensity = 0.55;
  arc.userData.flowBoost = 3;
  g.add(arc);

  const arrowGeom = new THREE.ConeGeometry(0.4, 1.0, 12);
  const arrowMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261, emissiveIntensity: 0.6,
  });
  const arrow = new THREE.Mesh(arrowGeom, arrowMat);
  arrow.position.copy(end);
  arrow.rotation.z = Math.PI / 2;
  g.add(arrow);

  const arcLab = makeLabel("memory_out → next-step memory_in (via memory_in_proj)", "#ffd99c", 0.5);
  arcLab.position.set((XSA.input + XSA.gru) / 2, GRU_Y + 10.5, 0);
  g.add(arcLab);

  return { gru, curve };
}

// ============================================================
// STAGE 6: SHARED READOUT — ONE set of 16 learned queries (4×4 grid)
// cross-attends over the 19 post-reasoning tokens and produces the
// single 256-d `features` vector that BOTH actor and critic consume.
// Default view: each gem shows only its top-3 attended tokens
// (head-averaged). Clicking a gem reveals its full per-head fan.
// ============================================================
function buildSharedReadout() {
  const g = group("readout");
  const nQ = curDims().n_readout_queries;
  const attn = curReadout().attn; // (H, M, N_TOK)
  const lab = makeStageLabel(
    NETWORK_MODE === 1
      ? `6 · ORACLE READOUT · ${nQ} queries × ${N_TOK} tokens`
      : `6 · SHARED READOUT · ${nQ} queries × ${N_TOK} tokens`,
    NETWORK_MODE === 1 ? "#c9b8ff" : "#ffc65c");
  lab.position.set(XSA.readout + 2, -9.7, 14);
  g.add(lab);

  // Head-averaged weight per (query, token), normalized across the readout.
  const w = [];
  let maxW = 0;
  for (let q = 0; q < nQ; q++) {
    w.push([]);
    for (let i = 0; i < N_TOK; i++) {
      let s = 0;
      for (let h = 0; h < N_HEADS; h++) s += attn[h][q][i];
      s /= N_HEADS;
      w[q].push(s);
      if (tokenMask(i)) maxW = Math.max(maxW, s);
    }
  }
  let maxWHead = 0; // separate scale for the per-head fans
  for (let h = 0; h < N_HEADS; h++) {
    for (let q = 0; q < nQ; q++) {
      for (let i = 0; i < N_TOK; i++) {
        if (tokenMask(i)) maxWHead = Math.max(maxWHead, attn[h][q][i]);
      }
    }
  }

  const hubPos = new THREE.Vector3(XSA.hub, RING_CY, 0);
  const GRID = Math.ceil(Math.sqrt(nQ)); // 4×4 for 16 queries
  const SPACING = 3.3;
  const gemPositions = [];
  const gems = [];
  for (let q = 0; q < nQ; q++) {
    const row = Math.floor(q / GRID), col = q % GRID;
    const gp = new THREE.Vector3(
      XSA.readout,
      RING_CY + ((GRID - 1) / 2 - row) * SPACING,
      (col - (GRID - 1) / 2) * SPACING,
    );
    gemPositions.push(gp);
    const gcolor = readoutGemColor(q);
    const gem = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.85),
      new THREE.MeshStandardMaterial({
        color: gcolor, emissive: gcolor, emissiveIntensity: 0.5,
        metalness: 0.6, roughness: 0.22,
      }),
    );
    gem.position.copy(gp);
    gem.userData.pulsePhase = q * 0.9;
    g.add(gem);
    gems.push(gem);

    // Ranked attended tokens for the tooltip / info panel.
    const ranked = w[q]
      .map((v, i) => ({ v, i }))
      .filter(t => tokenMask(t.i))
      .sort((a, b) => b.v - a.v);
    const top = ranked.slice(0, 3)
      .map(t => `${tokName(t.i)} ${(t.v * 100).toFixed(0)}%`)
      .join(" · ");
    registerPickable(gem, {
      title: `${NETWORK_MODE === 1 ? "oracle" : "shared"} readout query ${q + 1} / ${nQ}`,
      badge: "share",
      kv: { "attends most to": top },
      body: `<p>A learned ${DATA.dims.d_token}-d query. It cross-attends (${N_HEADS} heads) over all ${N_TOK} post-reasoning tokens. Only its <b>top-3</b> links are drawn by default — <b>click to expand the full per-head fan</b> (colored by head, H1–H4 chips filter it). Click again to collapse.</p>`,
      onPick: () => selectQuery(q),
    });

    // Default chords: this gem's top-3 attended tokens, head-averaged, amber.
    for (const t of ranked.slice(0, 3)) {
      const norm = t.v / Math.max(maxW, 1e-6);
      const start = xfInfo.exitPos[t.i].clone();
      const mid = start.clone().add(gp).multiplyScalar(0.5);
      mid.z += gp.z * 0.25; // fan gently toward the gem's grid column
      const curve = new THREE.QuadraticBezierCurve3(start, mid, gp.clone());
      const c = addChord(g, curve, Math.max(norm, 0.12), gcolor.getHex(), "readout", undefined);
      c.qTop = q;
    }

    // Full per-head fan (hidden until the gem is selected): top-4 per head.
    for (let h = 0; h < N_HEADS; h++) {
      const rankedH = attn[h][q]
        .map((v, i) => ({ v, i }))
        .filter(t => tokenMask(t.i) && t.v / Math.max(maxWHead, 1e-6) >= 0.08)
        .sort((a, b) => b.v - a.v)
        .slice(0, 4);
      for (const t of rankedH) {
        const norm = t.v / Math.max(maxWHead, 1e-6);
        const start = xfInfo.exitPos[t.i].clone();
        const mid = start.clone().add(gp).multiplyScalar(0.5);
        mid.z += gp.z * 0.25;
        mid.y += (h - (N_HEADS - 1) / 2) * 0.5; // per-head plane offset
        const curve = new THREE.QuadraticBezierCurve3(start, mid, gp.clone());
        const c = addChord(g, curve, norm, HEAD_COLORS[h], "readout", h);
        c.qSel = q;
      }
    }
  }

  // Features hub: policy = concat(16 × 64) → Linear+LN → 256 `features`;
  // oracle = concat(4 × 64) → Linear (no LN) → 256, read only by the trunk.
  const hubColor = NETWORK_MODE === 1 ? ORACLE_VIOLET : READOUT_GOLD;
  const featVec = curReadout().features;
  const hub = new THREE.Mesh(
    new THREE.BoxGeometry(1.7, 4.0, 1.7),
    new THREE.MeshStandardMaterial({
      color: hubColor, emissive: hubColor, emissiveIntensity: 0.4,
      metalness: 0.4, roughness: 0.35,
    }),
  );
  hub.position.copy(hubPos);
  g.add(hub);
  const hubLab = makeLabel(
    NETWORK_MODE === 1
      ? `concat ${nQ}×${curDims().d_token} → Linear → readout (${curDims().d_model}) · no LN`
      : `concat ${nQ}×${curDims().d_token} → Linear+LN → features (${curDims().d_model})`,
    NETWORK_MODE === 1 ? "#e6dcff" : "#ffe9c4", 0.5);
  hubLab.position.copy(hubPos).add(new THREE.Vector3(0, 3.0, 0));
  g.add(hubLab);
  registerPickable(hub, {
    title: NETWORK_MODE === 1 ? "oracle readout_proj" : "shared readout_proj → features",
    badge: "share",
    kv: {
      "in": `${nQ} × ${curDims().d_token} = ${nQ * curDims().d_token}`,
      "out": NETWORK_MODE === 1 ? `${curDims().d_model} (bare Linear)` : `${curDims().d_model} (LayerNorm-pinned)`,
      "‖vec‖": vecMag(featVec).toFixed(2),
    },
    body: NETWORK_MODE === 1
      ? `<p>The ${nQ} query answers are flattened and linearly projected to ${curDims().d_model}d — the only thing the value trunk sees. No LayerNorm here (the trunk's own input LayerNorm pins the scale), and no other consumer: the oracle is a pure value network.</p>`
      : `<p>The ${nQ} query answers are flattened and projected to ${curDims().d_model}d, then LayerNorm pins the scale (v2's correction — v1's bare Linear left it floating). This one vector is <b>everything</b> both networks see: the actor's heads and the critic's value + aux stack all read it. Decision-time attention runs once, here in the encoder.</p>`,
  });
  for (const gp of gemPositions) {
    g.add(makeGlowLine(gp.clone(), hubPos.clone(), hubColor, 0.22));
  }
  return { gemPositions, hubPos: hubPos.clone(), gems };
}

// ============================================================
// STAGE 7: ACTOR heads
// ============================================================
// Live-vs-idle styling: the head that actually decides this scenario is shown
// at full strength; the others stay visible but dimmed.
function headStyle(isLive) {
  return {
    opacity: isLive ? 1.0 : 0.3,
    emissiveBoost: isLive ? 1.0 : 0.25,
    labelColor: isLive ? "#dffbe6" : "#5d6790",
    suffix: isLive ? "" : " · idle",
  };
}

function buildActor() {
  const g = group("actor");
  const lab = makeStageLabel("7 · ACTOR · policy heads", "#80ed99");
  lab.position.set(XS.actor + 4, -9.7, 18);
  g.add(lab);

  const ACTOR_BASE_Y = 12;
  const live = liveHead();

  // adapter cube
  const adapterGeom = new THREE.BoxGeometry(1.6, 3.2, 1.6);
  const adapterMat = new THREE.MeshStandardMaterial({
    color: 0x80ed99, emissive: 0x80ed99, emissiveIntensity: 0.35,
    metalness: 0.35, roughness: 0.4,
  });
  const adapter = new THREE.Mesh(adapterGeom, adapterMat);
  adapter.position.set(XS.actor, ACTOR_BASE_Y, 8);
  g.add(adapter);
  const adapterLab = makeLabel("actor_adapter (256→256)", "#cdf5d8", 0.5);
  adapterLab.position.set(XS.actor, ACTOR_BASE_Y + 2.6, 8);
  g.add(adapterLab);
  registerPickable(adapter, {
    title: "actor_adapter",
    badge: "actor",
    body: `<p>LayerNorm → Linear(256→256) → SiLU → Linear(256→256) → SiLU. Its input is the encoder's shared 256-d <code>features</code> vector — the same one the critic reads. Everything the policy knows arrives through it.</p>`,
  });

  g.add(makeGlowLine(
    readoutInfo.hubPos.clone(),
    adapter.position,
    C.actor, 0.5,
  ));

  // ----- (a) pick head — 2 small balls -----
  const pickStyle = headStyle(live === "pick");
  const pickProbs = softmax(S.actor.pick_logits);
  const headX = XS.heads;
  const pickPositions = [
    { name: "PICK", y: ACTOR_BASE_Y + 1.5, z: 13, prob: pickProbs[0], labelDir: 1 },
    { name: "PASS", y: ACTOR_BASE_Y - 1.5, z: 13, prob: pickProbs[1], labelDir: -1 },
  ];
  for (const p of pickPositions) {
    // Idle probabilities can still be extreme (e.g. PASS ≈ 1 mid-hand);
    // keep the idle balls modest so they don't dominate the live head.
    const r = 0.45 + p.prob * (live === "pick" ? 1.6 : 0.5);
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(r, 22, 16),
      new THREE.MeshStandardMaterial({
        color: 0x80ed99,
        emissive: 0x80ed99,
        emissiveIntensity: (0.3 + p.prob * 0.7) * pickStyle.emissiveBoost,
        metalness: 0.4, roughness: 0.35,
        transparent: pickStyle.opacity < 1, opacity: pickStyle.opacity,
      }),
    );
    ball.position.set(headX, p.y, p.z);
    g.add(ball);
    const pl = makeLabel(
      `${p.name}: ${(p.prob * 100).toFixed(1)}%${pickStyle.suffix}`,
      pickStyle.labelColor, 0.55);
    // Billboarded sprite: offset outward (PICK above, PASS below) past the
    // ball's radius so the label clears the sphere from any camera angle.
    pl.position.set(headX, p.y + p.labelDir * (r + 0.75), p.z);
    g.add(pl);
    registerPickable(ball, {
      title: `pick_head · ${p.name}`,
      badge: "actor",
      kv: {
        "logit": (p.name === "PICK" ? S.actor.pick_logits[0] : S.actor.pick_logits[1]).toFixed(3),
        "prob": p.prob.toFixed(4),
        "live here": live === "pick" ? "yes" : "no",
      },
      body: `<p>pick_head is a Linear(256→2). Logits get divided by <code>temperature_pick</code>, masked to legal actions, and softmaxed against the rest of the action space.${live === "pick" ? "" : " Not the deciding head for this scenario."}</p>`,
    });
    g.add(makeGlowLine(adapter.position, ball.position, 0x80ed99, live === "pick" ? 0.5 : 0.15));
  }

  // ----- (b) two-tower CALL scorer -----
  const callStyle = headStyle(live === "call");
  const callable = S.sample.callable_cards.length
    ? S.sample.callable_cards.map(c => c.code)
    : ["AC", "AS", "AH", "10C", "10S", "10H"]; // illustrative when no call is legal
  const callableIds = callable.map(c => deckIds[c]);
  const cardScores = S.actor.card_scores_all;

  const callLab = makeLabel(
    `two-tower CALL scorer${callStyle.suffix}`, callStyle.labelColor, 0.5);
  callLab.position.set(XS.heads + 4, ACTOR_BASE_Y + 8, 6);
  g.add(callLab);

  const qNode = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0x80ed99, emissive: 0x80ed99,
      emissiveIntensity: 0.6 * callStyle.emissiveBoost,
      transparent: callStyle.opacity < 1, opacity: callStyle.opacity,
    }),
  );
  qNode.position.set(XS.heads - 3, ACTOR_BASE_Y + 5, 6);
  g.add(qNode);
  registerPickable(qNode, {
    title: "two-tower query q = tw_Wg(feat)",
    badge: "actor",
    body: `<p>${DATA.dims.tw_latent}-d query produced from the ${DATA.dims.d_model}-d actor features (tower 1). Dot-producted against tw_We's projection of every card embedding to score CALL actions.</p>`,
  });
  g.add(makeGlowLine(adapter.position, qNode.position, 0x80ed99, live === "call" ? 0.5 : 0.15));

  // Tower 2: the shared 34-card embedding table, projected by tw_We.
  const tableNode = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 1.8, 0.5),
    new THREE.MeshStandardMaterial({
      color: 0xb58bff, emissive: 0xb58bff,
      emissiveIntensity: 0.35 * callStyle.emissiveBoost,
      metalness: 0.4, roughness: 0.4,
      transparent: callStyle.opacity < 1, opacity: callStyle.opacity,
    }),
  );
  tableNode.position.set(XS.heads - 3, ACTOR_BASE_Y + 7.6, 6);
  g.add(tableNode);
  const tableLab = makeLabel(`tw_We(card table 34×${DATA.dims.d_card})`, callStyle.labelColor, 0.4);
  tableLab.position.set(XS.heads - 3, ACTOR_BASE_Y + 9.2, 6);
  g.add(tableLab);
  registerPickable(tableNode, {
    title: "two-tower keys K = tw_We(card_emb)",
    badge: "actor",
    kv: { "keys": `34 × ${DATA.dims.tw_latent}` },
    body: `<p>Tower 2: every row of the shared 34×${DATA.dims.d_card} card embedding table (stage 2, far left) projected to ${DATA.dims.tw_latent}d. Score for a card = q · K[card]ᵀ, so the CALL head inherits everything the embedding learned elsewhere in the network.</p>`,
  });
  g.add(makeGlowLine(tableNode.position, qNode.position, 0xb58bff, live === "call" ? 0.35 : 0.12));

  const minCS = Math.min(...callableIds.map(cid => cardScores[cid]));
  const maxCS = Math.max(...callableIds.map(cid => cardScores[cid]));
  for (let i = 0; i < callable.length; i++) {
    const cid = callableIds[i];
    const s = cardScores[cid];
    const norm = (s - minCS) / Math.max(1e-6, maxCS - minCS);
    const x = XS.heads + i * 1.4;
    const cardGeom = new RoundedBoxGeometry(1.0, 1.5, 0.18, 2, 0.08);
    const ccolor = new THREE.Color().setHSL(0.33, 0.6, 0.3 + norm * 0.4);
    const cardMat = new THREE.MeshStandardMaterial({
      color: ccolor, emissive: ccolor,
      emissiveIntensity: (0.2 + norm * 0.7) * callStyle.emissiveBoost,
      roughness: 0.4,
      transparent: callStyle.opacity < 1, opacity: callStyle.opacity,
    });
    const card = new THREE.Mesh(cardGeom, cardMat);
    card.position.set(x, ACTOR_BASE_Y + 5, 6);
    g.add(card);
    const lab2 = makeLabel(callable[i], callStyle.labelColor, 0.4);
    lab2.position.set(x, ACTOR_BASE_Y + 6.5, 6);
    g.add(lab2);
    g.add(makeGlowLine(qNode.position, card.position, 0x80ed99,
      (0.15 + norm * 0.55) * (live === "call" ? 1 : 0.35)));
    registerPickable(card, {
      title: `CALL ${callable[i]}`,
      badge: "actor",
      kv: { "score": s.toFixed(2), "live here": live === "call" ? "yes" : "no (illustrative)" },
      body: `<p>Score = q · tw_We(card_emb[${cid}])ᵀ. Reusing the shared card embedding means the actor inherits everything the embedding has learned elsewhere.</p>`,
    });
  }

  // ----- (c) small scalar heads: partner-basic + play-under -----
  const pbStyle = headStyle(live === "call");
  const pbNames = ["ALONE", "JD PARTNER"];
  for (let i = 0; i < 2; i++) {
    const chip = new THREE.Mesh(
      new RoundedBoxGeometry(1.4, 0.8, 0.2, 2, 0.08),
      new THREE.MeshStandardMaterial({
        color: 0x5fd9a4, emissive: 0x5fd9a4,
        emissiveIntensity: 0.25 * pbStyle.emissiveBoost,
        transparent: pbStyle.opacity < 1, opacity: pbStyle.opacity,
        roughness: 0.45,
      }),
    );
    chip.position.set(headX + i * 2.2, ACTOR_BASE_Y - 3.2, 11);
    g.add(chip);
    const cl = makeLabel(pbNames[i], pbStyle.labelColor, 0.34);
    cl.position.set(headX + i * 2.2, ACTOR_BASE_Y - 2.3, 11);
    g.add(cl);
    registerPickable(chip, {
      title: `partner_basic_head · ${pbNames[i]}`,
      badge: "actor",
      kv: { "logit": S.actor.partner_basic_logits[i].toFixed(3) },
      body: `<p>Linear(256→2): the two non-card partner options, sharing the softmax with the two-tower CALL scores. Only live in JD-partner mode.</p>`,
    });
    g.add(makeGlowLine(adapter.position, chip.position, 0x5fd9a4, 0.12));
  }
  const puStyle = headStyle(live === "pointer");
  const puChip = new THREE.Mesh(
    new RoundedBoxGeometry(1.4, 0.8, 0.2, 2, 0.08),
    new THREE.MeshStandardMaterial({
      color: 0xb8f0a2, emissive: 0xb8f0a2,
      emissiveIntensity: 0.25 * puStyle.emissiveBoost,
