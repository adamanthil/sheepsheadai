      transparent: puStyle.opacity < 1, opacity: puStyle.opacity,
      roughness: 0.45,
    }),
  );
  puChip.position.set(headX + 4.4, ACTOR_BASE_Y - 3.2, 11);
  g.add(puChip);
  const puLab = makeLabel("PLAY UNDER", puStyle.labelColor, 0.34);
  puLab.position.set(headX + 4.4, ACTOR_BASE_Y - 2.3, 11);
  g.add(puLab);
  registerPickable(puChip, {
    title: "play_under_head",
    badge: "actor",
    kv: { "logit": S.actor.play_under_logit.toFixed(3) },
    body: `<p>Linear(256→1): the one play action that isn't a hand slot — playing the face-down UNDER card. It joins the pointer's slot scores in the play softmax.</p>`,
  });
  g.add(makeGlowLine(adapter.position, puChip.position, 0xb8f0a2, 0.12));

  return { adapter };
}

// ============================================================
// STAGE 8: POINTER — Bahdanau scorer over the hand tokens.
// The 8 post-reasoning hand tokens are re-materialized as a ghost
// row (tethered to the final ring); each slot's combine node mixes
// Wg(features-adapter) with Wt(token) through tanh, and pointer_v
// turns the blend into the score bar above it.
// ============================================================
function buildPointer() {
  const g = group("pointer");
  const live = liveHead();
  const st = headStyle(live === "pointer");
  const lab = makeStageLabel(`8 · POINTER · v·tanh(Wg·feat + Wt·tok)${st.suffix}`, "#b8f0a2");
  lab.position.set(XS.pointer, -9.7, 12);
  g.add(lab);

  const PY = 1.5;              // ghost row height
  const SLOT_DZ = 2.6;
  const slotZ = (i) => (i - 3.5) * SLOT_DZ;
  const ptr = S.actor.pointer;
  const slotScores = ptr.slot_scores;
  const realSlots = handCardIds.map((cid, i) => ({ cid, i })).filter(s => s.cid !== 0);
  const minSlot = Math.min(...realSlots.map(s => slotScores[s.i]));
  const maxSlot = Math.max(...realSlots.map(s => slotScores[s.i]));
  const maxHid = Math.max(...realSlots.map(s => ptr.hidden_norms[s.i]));

  // Wg node: the situation summary, broadcast to every slot.
  const gNode = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 18, 14),
    new THREE.MeshStandardMaterial({
      color: 0xb8f0a2, emissive: 0xb8f0a2,
      emissiveIntensity: 0.6 * st.emissiveBoost,
      metalness: 0.4, roughness: 0.3,
      transparent: st.opacity < 1, opacity: st.opacity,
    }),
  );
  gNode.position.set(XS.pointer - 6, PY + 6.5, 0);
  g.add(gNode);
  const gLab = makeLabel(`g = pointer_Wg(feat) · ${DATA.dims.d_model}→${DATA.dims.pointer_hidden}`, st.labelColor, 0.42);
  gLab.position.set(XS.pointer - 6, PY + 8.1, 0);
  g.add(gLab);
  registerPickable(gNode, {
    title: "pointer_Wg · situation query",
    badge: "actor",
    kv: { "‖g‖": ptr.g_norm.toFixed(2) },
    body: `<p>The actor-adapted features projected to ${DATA.dims.pointer_hidden}d — the "what does this situation want" half of the Bahdanau scorer, broadcast identically to all 8 hand slots.</p>`,
  });
  g.add(makeGlowLine(actorInfo.adapter.position.clone(), gNode.position.clone(), 0xb8f0a2, live === "pointer" ? 0.5 : 0.15));

  const combines = [];
  for (let i = 0; i < 8; i++) {
    const cid = handCardIds[i];
    const isPad = cid === 0;
    const code = isPad ? "PAD" : (idToCode[cid] || `id${cid}`);
    const gp = new THREE.Vector3(XS.pointer, PY, slotZ(i));

    // Ghost hand token (tethered to its final-ring position).
    const ghost = new THREE.Mesh(
      new THREE.SphereGeometry(isPad ? 0.3 : 0.55, 18, 14),
      new THREE.MeshStandardMaterial({
        color: isPad ? C.dim : 0x4cc9f0,
        emissive: isPad ? C.dim : 0x4cc9f0,
        emissiveIntensity: isPad ? 0.05 : 0.4 * st.emissiveBoost,
        metalness: 0.3, roughness: 0.4,
        transparent: true, opacity: isPad ? 0.15 : Math.min(0.85, st.opacity),
      }),
    );
    ghost.position.copy(gp);
    g.add(ghost);
    const isTrump = !isPad && trumpCardCodes.includes(code);
    const glab = makeLabel(code, isPad ? "#5d6790" : (isTrump ? "#ffe89c" : st.labelColor), 0.4);
    glab.position.set(XS.pointer + 0.2, PY - 1.3, slotZ(i));
    g.add(glab);
    if (!isPad) {
      // Tether back to the final transformer ring — same token, same state.
      const src = xfInfo.exitPos[2 + i].clone();
      const mid = src.clone().add(gp).multiplyScalar(0.5);
      mid.y -= 4; // duck under the readout grid on the way over
      const tether = registerConn(
        makeFatLine(new THREE.QuadraticBezierCurve3(src, mid, gp).getPoints(24),
          0x4cc9f0, 0.10, 1.0), 0.10);
      g.add(tether);
      registerPickable(ghost, {
        title: `hand token · ${code}${isTrump ? " (trump)" : ""}`,
        badge: "actor",
        kv: { "‖Wt·tok‖": ptr.t_norms[i].toFixed(2) },
        body: `<p>The same post-reasoning ${DATA.dims.d_token}-d hand token from the final transformer ring (the faint tether), re-materialized here. pointer_Wt projects it to ${DATA.dims.pointer_hidden}d — the "what is this card" half of the scorer.</p>`,
      });

      // tanh-combine node above the ghost token.
      const hidNorm = ptr.hidden_norms[i] / Math.max(maxHid, 1e-6);
      const comb = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.5),
        new THREE.MeshStandardMaterial({
          color: 0xb8f0a2, emissive: 0xb8f0a2,
          emissiveIntensity: (0.15 + hidNorm * 0.7) * st.emissiveBoost,
          metalness: 0.5, roughness: 0.25,
          transparent: st.opacity < 1, opacity: st.opacity,
        }),
      );
      comb.position.set(XS.pointer, PY + 3.0, slotZ(i));
      comb.userData.pulsePhase = i * 0.8;
      g.add(comb);
      combines.push(comb);
      registerPickable(comb, {
        title: `tanh combine · slot ${i} (${code})`,
        badge: "actor",
        kv: { "‖tanh(g + t)‖": ptr.hidden_norms[i].toFixed(2), "score": slotScores[i].toFixed(2) },
        body: `<p>e = tanh(g + Wt·token): the situation query and this card's token added and squashed. pointer_v (the beam upward) reads the blend out as one scalar score.</p>`,
      });
      g.add(makeGlowLine(gNode.position.clone(), comb.position.clone(), 0xb8f0a2,
        (live === "pointer" ? 0.28 : 0.10)));
      g.add(makeGlowLine(gp.clone(), comb.position.clone(), 0x4cc9f0,
        (live === "pointer" ? 0.4 : 0.14)));

      // Score bar: v · e, height/heat by within-hand normalized score.
      const norm = (slotScores[i] - minSlot) / Math.max(1e-6, maxSlot - minSlot);
      const barH = 0.4 + norm * 3.4;
      const bcolor = new THREE.Color().setHSL(0.32, 0.7, 0.28 + norm * 0.42);
      const bar = new THREE.Mesh(
        new RoundedBoxGeometry(0.85, barH, 0.85, 2, 0.08),
        new THREE.MeshStandardMaterial({
          color: bcolor, emissive: bcolor,
          emissiveIntensity: (0.2 + norm * 0.65) * st.emissiveBoost,
          transparent: st.opacity < 1, opacity: st.opacity,
          roughness: 0.4,
        }),
      );
      bar.position.set(XS.pointer, PY + 5.2 + barH / 2, slotZ(i));
      g.add(bar);
      const blab = makeLabel(slotScores[i].toFixed(1), st.labelColor, 0.36);
      blab.position.set(XS.pointer, PY + 5.9 + barH, slotZ(i));
      g.add(blab);
      registerPickable(bar, {
        title: `pointer score · ${code}`,
        badge: "actor",
        kv: { "score": slotScores[i].toFixed(3) },
        body: `<p>This slot's scalar is scattered into the BURY ${code} / UNDER ${code} / PLAY ${code} action logits via precomputed card-id maps — one scorer serves all three phases.</p>`,
      });
      g.add(makeGlowLine(comb.position.clone(), new THREE.Vector3(XS.pointer, PY + 5.2, slotZ(i)), bcolor.getHex(),
        (0.15 + norm * 0.5) * (live === "pointer" ? 1 : 0.35)));
    }
  }
  const vLab = makeLabel(`score = pointer_v · e  (${DATA.dims.pointer_hidden}→1)`, st.labelColor, 0.42);
  vLab.position.set(XS.pointer, PY + 4.3, -(3.5 * SLOT_DZ) - 3.4);
  g.add(vLab);

  return { gNode, combines };
}

// ============================================================
// STAGE 9: OUTPUT · π(a | s) — generic top-K action bars
// ============================================================
function buildOutput() {
  const g = group("output");
  const lab = makeStageLabel("9 · OUTPUT · π(a | s)", "#ff6b6b");
  lab.position.set(XS.output, -9.7, 0);
  g.add(lab);

  const probs = S.actor.full_probs;
  const entries = S.actor.valid_action_indices
    .map(idx => ({ idx, name: ACTIONS[idx], prob: probs[idx] }))
    .sort((a, b) => b.prob - a.prob);
  const shown = entries.slice(0, 8);
  const hidden = entries.length - shown.length;

  const barSpacing = 3.4;
  const z0 = -((shown.length - 1) / 2) * barSpacing;
  const barObjs = [];
  for (let i = 0; i < shown.length; i++) {
    const e = shown[i];
    const chosen = e.name === S.sample.chosen_action;
    const h = 0.5 + e.prob * 10;
    const color = chosen ? 0x80ed99 : 0x8aa0e0;
    const m = new THREE.Mesh(
      new RoundedBoxGeometry(2.4, h, 2.4, 2, 0.12),
      new THREE.MeshStandardMaterial({
        color, emissive: color, emissiveIntensity: 0.25 + e.prob * 0.5,
        metalness: 0.3, roughness: 0.4,
      }),
    );
    m.position.set(XS.output, h / 2, z0 + i * barSpacing);
    g.add(m);
    barObjs.push({ mesh: m, entry: e, targetH: h });
    const labOut = makeLabel(
      `${e.name}  ${(e.prob * 100).toFixed(1)}%${chosen ? " ✓" : ""}`,
      chosen ? "#dffbe6" : "#cdd9ff", 0.55);
    labOut.position.set(XS.output, h + 0.8, z0 + i * barSpacing);
    g.add(labOut);
    registerPickable(m, {
      title: `π(${e.name})`,
      badge: "output",
      kv: {
        "prob": e.prob.toFixed(4),
        "logit": S.actor.full_logits[e.idx].toFixed(3),
        "chosen": chosen ? "yes (argmax)" : "no",
      },
      body: `<p>Final action probability after masking illegal actions and applying softmax across all ${entries.length} legal actions of this decision.</p>`,
    });
  }
  if (hidden > 0) {
    const moreLab = makeLabel(`+ ${hidden} more legal actions`, "#8e9bd1", 0.45);
    moreLab.position.set(XS.output, 0.6, z0 + shown.length * barSpacing);
    g.add(moreLab);
  }

  // actor adapter → output bars
  const adapterPos = new THREE.Vector3(XS.actor, 12, 8);
  for (const b of barObjs) {
    g.add(makeGlowLine(adapterPos, b.mesh.position, C.output, 0.2));
  }

  return { barObjs, entries };
}

// ============================================================
// STAGE 10: CRITIC VALUE — shared features → deep trunk → V(s)
// ============================================================
const CRITIC_Y = -2;   // keep the critic lanes above the floor grid at y=-10
const CRITIC_VZ = -12; // value lane
const CRITIC_AZ = -24; // aux lane

function buildCriticValue() {
  const g = group("criticV");
  const lab = makeStageLabel("10 · CRITIC · features → value", "#ff9ec7");
  lab.position.set(XS.criticTrunk + 4, -9.7, CRITIC_VZ - 6);
  g.add(lab);

  // value_trunk box
  const trunk = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 3.2, 1.6),
    new THREE.MeshStandardMaterial({
      color: 0xff9ec7, emissive: 0xff9ec7, emissiveIntensity: 0.35,
      metalness: 0.35, roughness: 0.4,
    }),
  );
  trunk.position.set(XS.criticTrunk, CRITIC_Y, CRITIC_VZ);
  g.add(trunk);
  const trunkLab = makeLabel("value_trunk (256→256→256)", "#ffd6e8", 0.5);
  trunkLab.position.set(XS.criticTrunk, CRITIC_Y + 2.6, CRITIC_VZ);
  g.add(trunkLab);
  registerPickable(trunk, {
    title: "value_trunk",
    badge: "critic",
    kv: { "‖trunk out‖": S.critic.value_trunk_norm.toFixed(2) },
    body: `<p>LayerNorm → Linear(256→256) → SiLU → Linear(256→256) → SiLU, fed by the <b>same</b> shared features the actor reads. Deep and dedicated so the value head can fit the spread of returns; the aux heads (next stage) branch off a separate shallow adapter.</p>`,
  });
  g.add(makeGlowLine(readoutInfo.hubPos.clone(), trunk.position.clone(), C.critic, 0.5));

  // V(s): one signed crystal — green above water, red below.
  const v = S.critic.value;
  const vMagNorm = clamp(Math.abs(v) / 1.5, 0, 1);
  const vColor = v >= 0 ? 0x62e88a : 0xff6b6b;
  const crystal = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.1 + vMagNorm * 1.2, 0),
    new THREE.MeshStandardMaterial({
      color: vColor, emissive: vColor,
      emissiveIntensity: 0.4 + vMagNorm * 0.5,
      metalness: 0.55, roughness: 0.2,
      flatShading: true,
    }),
  );
  crystal.position.set(XS.criticV, CRITIC_Y, CRITIC_VZ);
  g.add(crystal);
  const vLab = makeLabel(`V(s) = ${v.toFixed(3)}`, v >= 0 ? "#dffbe6" : "#ffd0d0", 0.65);
  vLab.position.set(XS.criticV, CRITIC_Y + 3.1, CRITIC_VZ);
  g.add(vLab);
  registerPickable(crystal, {
    title: "value_head · V(s)",
    badge: "critic",
    kv: { "V(s)": v.toFixed(4) },
    body: `<p>State value from the critic's ${DATA.dims.d_model}-d trunk — used to compute advantages via GAE. Green = positive expected return for this seat, red = negative; size and glow scale with |V|.</p>`,
  });
  g.add(makeGlowLine(trunk.position.clone(), crystal.position.clone(), vColor, 0.55));

  return { trunk, crystal };
}

// ============================================================
// STAGE 11: CRITIC AUX — the training-only prediction stack that
// shapes the shared features: win / return / secret-partner gauges,
// per-seat points, and the trump tracker.
// ============================================================
function buildCriticAux() {
  const g = group("criticAux");
  const aux = S.critic.aux;
  const lab = makeStageLabel("11 · CRITIC AUX · training-only heads", "#e08cff");
  lab.position.set(XS.aux + 10, -9.7, CRITIC_AZ - 8);
  g.add(lab);

  // Shallow critic adapter feeding every aux head.
  const adapter = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 2.8, 1.5),
    new THREE.MeshStandardMaterial({
      color: 0xe08cff, emissive: 0xe08cff, emissiveIntensity: 0.35,
      metalness: 0.35, roughness: 0.4,
    }),
  );
  adapter.position.set(XS.aux, CRITIC_Y, CRITIC_AZ);
  g.add(adapter);
  const adLab = makeLabel("critic_adapter (LN→256→SiLU)", "#f3d9ff", 0.46);
  adLab.position.set(XS.aux, CRITIC_Y + 2.4, CRITIC_AZ);
  g.add(adLab);
  registerPickable(adapter, {
    title: "critic_adapter",
    badge: "critic",
    body: `<p>Shallow shared adapter for the auxiliary tasks. These heads only exist at training time — their gradients flow back through the shared features and readout, forcing the encoder to represent who is winning, where the points sit, and which trump are gone. At play time only V(s) is used.</p>`,
  });
  g.add(makeGlowLine(readoutInfo.hubPos.clone(), adapter.position.clone(), 0xe08cff, 0.4));

  // --- three scalar gauges: win / expected return / secret partner ---
  const gaugeDefs = [
    { name: "P(win)", val: aux.win_prob, fmt: `${(aux.win_prob * 100).toFixed(0)}%`,
      color: 0x62e88a, strength: aux.win_prob,
      title: "win_head", body: `<p>Sigmoid head: probability this seat's side takes the hand. Glow tracks the probability.</p>` },
    { name: "E[return]", val: aux.expected_return, fmt: aux.expected_return.toFixed(2),
      color: aux.expected_return >= 0 ? 0x62e88a : 0xff6b6b,
      strength: clamp(Math.abs(aux.expected_return) / 1.5, 0.1, 1),
      title: "return_head", body: `<p>Linear head: expected final chip return for this seat.</p>` },
    { name: "P(secret partner)", val: aux.secret_partner_prob, fmt: `${(aux.secret_partner_prob * 100).toFixed(0)}%`,
      color: 0xffc65c, strength: aux.secret_partner_prob,
      title: "secret_partner_head", body: `<p>Sigmoid head: is there a still-unrevealed partner at the table? Tracks the called card's owner staying hidden.</p>` },
  ];
  for (let i = 0; i < gaugeDefs.length; i++) {
    const gd = gaugeDefs[i];
    const orb = new THREE.Mesh(
      new THREE.SphereGeometry(0.55 + gd.strength * 0.5, 20, 16),
      new THREE.MeshStandardMaterial({
        color: gd.color, emissive: gd.color,
        emissiveIntensity: 0.2 + gd.strength * 0.6,
        metalness: 0.4, roughness: 0.3,
      }),
    );
    orb.position.set(XS.aux + 7, CRITIC_Y + 3.2 - i * 3.2, CRITIC_AZ);
    g.add(orb);
    const ol = makeLabel(`${gd.name} = ${gd.fmt}`, "#f3d9ff", 0.44);
    ol.position.set(XS.aux + 7, CRITIC_Y + 4.5 - i * 3.2, CRITIC_AZ);
    g.add(ol);
    registerPickable(orb, { title: gd.title, badge: "critic", kv: { [gd.name]: gd.fmt }, body: gd.body });
    g.add(makeGlowLine(adapter.position.clone(), orb.position.clone(), 0xe08cff, 0.18));
  }

  // --- per-seat points bars (relative seat order: me, +1 … +4) ---
  const seatNames = ["me", "+1", "+2", "+3", "+4"];
  const ptsLab = makeLabel("points_head · predicted points per seat", "#f3d9ff", 0.44);
  ptsLab.position.set(XS.aux + 14, CRITIC_Y + 6.2, CRITIC_AZ + 1);
  g.add(ptsLab);
  for (let i = 0; i < 5; i++) {
    const pts = aux.points[i];
    const norm = clamp(pts / 120, 0, 1);
    const h = 0.3 + norm * 5.2;
    const pcolor = new THREE.Color().setHSL(0.85, 0.55, 0.35 + norm * 0.3);
    const bar = new THREE.Mesh(
      new RoundedBoxGeometry(1.0, h, 1.0, 2, 0.08),
      new THREE.MeshStandardMaterial({
        color: pcolor, emissive: pcolor,
        emissiveIntensity: 0.2 + norm * 0.5,
        roughness: 0.4,
      }),
    );
    bar.position.set(XS.aux + 14, CRITIC_Y - 1.6 + h / 2, CRITIC_AZ + 5 - i * 2.4);
    g.add(bar);
    const bl = makeLabel(`${seatNames[i]} · ${pts.toFixed(0)}`, "#f3d9ff", 0.4);
    bl.position.set(XS.aux + 14, CRITIC_Y - 0.9 + h, CRITIC_AZ + 5 - i * 2.4);
    g.add(bl);
    registerPickable(bar, {
      title: `points_head · seat ${seatNames[i]}`,
      badge: "critic",
      kv: { "predicted points": pts.toFixed(1) },
      body: `<p>Predicted final card points (0–120) for the seat ${i === 0 ? "making this decision" : `${i} to the left`}. Five bars must implicitly sum to ~120 — a full accounting of where the points will land.</p>`,
    });
    g.add(makeGlowLine(adapter.position.clone(), new THREE.Vector3(XS.aux + 14, CRITIC_Y - 1.6, CRITIC_AZ + 5 - i * 2.4), 0xe08cff, 0.12));
  }

  // --- trump tracker: 14 chips (2×7) + unseen-higher lamp ---
  const trumpX = XS.aux + 22;
  const ttLab = makeLabel("trump tracker · P(seen) per trump", "#ffe9c4", 0.46);
  ttLab.position.set(trumpX, CRITIC_Y + 7.0, CRITIC_AZ + 0.5);
  g.add(ttLab);
  const ttNode = new THREE.Mesh(
    new THREE.BoxGeometry(1.1, 1.1, 1.1),
    new THREE.MeshStandardMaterial({
      color: 0xffc65c, emissive: 0xffc65c, emissiveIntensity: 0.35,
      metalness: 0.4, roughness: 0.4,
    }),
  );
  ttNode.position.set(trumpX - 4, CRITIC_Y + 2, CRITIC_AZ);
  g.add(ttNode);
  registerPickable(ttNode, {
    title: "trump_aux (LN→128→SiLU)",
    badge: "critic",
    body: `<p>Dedicated 128-d tower for card counting. Its query is dotted against tw-style keys built from the <b>shared card embedding table</b> (plus a learned per-trump offset) — one logit per trump card.</p>`,
  });
  g.add(makeGlowLine(adapter.position.clone(), ttNode.position.clone(), 0xffc65c, 0.25));
  for (let i = 0; i < trumpCardCodes.length; i++) {
    const code = trumpCardCodes[i];
    const p = aux.seen_trump_probs[i];
    const row = Math.floor(i / 7), col = i % 7;
    const inHand = handCardCodes.includes(code);
    const ccolor = new THREE.Color().setHSL(0.11, 0.75, 0.18 + p * 0.45);
    const chip = new THREE.Mesh(
      new RoundedBoxGeometry(1.05, 1.5, 0.16, 2, 0.07),
      new THREE.MeshStandardMaterial({
        color: ccolor, emissive: ccolor,
        emissiveIntensity: 0.08 + p * 0.75,
        roughness: 0.45,
      }),
    );
    chip.position.set(trumpX + col * 1.4, CRITIC_Y + 4.4 - row * 2.1, CRITIC_AZ + 0.5);
    g.add(chip);
    const cl = makeLabel(code, p > 0.5 ? "#ffe9c4" : "#5d6790", 0.32);
    cl.position.set(trumpX + col * 1.4, CRITIC_Y + 5.3 - row * 2.1, CRITIC_AZ + 0.5);
    g.add(cl);
    registerPickable(chip, {
      title: `seen-trump · ${code}`,
      badge: "critic",
      kv: { "P(seen/known)": `${(p * 100).toFixed(0)}%`, "in this hand": inHand ? "yes" : "no" },
      body: `<p>Predicted probability that ${code} is accounted for from this seat's view (in hand, on the table, or already played). Bright = counted, dark = still out there.</p>`,
    });
  }
  g.add(makeGlowLine(ttNode.position.clone(), new THREE.Vector3(trumpX, CRITIC_Y + 3.4, CRITIC_AZ + 0.5), 0xffc65c, 0.3));

  // Unseen-higher lamp: is there a live trump above my best?
  const uh = aux.unseen_higher_prob;
  const lampColor = uh > 0.5 ? 0xff6b6b : 0x62e88a;
  const lamp = new THREE.Mesh(
    new THREE.SphereGeometry(0.5 + uh * 0.4, 18, 14),
    new THREE.MeshStandardMaterial({
      color: lampColor, emissive: lampColor,
      emissiveIntensity: 0.25 + uh * 0.55,
      metalness: 0.4, roughness: 0.3,
    }),
  );
  lamp.position.set(trumpX + 4.2, CRITIC_Y + 0.4, CRITIC_AZ + 0.5);
  g.add(lamp);
  const lampLab = makeLabel(
    `P(unseen higher trump) = ${(uh * 100).toFixed(0)}%`, "#f3d9ff", 0.42);
  lampLab.position.set(trumpX + 4.2, CRITIC_Y - 0.9, CRITIC_AZ + 0.5);
  g.add(lampLab);
  registerPickable(lamp, {
    title: "unseen_trump_higher_than_hand_head",
    badge: "critic",
    kv: { "P": `${(uh * 100).toFixed(1)}%` },
    body: `<p>Probability that a trump higher than this seat's best is still unaccounted for. Red = boss trump may be out against you; green = your best trump is the boss.</p>`,
  });
  g.add(makeGlowLine(ttNode.position.clone(), lamp.position.clone(), 0xffc65c, 0.2));

  return { adapter };
}

// ============================================================
// ORACLE STAGE 1: FULL-INFORMATION OBSERVATION — every hand face
// up, the true blind/bury/under, per-seat points, partner halo.
// ============================================================
function buildOracleObservation() {
  const g = group("input");
  const lab = makeStageLabel("1 · FULL-INFORMATION OBSERVATION", "#c9b8ff");
  lab.position.set(XSA.input, -9.7, 0);
  g.add(lab);

  const so = SO.sample;
  const cardObjs = [];
  const fanAnchors = [];

  const makeFan = ({ codes, z, big, label, labelColor, holder }) => {
    const spacing = big ? (codes.length <= 6 ? 1.9 : 1.6) : 1.35;
    const topY = big ? 8 : 7;
    const w = big ? 3.4 : 2.4, h = big ? 4.6 : 3.2;
    const fl = makeLabel(label, labelColor, 0.5);
    fl.position.set(XSA.input, topY + 2.2, z);
    g.add(fl);
    for (let i = 0; i < codes.length; i++) {
      const code = codes[i];
      const isTrump = trumpCardCodes.includes(code);
      const color = isTrump ? 0xd4af37 : (big ? 0x8aa0e0 : 0x8f7bff);
      const card = new THREE.Mesh(
        new RoundedBoxGeometry(w, h, 0.26, 3, 0.15),
        new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 0.15,
          metalness: 0.4, roughness: 0.38,
        }),
      );
      card.position.set(XSA.input, topY - i * spacing, z + i * 0.22);
      card.rotation.y = 0.45;
      card.userData.baseY = card.position.y;
      g.add(card);
      cardObjs.push(card);
      const cl = makeLabel(code, isTrump ? "#ffe89c" : "#d5defa", big ? 0.6 : 0.45);
      cl.position.set(XSA.input + (big ? 2.7 : 2.0), topY - i * spacing, z + i * 0.22 + 0.4);
      g.add(cl);
      registerPickable(card, {
        title: `${code}${holder ? " · " + holder : ""}`,
        badge: "input",
        body: `<p>${isTrump ? "<b>Trump.</b> " : ""}${holder
          ? `In ${holder}'s hand — hidden from the acting player, visible only to the oracle.`
          : "The acting seat's own card (also in the policy observation)."}</p>`,
      });
    }
    fanAnchors.push(new THREE.Vector3(
      XSA.input + 2, topY - (codes.length - 1) * spacing * 0.5, z));
  };

  // Own hand center; the four hidden hands flank it.
  makeFan({
    codes: handCardCodes, z: 0, big: true,
    label: `seat ${S.sample.seat} · me`, labelColor: "#cdd9ff",
  });
  const oppZ = [-16, -8, 8, 16];
  for (let s = 0; s < 4; s++) {
    const isPartner = so.secret_partner_rel >= 2 && s === so.secret_partner_rel - 2;
    const isPicker = so.picker_rel >= 2 && s === so.picker_rel - 2;
    makeFan({
      codes: so.opp_hand_codes[s], z: oppZ[s], big: false,
      label: `+${s + 1}${isPartner ? " ★ partner" : ""}${isPicker ? " · picker" : ""}`,
      labelColor: isPartner ? "#ffe1a3" : "#d9ccff",
      holder: `seat +${s + 1}`,
    });
    if (isPartner) {
      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(3.4, 0.09, 10, 48),
        new THREE.MeshBasicMaterial({
          color: PARTNER_GOLD, transparent: true, opacity: 0.55,
          blending: THREE.AdditiveBlending, depthWrite: false,
        }),
      );
      halo.position.set(XSA.input - 0.8, 4.2, oppZ[s] + 0.6);
      halo.rotation.y = Math.PI / 2 - 0.45;
      g.add(halo);
      registerPickable(halo, {
        title: "secret partner",
        badge: "input",
        body: `<p>This seat holds the called card — the still-hidden partner. The oracle is told outright (<code>secret_partner_rel</code>); the acting player has to infer it from play.</p>`,
      });
    }
  }

  // True blind / bury / under — the cards nobody at the table can see.
  const priv = [
    ...so.blind_cards.map(c => ({ code: c, tag: "blind (true)" })),
    ...so.bury_cards.map(c => ({ code: c, tag: "bury (true)" })),
    ...(so.under_card ? [{ code: so.under_card, tag: "under" }] : []),
  ];
  if (priv.length) {
    const pl = makeLabel("true blind · bury · under", "#e6dcff", 0.45);
    pl.position.set(XSA.input, -2.2, -9);
    g.add(pl);
    for (let i = 0; i < priv.length; i++) {
      const { code, tag } = priv[i];
      const isTrump = trumpCardCodes.includes(code);
      const chip = new THREE.Mesh(
        new RoundedBoxGeometry(1.9, 2.6, 0.22, 3, 0.12),
        new THREE.MeshStandardMaterial({
          color: 0xb58bff, emissive: 0xb58bff, emissiveIntensity: 0.22,
          metalness: 0.4, roughness: 0.4,
        }),
      );
      chip.position.set(XSA.input, -4.4, -12.5 + i * 2.2);
      chip.rotation.y = 0.45;
      g.add(chip);
      const cl = makeLabel(code, isTrump ? "#ffe89c" : "#e6dcff", 0.42);
      cl.position.set(XSA.input + 1.5, -4.4, -12.3 + i * 2.2);
      g.add(cl);
      registerPickable(chip, {
        title: `${code} · ${tag}`,
        badge: "input",
        body: `<p>${tag === "under" ? "The face-down under card." : `In the ${tag.split(" ")[0]} — face down on the table.`} Only the oracle's observation carries it${tag.startsWith("blind") ? " for every seat (the policy sees the blind only as the picker)" : ""}.</p>`,
      });
    }
  }

  // Per-seat points taken so far.
  const seatNames = ["me", "+1", "+2", "+3", "+4"];
  const ptsLab = makeLabel("points taken", "#e6dcff", 0.45);
  ptsLab.position.set(XSA.input, -2.2, 9);
  g.add(ptsLab);
  for (let i = 0; i < 5; i++) {
    const pts = so.points_taken_rel[i];
    const norm = clamp(pts / 120, 0, 1);
    const chip = new THREE.Mesh(
      new RoundedBoxGeometry(1.7, 1.1, 0.22, 2, 0.1),
      new THREE.MeshStandardMaterial({
        color: 0xc17bea, emissive: 0xc17bea,
        emissiveIntensity: 0.1 + norm * 0.6, roughness: 0.4,
      }),
    );
    chip.position.set(XSA.input, -4.2, 6 + i * 2.1);
    chip.rotation.y = 0.45;

// ============================================================
// Data-flow particles: every connection edge registered a curve;
// one Points cloud rides them all. Particle count and brightness
// scale with the edge's intensity, stage dimming carries over, and
// advancing the tour fires a burst along the newly active stage.
// ============================================================
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let flowEnabled = !reducedMotion;
let flowState = null;
let flowBurst = null;
const groupDimMap = {};

function makeFlowTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 64;
  const ctx = c.getContext("2d");
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.35, "rgba(255,255,255,0.6)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

function buildFlowSystem() {
  const edges = [];
  for (const [name, grp] of Object.entries(stageGroups)) {
    grp.traverse((o) => {
      if (!o.userData.flowCurve) return;
      edges.push({
        curve: o.userData.flowCurve,
        group: name,
        colorObj: new THREE.Color(o.userData.flowColor),
        intensity: o.userData.flowIntensity,
        boost: o.userData.flowBoost || 1,
        length: o.userData.flowCurve.getLength(),
      });
    });
  }
  const particles = [];
  for (const e of edges) {
    const n = Math.min(8, Math.max(1, Math.round(e.intensity * 8))) * e.boost;
    for (let k = 0; k < n; k++) {
      particles.push({
        edge: e,
        t: Math.random(),
        speed: (6 + Math.random() * 4) / Math.max(e.length, 4), // ~6-10 units/s
      });
    }
  }
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(particles.length * 3);
  const colors = new Float32Array(particles.length * 3);
  geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geom.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.7, map: makeFlowTexture(), vertexColors: true,
    transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, sizeAttenuation: true,
  });
  const points = new THREE.Points(geom, mat);
  points.frustumCulled = false;
  sceneRoot.add(points);
  flowState = { particles, points, geom };
}

const _flowVec = new THREE.Vector3();
function updateFlow(nowMs, dt) {
  if (!flowState) return;
  flowState.points.visible = flowEnabled;
  if (!flowEnabled) return;
  const pos = flowState.geom.attributes.position.array;
  const col = flowState.geom.attributes.color.array;
  const burstAge = flowBurst ? (nowMs - flowBurst.t0) / 1000 : Infinity;
  const burstK = burstAge < 1.6 ? Math.exp(-burstAge * 2.2) : 0;
  for (let i = 0; i < flowState.particles.length; i++) {
    const p = flowState.particles[i];
    const e = p.edge;
    const inBurst = burstK > 0 && flowBurst.groups.has(e.group);
    const speedMul = inBurst ? 1 + 1.8 * burstK : 1;
    p.t = (p.t + dt * p.speed * speedMul) % 1;
    e.curve.getPoint(p.t, _flowVec);
    pos[i * 3] = _flowVec.x;
    pos[i * 3 + 1] = _flowVec.y;
    pos[i * 3 + 2] = _flowVec.z;
    const dim = groupDimMap[e.group] ?? 1;
    const wave = 0.7 + 0.3 * Math.sin((p.t * 5 + pulseT * 0.4) * Math.PI * 2);
    const b = clamp(e.intensity * 1.7, 0.3, 0.95) * dim * wave
      * (inBurst ? 1 + 2.2 * burstK : 1) * (e.boost > 1 ? 1.25 : 1);
    col[i * 3] = e.colorObj.r * b;
    col[i * 3 + 1] = e.colorObj.g * b;
    col[i * 3 + 2] = e.colorObj.b * b;
  }
  flowState.geom.attributes.position.needsUpdate = true;
  flowState.geom.attributes.color.needsUpdate = true;
}

// ============================================================
// Stage emphasis: the toured stage renders at full strength, the
// rest of the scene recedes. Intro/overview show everything.
// ============================================================
const XF_ALL = ["xf", "xf0", "xf1", "xf2", "xf3"].slice(0, N_LAYERS + 1);
const STAGE_GROUPS = {
  input: ["input"],
  embed: ["input", "embed"],
  tokens: ["embed", "tokens"],
  xf: ["tokens", ...XF_ALL],
  xfL1: ["xf", "xf0"],
  xfL2: ["xf", "xf1"],
  xfL3: ["xf", "xf2"],
  xfL4: ["xf", "xf3"],
  gru: [`xf${N_LAYERS - 1}`, "gru"],
  readout: [`xf${N_LAYERS - 1}`, "readout"],
  actor: ["readout", "actor"],
  pointer: [`xf${N_LAYERS - 1}`, "actor", "pointer"],
  output: ["actor", "pointer", "output"],
  criticV: ["readout", "criticV"],
  criticAux: ["criticV", "criticAux"],
  // Oracle-mode stages (same group names — only one scene exists at a time).
  oObs: ["input"],
  oEmbed: ["input", "embed"],
  oTokens: ["embed", "tokens"],
  oXf: ["tokens", ...XF_ALL],
  oXfL1: ["xf", "xf0"],
  oXfL2: ["xf", "xf1"],
  oXfL3: ["xf", "xf2"],
  oXfL4: ["xf", "xf3"],
  oGru: [`xf${N_LAYERS - 1}`, "gru"],
  oReadout: [`xf${N_LAYERS - 1}`, "readout"],
  oValue: ["readout", "oValue"],
};
const chordDimMap = {}; // per-group chord dim factors, read by animate()
function applyStageDim() {
  const s = STAGES[curStage];
  const active = s ? STAGE_GROUPS[s.label] ?? null : null;
  for (const [name, grp] of Object.entries(stageGroups)) {
    const on = !active || active.includes(name);
    // Additive chords stay hot even at 0.3 — push inactive bundles way down
    // so the focused stage's attention actually owns the frame.
    chordDimMap[name] = on ? 1 : 0.12;
    groupDimMap[name] = on ? 1 : 0.15; // flow particles follow stage focus
    const om = on ? 1 : 0.3;
    const em = on ? 1 : 0.25;
    grp.traverse((o) => {
      if (o.isSprite) { o.userData.dimFactor = on ? 1 : 0.22; return; }
      const mats = o.material ? (Array.isArray(o.material) ? o.material : [o.material]) : [];
      for (const m of mats) {
        if (m.userData.baseOpacity === undefined) {
          m.userData.baseOpacity = m.opacity;
          m.userData.baseTransparent = m.transparent;
          if (typeof m.emissiveIntensity === "number") {
            m.userData.baseEmissive = m.emissiveIntensity;
          }
        }
        m.transparent = m.userData.baseTransparent || !on;
        m.opacity = m.userData.baseOpacity * om;
        if (m.userData.baseEmissive !== undefined) {
          m.emissiveIntensity = m.userData.baseEmissive * em;
        }
      }
    });
  }
}

const camState = {
  curPos: camera.position.clone(),
  curTarget: controls.target.clone(),
  tgtPos: camera.position.clone(),
  tgtTarget: controls.target.clone(),
  t: 1, // interpolation (>=1 means done)
  duration: 1500,
};
function tweenTo(pos, target, duration = 1500) {
  camState.curPos = camera.position.clone();
  camState.curTarget = controls.target.clone();
  camState.tgtPos = new THREE.Vector3(...pos);
  camState.tgtTarget = new THREE.Vector3(...target);
  camState.t = 0;
  camState.duration = duration;
  camState.startTime = performance.now();
  controls.autoRotate = false; // don't fight the tween; restored when done
}
function updateCameraTween() {
  if (camState.t >= 1) return;
  const elapsed = performance.now() - camState.startTime;
  let t = clamp(elapsed / camState.duration, 0, 1);
  // ease in-out cubic
  const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  camera.position.lerpVectors(camState.curPos, camState.tgtPos, e);
  controls.target.lerpVectors(camState.curTarget, camState.tgtTarget, e);
  camState.t = t;
  if (t >= 1) {
    controls.autoRotate = document.getElementById("chk-rotate").checked;
  }
}

// Render loop: chord breathing, flow particles, output grow-in, idle motion.
let pulseT = 0;
let frameCount = 0;
let lastNow = 0;
let outputAnim = null;
function animate(now) {
  requestAnimationFrame(animate);
  controls.update();
  updateCameraTween();
  now = now || 0;
  const dt = Math.min((now - lastNow) / 1000 || 0.016, 0.05);
  lastNow = now;
  pulseT = now * 0.001;

  // Gentle pulse on attention chords proportional to weight
  const breath = reducedMotion ? 1 : 0.6 + Math.sin(pulseT * 1.3) * 0.4;
  for (const c of allChords) {
    if (!c.mesh.visible) continue;
    c.mesh.material.opacity =
      Math.min(1, c.baseOpacity * (0.7 + breath * 0.4)) * (chordDimMap[c.group] ?? 1);
  }
  // Query gems (and the pointer's combine nodes) slowly spin and pulse in
  // sync with the chord breathing; the selected gem pulses harder.
  if (!reducedMotion) {
    const gems = readoutInfo ? readoutInfo.gems : null;
    if (gems) {
      for (let q = 0; q < gems.length; q++) {
        const gem = gems[q];
        gem.rotation.y += dt * (q === selectedQuery ? 1.4 : 0.5);
        const ph = gem.userData.pulsePhase || 0;
        const amp = q === selectedQuery ? 0.16 : 0.07;
        gem.scale.setScalar(1 + amp * Math.sin(pulseT * 1.3 + ph));
      }
    }
    if (pointerInfo && pointerInfo.combines) {
      for (const node of pointerInfo.combines) {
        node.rotation.y += dt * 0.5;
        const ph = node.userData.pulsePhase || 0;
        node.scale.setScalar(1 + 0.07 * Math.sin(pulseT * 1.3 + ph));
      }
    }
  }

  updateFlow(now, dt);

  // Output bars grow in when the output stage arrives.
  if (outputAnim && outputInfo) {
    const t = Math.min((now - outputAnim.t0) / 800, 1);
    const e = 1 - Math.pow(1 - t, 3);
    for (const b of outputInfo.barObjs) {
      b.mesh.scale.y = Math.max(e, 0.02);
      b.mesh.position.y = (b.targetH * b.mesh.scale.y) / 2;
    }
    if (t >= 1) outputAnim = null;
  }

  // Idle micro-motion: hand cards bob, the GRU prism slowly turns.
  if (flowEnabled && !reducedMotion) {
    if (memInfo) memInfo.gru.rotation.y += dt * 0.3;
    if (inputInfo) {
      for (let i = 0; i < inputInfo.cardObjs.length; i++) {
        const card = inputInfo.cardObjs[i];
        card.position.y = card.userData.baseY + Math.sin(pulseT * 0.9 + i * 0.8) * 0.07;
      }
    }
  }

  if (frameCount++ % 5 === 0) updateLabelFade();
  composer.render();
}

// ============================================================
// Boot
// ============================================================
buildScene();
scenButtons[0].classList.add("active");
showStage(0);
requestAnimationFrame(animate);
</script>
