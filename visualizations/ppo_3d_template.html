    cam: { pos: [XS.output + 14, 12, 24], target: [XS.output, 4, 0] },
    body: () => `<p>${outputInfo.entries.length} legal action${outputInfo.entries.length > 1 ? "s" : ""} after masking + softmax. The network's answer:</p>
      <p style="font-size:14px">${topActionsHtml()}</p>
      <p>The agent played <b>${S.sample.chosen_action}</b> (✓ bar).</p>`,
  },
  {
    title: "9 · Critic readout → V(s)",
    label: "critic",
    badge: "critic",
    cam: { pos: [XS.critic + 10, -1, -36], target: [XS.readout + 3, 0, -7] },
    body: () => `<p>The critic mirrors the actor: its <b>own</b> 4 learned queries attend over the <i>same</i> 19 tokens — independent parameters, no shared trunk — then a deep value trunk produces <b>V(s) = ${S.critic.value.toFixed(3)}</b>.</p>
      <p>No auxiliary heads in the perceiver (no win/points/trump-tracker predictions): the value path is the critic, full stop.</p>`,
  },
  {
    title: "Full architecture",
    label: "overview",
    badge: "input",
    cam: { pos: [35, 38, 70], target: [0, 5, 0] },
    body: () => `<p>Zoomed out: observation → embedding table → 19 tokens → ${N_LAYERS}-layer transformer tunnel → memory-token GRU + two independent query readouts → actor heads / value crystal → π(a|s). Drag the scene to explore. Click any object for details. Switch decisions up top, or tour again with <b>▶ Play</b>.</p>`,
  },
];

// ============================================================
// Camera tween + tour controller
// ============================================================
const camState = {
  curPos: camera.position.clone(),
  curTarget: controls.target.clone(),
  tgtPos: camera.position.clone(),
  tgtTarget: controls.target.clone(),
  t: 1, // interpolation (>=1 means done)
  duration: 1500,
};
function tweenTo(pos, target, duration = 1500) {
  camState.curPos = camera.position.clone();
  camState.curTarget = controls.target.clone();
  camState.tgtPos = new THREE.Vector3(...pos);
  camState.tgtTarget = new THREE.Vector3(...target);
  camState.t = 0;
  camState.duration = duration;
  camState.startTime = performance.now();
  controls.autoRotate = false; // don't fight the tween; restored when done
}
function updateCameraTween() {
  if (camState.t >= 1) return;
  const elapsed = performance.now() - camState.startTime;
  let t = clamp(elapsed / camState.duration, 0, 1);
  // ease in-out cubic
  const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  camera.position.lerpVectors(camState.curPos, camState.tgtPos, e);
  controls.target.lerpVectors(camState.curTarget, camState.tgtTarget, e);
  camState.t = t;
  if (t >= 1) {
    controls.autoRotate = document.getElementById("chk-rotate").checked;
  }
}

let curStage = 0;
const ZOOM_OUT = 1.6; // >1 frames more of each stage; 1 = original distances
const els = {
  stage: document.getElementById("i-stage"),
  title: document.getElementById("i-title"),
  body: document.getElementById("i-body"),
  meta: document.getElementById("i-meta"),
  sLabel: document.getElementById("s-label"),
  sCounter: document.getElementById("s-counter"),
  sBar: document.getElementById("s-bar"),
};
function showStage(i, moveCamera = true) {
  curStage = clamp(i, 0, STAGES.length - 1);
  const s = STAGES[curStage];
  els.stage.textContent = `${curStage + 1} / ${STAGES.length} · ${s.label} · ${S.label.toLowerCase()}`;
  els.title.innerHTML = `<span class="badge b-${s.badge}">${s.badge}</span> ${s.title}`;
  els.body.innerHTML = s.body();
  els.meta.textContent = "";
  els.sLabel.textContent = s.title;
  els.sCounter.textContent = `${curStage + 1} / ${STAGES.length}`;
  els.sBar.style.width = `${((curStage + 1) / STAGES.length) * 100}%`;
  navItems.forEach((b, idx) => b.classList.toggle("active", idx === curStage));
  if (navItems[curStage]) navItems[curStage].scrollIntoView({ block: "nearest" });
  applyStageDim();
  // Fire a particle burst along the newly active stage's edges, and grow
  // the output bars in when that stage arrives.
  const activeGroups = STAGE_GROUPS[s.label];
  flowBurst = activeGroups
    ? { t0: performance.now(), groups: new Set(activeGroups) }
    : null;
  if (s.label === "output" && !reducedMotion) {
    outputAnim = { t0: performance.now() };
  }
  if (moveCamera) {
    // Pull the camera back along its view direction so more of each stage fits.
    const tgt = new THREE.Vector3(...s.cam.target);
    const pos = new THREE.Vector3(...s.cam.pos).sub(tgt).multiplyScalar(ZOOM_OUT).add(tgt);
    tweenTo([pos.x, pos.y, pos.z], s.cam.target);
  }
}

// Clickable stage navigator — jump straight to any stage and read its description.
const navEl = document.getElementById("stage-nav");
navEl.innerHTML = '<div class="nav-head">Stages · click to jump</div>';
const navItems = STAGES.map((s, i) => {
  const b = document.createElement("button");
  b.className = "nav-item";
  b.innerHTML = `<span class="dot b-${s.badge}"></span><span>${s.title}</span>`;
  b.addEventListener("click", () => { stopTour(); showStage(i); });
  navEl.appendChild(b);
  return b;
});

// ============================================================
// Scenario selector
// ============================================================
const scenBar = document.getElementById("scenario-bar");
scenBar.innerHTML = '<span class="scen-head">Decision</span>';
const scenButtons = DATA.scenarios.map((sc, i) => {
  const b = document.createElement("button");
  b.textContent = sc.label;
  b.addEventListener("click", () => switchScenario(i));
  scenBar.appendChild(b);
  return b;
});
function switchScenario(i) {
  if (i === scenIdx) return;
  stopTour();
  setScenarioData(i);
  scenButtons.forEach((b, bi) => b.classList.toggle("active", bi === i));
  disposeScene();
  buildScene();
  // Refresh the current stage's text (and reframe its camera) for the new data.
  showStage(curStage);
}

// ============================================================
// Tour playback
// ============================================================
let playing = false;
let timer = null;
const speed = document.getElementById("speed");
function nextStage() {
  if (curStage + 1 >= STAGES.length) return false;
  showStage(curStage + 1);
  return true;
}
function startTour() {
  if (playing) return;
  playing = true;
  document.getElementById("btn-play").textContent = "⏸ Pause";
  const tick = () => {
    if (!playing) return;
    if (!nextStage()) { stopTour(); return; }
    timer = setTimeout(tick, parseInt(speed.value, 10));
  };
  timer = setTimeout(tick, parseInt(speed.value, 10));
}
function stopTour() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
  document.getElementById("btn-play").textContent = "▶ Play tour";
}
document.getElementById("btn-play").addEventListener("click", () => playing ? stopTour() : startTour());
document.getElementById("btn-prev").addEventListener("click", () => { stopTour(); showStage(curStage - 1); });
document.getElementById("btn-next").addEventListener("click", () => { stopTour(); showStage(curStage + 1); });
document.getElementById("btn-reset").addEventListener("click", () => { stopTour(); showStage(0); });
document.getElementById("chk-emphasis").addEventListener("change", (e) => {
  emphasize = e.target.checked;
  styleChords();
  styleConn();
  applyStageDim();
});
document.getElementById("chk-rotate").addEventListener("change", (e) => {
  controls.autoRotate = e.target.checked;
  controls.autoRotateSpeed = 0.6;
});
const chkFlow = document.getElementById("chk-flow");
chkFlow.checked = flowEnabled;
chkFlow.addEventListener("change", (e) => { flowEnabled = e.target.checked; });

// H1–H4 chips: hide/show one attention head's chords across all layers.
const headChipsEl = document.getElementById("head-chips");
for (let h = 0; h < N_HEADS; h++) {
  const b = document.createElement("button");
  b.textContent = `H${h + 1}`;
  b.style.setProperty("--hc", "#" + HEAD_COLORS[h].toString(16).padStart(6, "0"));
  b.title = `toggle attention head ${h + 1}`;
  b.addEventListener("click", () => {
    headOn[h] = !headOn[h];
    b.classList.toggle("off", !headOn[h]);
    styleChords();
  });
  headChipsEl.appendChild(b);
}

// ============================================================
// Picking (click + hover tooltip)
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById("tooltip");
let hovered = null;

function setHovered(obj) {
  if (hovered === obj) return;
  hovered = obj;
  if (obj && obj.userData.pickInfo) {
    const info = obj.userData.pickInfo;
    let txt = info.title;
    if (info.kv) {
      for (const [k, v] of Object.entries(info.kv)) {
        txt += `\n${k}: ${v}`;
      }
    }
    tooltip.textContent = txt;
    tooltip.style.display = "block";
  } else {
    tooltip.style.display = "none";
  }
}
renderer.domElement.addEventListener("mousemove", (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = e.clientX + "px";
  tooltip.style.top = e.clientY + "px";
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(PICKABLES, false);
  setHovered(hits.length ? hits[0].object : null);
});
renderer.domElement.addEventListener("click", (e) => {
  if (!hovered) return;
  const info = hovered.userData.pickInfo;
  if (!info) return;
  els.stage.textContent = "selection";
  els.title.innerHTML = `<span class="badge b-${info.badge}">${info.badge}</span> ${info.title}`;
  let kvHtml = "";
  if (info.kv) {
    kvHtml = `<div class="kv">${Object.entries(info.kv).map(([k, v]) => `<div class="k">${k}</div><div class="v">${v}</div>`).join("")}</div>`;
  }
  els.body.innerHTML = kvHtml + (info.body || "");
});

// ============================================================
// Resize + render loop
// ============================================================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  for (const c of connLines) {
    if (c.obj.material.isLineMaterial) {
      c.obj.material.resolution.set(window.innerWidth, window.innerHeight);
    }
  }
});

// Render loop: chord breathing, flow particles, output grow-in, idle motion.
let pulseT = 0;
let frameCount = 0;
let lastNow = 0;
let outputAnim = null;
function animate(now) {
  requestAnimationFrame(animate);
  controls.update();
  updateCameraTween();
  now = now || 0;
  const dt = Math.min((now - lastNow) / 1000 || 0.016, 0.05);
  lastNow = now;
  pulseT = now * 0.001;

  // Gentle pulse on attention chords proportional to weight
  const breath = reducedMotion ? 1 : 0.6 + Math.sin(pulseT * 1.3) * 0.4;
  for (const c of allChords) {
    if (!c.mesh.visible) continue;
    c.mesh.material.opacity =
      Math.min(1, c.baseOpacity * (0.7 + breath * 0.4)) * (chordDimMap[c.group] ?? 1);
  }
  // Query gems slowly spin and pulse in sync with the chord breathing.
  if (!reducedMotion) {
    for (const info of [actorReadoutInfo, criticInfo]) {
      const gems = info && info.gems;
      if (!gems) continue;
      for (const gem of gems) {
        gem.rotation.y += dt * 0.5;
        const ph = gem.userData.pulsePhase || 0;
        gem.scale.setScalar(1 + 0.07 * Math.sin(pulseT * 1.3 + ph));
      }
    }
  }

  updateFlow(now, dt);

  // Output bars grow in when the output stage arrives.
  if (outputAnim && outputInfo) {
    const t = Math.min((now - outputAnim.t0) / 800, 1);
    const e = 1 - Math.pow(1 - t, 3);
    for (const b of outputInfo.barObjs) {
      b.mesh.scale.y = Math.max(e, 0.02);
      b.mesh.position.y = (b.targetH * b.mesh.scale.y) / 2;
    }
    if (t >= 1) outputAnim = null;
  }

  // Idle micro-motion: hand cards bob, the GRU prism slowly turns.
  if (flowEnabled && !reducedMotion) {
    if (memInfo) memInfo.gru.rotation.y += dt * 0.3;
    if (inputInfo) {
      for (let i = 0; i < inputInfo.cardObjs.length; i++) {
        const card = inputInfo.cardObjs[i];
        card.position.y = card.userData.baseY + Math.sin(pulseT * 0.9 + i * 0.8) * 0.07;
      }
    }
  }

  if (frameCount++ % 5 === 0) updateLabelFade();
  composer.render();
}

// ============================================================
// Boot
// ============================================================
buildScene();
scenButtons[0].classList.add("active");
showStage(0);
requestAnimationFrame(animate);
</script>
