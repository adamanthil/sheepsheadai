<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sheepshead PPO — 3D Architecture</title>
<style>
  :root {
    --bg: #05070f;
    --panel: rgba(15, 21, 48, 0.78);
    --line: #2a3470;
    --text: #e6ecff;
    --muted: #8e9bd1;
    --accent: #7cc4ff;
    --accent-2: #b58bff;
    --pulse: #fffa9e;
    --good: #80ed99;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.45;
  }
  canvas { display: block; }
  #ui-top {
    position: fixed; top: 14px; left: 14px; right: 14px;
    z-index: 20;
    display: flex; gap: 14px; align-items: center; pointer-events: none;
    flex-wrap: wrap;
  }
  .panel {
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    pointer-events: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  #title { font-size: 15px; font-weight: 600; }
  #title .sub { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .controls button, #scenario-bar button {
    background: rgba(20,26,54,0.9);
    border: 1px solid var(--line); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    transition: border-color .15s, background .15s;
  }
  .controls button:hover, #scenario-bar button:hover { border-color: var(--accent); background: rgba(35,45,90,0.95); }
  .controls button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020; font-weight: 600; border: none;
  }
  .controls label { color: var(--muted); font-size: 11px; display: flex; gap: 6px; align-items: center; }
  .controls input[type=range] { accent-color: var(--accent); width: 90px; }

  #scenario-bar { display: flex; gap: 8px; align-items: center; }
  #scenario-bar .scen-head {
    font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); margin-right: 4px;
  }
  #scenario-bar button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020; font-weight: 600; border-color: transparent;
  }

  #ui-side {
    position: fixed; top: 70px; right: 14px; width: 340px;
    z-index: 20; pointer-events: none;
  }
  #info {
    pointer-events: auto;
    max-height: calc(100vh - 90px);
    overflow: auto;
  }
  #info h2 { margin: 0 0 4px 0; font-size: 14px; }
  #info .stage-num { color: var(--accent); font-weight: 600; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; }
  #info p { margin: 8px 0; color: var(--text); }
  #info .meta { color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 8px; }
  #info code { background: rgba(0,0,0,0.35); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

  #legend {
    position: fixed; bottom: 14px; left: 14px;
    z-index: 20; max-width: 320px;
  }
  #legend .row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); margin: 2px 0; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 3px; box-shadow: 0 0 6px currentColor; }

  #status {
    position: fixed; bottom: 14px; right: 14px;
    z-index: 20;
    min-width: 320px;
  }
  #status .step-line { display: flex; justify-content: space-between; align-items: center; }
  #status .step-label { font-weight: 600; }
  #status .step-counter { color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  #status .progress { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  #status .progress > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.4s; }

  #stage-nav {
    position: fixed; top: 126px; left: 14px;
    z-index: 20; width: 232px;
    max-height: calc(100vh - 300px);
    overflow: auto;
    display: flex; flex-direction: column; gap: 2px;
  }
  #stage-nav .nav-head {
    font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  #stage-nav .nav-item {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid transparent;
    color: var(--text); text-align: left; width: 100%;
    padding: 5px 8px; border-radius: 8px; cursor: pointer;
    font-size: 11px; font-family: inherit; line-height: 1.3;
    transition: background .12s, border-color .12s;
  }
  #stage-nav .nav-item:hover { background: rgba(35,45,90,0.6); }
  #stage-nav .nav-item.active { background: rgba(35,45,90,0.95); border-color: var(--accent); }
  #stage-nav .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: currentColor; box-shadow: 0 0 6px currentColor; flex: 0 0 auto;
  }

  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(10, 14, 32, 0.95);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 11px;
    padding: 6px 9px;
    border-radius: 6px;
    transform: translate(12px, 12px);
    z-index: 30;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: pre;
    display: none;
    max-width: 260px;
  }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 999px;
    margin-right: 6px; vertical-align: middle;
    border: 1px solid currentColor;
  }
  .b-input { color: #b58bff; }
  .b-enc { color: #4cc9f0; }
  .b-share { color: #f4a261; }
  .b-actor { color: #80ed99; }
  .b-critic { color: #ff9ec7; }
  .b-aux { color: #ffd166; }
  .b-output { color: #ff6b6b; }

  .pill {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    margin-left: 6px;
  }
  .kv { display: grid; grid-template-columns: 110px 1fr; row-gap: 3px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; margin: 8px 0; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); }
</style>
</head>
<body>

<div id="ui-top">
  <div class="panel" id="title">
    Sheepshead PPO <span class="sub">3D · live forward pass · final PFSP model</span>
  </div>
  <div class="panel controls">
    <button id="btn-play" class="primary">▶ Play tour</button>
    <button id="btn-prev">◀ Prev</button>
    <button id="btn-next">Next ▶</button>
    <button id="btn-reset">↻ Reset</button>
    <label>speed
      <input type="range" id="speed" min="1200" max="6000" step="200" value="3000" />
    </label>
    <label><input type="checkbox" id="chk-rotate" /> auto-rotate</label>
    <label><input type="checkbox" id="chk-emphasis" /> emphasize connections</label>
  </div>
  <div class="panel" id="scenario-bar"></div>
</div>

<div id="ui-side">
  <div class="panel" id="info">
    <div class="stage-num" id="i-stage"></div>
    <h2 id="i-title">Sheepshead PPO — 3D architecture</h2>
    <div id="i-body"><p>Loading…</p></div>
    <div class="meta" id="i-meta"></div>
  </div>
</div>

<div class="panel" id="stage-nav"></div>

<div class="panel" id="legend">
  <div class="row"><span class="swatch" style="background:#b58bff;color:#b58bff"></span>Input / observation</div>
  <div class="row"><span class="swatch" style="background:#4cc9f0;color:#4cc9f0"></span>Encoder · tokens · transformer</div>
  <div class="row"><span class="swatch" style="background:#f4a261;color:#f4a261"></span>Shared features · memory</div>
  <div class="row"><span class="swatch" style="background:#80ed99;color:#80ed99"></span>Actor (policy)</div>
  <div class="row"><span class="swatch" style="background:#ff9ec7;color:#ff9ec7"></span>Critic value</div>
  <div class="row"><span class="swatch" style="background:#ffd166;color:#ffd166"></span>Auxiliary heads</div>
  <div class="row"><span class="swatch" style="background:#fffa9e;color:#fffa9e"></span>Active flow / connection</div>
</div>

<div class="panel" id="status">
  <div class="step-line">
    <span class="step-label" id="s-label">Ready</span>
    <span class="step-counter" id="s-counter">— / —</span>
  </div>
  <div class="progress"><div id="s-bar"></div></div>
</div>

<div id="tooltip"></div>

function makeLabel(text, color = "#e6ecff", scale = 1) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const px = 64 * scale;
  ctx.font = `600 ${px}px ui-sans-serif, system-ui, -apple-system`;
  const w = ctx.measureText(text).width + 32;
  canvas.width = w;
  canvas.height = px + 24;
  ctx.font = `600 ${px}px ui-sans-serif, system-ui, -apple-system`;
  ctx.fillStyle = color;
  ctx.textBaseline = "middle";
  ctx.fillText(text, 16, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  const aspect = canvas.width / canvas.height;
  const h = 1.4 * scale;
  sprite.scale.set(h * aspect, h, 1);
  return sprite;
}

// Stage labels are painted flat on the ground, reading along Z (perpendicular
// to the +X data flow) so they never overlap each other or face the camera.
function makeStageLabel(text, color = "#7cc4ff") {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = "bold 56px ui-sans-serif, system-ui";
  const w = ctx.measureText(text).width + 60;
  canvas.width = w; canvas.height = 80;
  // faint backing strip so text stays legible against the floor grid
  ctx.fillStyle = "rgba(8,11,28,0.5)";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(4, 10, w - 8, 60, 12); ctx.fill(); }
  ctx.font = "bold 56px ui-sans-serif, system-ui";
  ctx.fillStyle = color;
  ctx.textBaseline = "middle";
  ctx.fillText(text, 30, 42);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const ph = 3.4, pw = (w / 80) * ph;
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(pw, ph), mat);
  mesh.rotateX(-Math.PI / 2); // lay flat on the ground
  mesh.rotateZ(Math.PI / 2);  // turn text to run along Z, across the flow
  return mesh;
}

function vecMag(arr) {
  let s = 0;
  for (const v of arr) s += v * v;
  return Math.sqrt(s);
}
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function softmax(logits) {
  const m = Math.max(...logits);
  const ex = logits.map(v => Math.exp(v - m));
  const s = ex.reduce((a, b) => a + b, 0);
  return ex.map(v => v / s);
}

// ============================================================
// Static data prep (scenario-independent)
// ============================================================
const trumpCardCodes = DATA.constants.TRUMP;
const trumpCardIds = DATA.constants.trump_card_ids;
const deckIds = DATA.constants.DECK_IDS;
const ACTIONS = DATA.constants.ACTIONS;
const idToCode = {};
for (const [code, id] of Object.entries(deckIds)) idToCode[id] = code;
idToCode[0] = "PAD";
idToCode[33] = "UNDER";

// Token bank order: context(1), memory(1), hand(8), trick(5), blind(2), bury(2)
const TOKEN_INFO = [
  { type: "context", color: 0xf4a261 },
  { type: "memory", color: 0xf4a261 },
];
for (let i = 0; i < 8; i++) TOKEN_INFO.push({ type: "hand", color: 0x4cc9f0, idx: i });
for (let i = 0; i < 5; i++) TOKEN_INFO.push({ type: "trick", color: 0x6fb1ff, idx: i });
for (let i = 0; i < 2; i++) TOKEN_INFO.push({ type: "blind", color: 0x88e0e8, idx: i });
for (let i = 0; i < 2; i++) TOKEN_INFO.push({ type: "bury", color: 0xa6f0c1, idx: i });

// ============================================================
// Scenario state
// ============================================================
let scenIdx = 0;
let S = DATA.scenarios[0];
let handCardIds = [];   // length 8 with 0 padding
let handCardCodes = []; // real cards only

function setScenarioData(i) {
  scenIdx = i;
  S = DATA.scenarios[i];
  handCardIds = S.sample.hand_ids;
  handCardCodes = S.sample.hand_cards;
}
setScenarioData(0);

// Which actual card (if any) a token carries.
function tokenCardCode(i) {
  const info = TOKEN_INFO[i];
  if (info.type === "hand") {
    const code = idToCode[handCardIds[info.idx]];
    return code && code !== "PAD" ? code : null;
  }
  if (info.type === "trick") {
    const code = S.sample.trick_card_codes[info.idx];
    return code && code !== "PAD" ? code : null;
  }
  return null;
}

// Which policy head actually drives this scenario's decision.
function liveHead() {
  const kind = S.sample.kind;
  if (kind === "pick") return "pick";
  if (kind === "call") return "call";
  return "pointer"; // bury / lead / follow all score hand slots
}

// ============================================================
// Stage layout (X positions)
// ============================================================
const XS = {
  input: -56,
  embed: -38,
  tokensPre: -20,
  attnRing: -2,
  pools: 14,
  gru: 24,
  features: 34,
  actor: 50,
  critic: 50,
  output: 64,
};

// ============================================================
// Rebuildable scene root + registries
// ============================================================
let sceneRoot = null;
let stageGroups = {};
let PICKABLES = [];
let connLines = [];
let inputInfo, embedInfo, tokensInfo, attnInfo, poolsInfo, memInfo, featInfo,
  actorInfo, criticInfo, outputInfo;

function group(name) {
  if (!stageGroups[name]) {
    stageGroups[name] = new THREE.Group();
    stageGroups[name].name = name;
    sceneRoot.add(stageGroups[name]);
  }
  return stageGroups[name];
}

function registerPickable(mesh, info) {
  mesh.userData.pickInfo = info;
  PICKABLES.push(mesh);
}

function registerConn(obj, baseOpacity) {
  connLines.push({ obj, base: baseOpacity });
  return obj;
}

function makeGlowLine(p0, p1, color, opacity = 0.4) {
  const geom = new THREE.BufferGeometry().setFromPoints([p0, p1]);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
  return registerConn(new THREE.Line(geom, mat), opacity);
}

function disposeScene() {
  if (!sceneRoot) return;
  sceneRoot.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      for (const m of mats) {
        if (m.map) m.map.dispose();
        m.dispose();
      }
    }
  });
  scene.remove(sceneRoot);
  sceneRoot = null;
  stageGroups = {};
  PICKABLES = [];
  connLines = [];
  hovered = null;
}

// ---- Connection emphasis -------------------------------------------------
// When ON, strong attention chords get thicker / brighter / more opaque and
// the weakest ones drop out, so high-strength token→token links pop. All other
// connection lines are boosted too.
let emphasize = false;
const CHORD_COLD = new THREE.Color(0x274080);
const CHORD_HOT = new THREE.Color(C.pulse);
function chordRadius(norm) {
  return emphasize ? 0.06 + Math.pow(norm, 1.15) * 0.62 : 0.035 + norm * 0.18;
}
function chordBaseOpacity(norm) {
  return emphasize ? clamp(0.4 + norm * 0.6, 0, 1) : 0.18 + norm * 0.5;
}
function chordVisible(norm) { return emphasize ? norm >= 0.18 : true; }
function chordGeometry(curve, norm) {
  return new THREE.TubeGeometry(curve, 18, chordRadius(norm), 6, false);
}
function styleChords() {
  for (const c of attnInfo.chordLines) {
    c.mesh.visible = chordVisible(c.norm);
    c.mesh.geometry.dispose();
    c.mesh.geometry = chordGeometry(c.curve, c.norm);
    c.baseOpacity = chordBaseOpacity(c.norm);
    const t = emphasize ? Math.pow(c.norm, 0.55) : c.norm;
    c.mesh.material.color.copy(CHORD_COLD).lerp(CHORD_HOT, t);
    c.mesh.material.opacity = c.baseOpacity;
  }
}
function styleConn() {
  for (const c of connLines) {
    c.obj.material.opacity = Math.min(0.95, c.base * (emphasize ? 2.3 : 1));
  }
}

// STAGE 1: OBSERVATION (hand + trick on table + header + memory)

function buildInputCards() {
  const g = group("input");
  const handLabel = makeStageLabel("1 · OBSERVATION", "#b58bff");

    const code = handCardCodes[i];

    const isTrump = trumpCardCodes.includes(code);
    const color = isTrump ? 0xd4af37 : 0x8aa0e0;
    const mat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.15,
      metalness: 0.4,

    });

    lab.position.set(XS.input + 2.6, topY - i * spacing, 0.5);

    registerPickable(card, {
      title: code,
      badge: "input",
      body: `<p>${isTrump ? "<b>Trump.</b> " : ""}Card id ${handCardIds[i]} (DECK_IDS). Will be looked up in the 34×16 embedding table on the right.</p>`,
    });
  }

  // Cards already on the table this trick (play scenarios)
  const trickCodes = S.sample.trick_card_codes
    .map((code, seatOff) => ({ code, seatOff }))
    .filter(t => t.code !== "PAD");
  const trickObjs = [];
  if (trickCodes.length) {
    const tLab = makeLabel("on the table", "#b58bff", 0.55);
    tLab.position.set(XS.input, topY + 2.2, 7);
    g.add(tLab);
    for (let i = 0; i < trickCodes.length; i++) {
      const { code } = trickCodes[i];
      const isTrump = trumpCardCodes.includes(code);
      const color = isTrump ? 0xd4af37 : 0x7286c9;
      const card = new THREE.Mesh(
        new THREE.BoxGeometry(2.6, 3.6, 0.24),
        new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 0.12,
          metalness: 0.4, roughness: 0.4,
        }),
      );
      card.position.set(XS.input, topY - 0.4 - i * 1.6, 7);
      card.rotation.y = -0.25;
      g.add(card);
      trickObjs.push(card);
      const lab = makeLabel(code, isTrump ? "#ffe89c" : "#b9c6f2", 0.5);
      lab.position.set(XS.input + 2.1, topY - 0.4 - i * 1.6, 7.4);
      g.add(lab);
      registerPickable(card, {
        title: `${code} (on table)`,
        badge: "input",
        body: `<p>Played earlier this trick. Feeds a trick token (with is-picker / is-known-partner flags) so the network can reason about what it must beat.</p>`,
      });
    }
  }

  // header chip + memory chip
  const chipY = topY - n * spacing - 0.6;
  const headerGeom = new THREE.BoxGeometry(3.6, 1.4, 0.3);
  const headerMat = new THREE.MeshStandardMaterial({
    color: 0x9d7bff, emissive: 0x9d7bff, emissiveIntensity: 0.2, roughness: 0.4
  });
  const headerChip = new THREE.Mesh(headerGeom, headerMat);
  headerChip.position.set(XS.input, chipY, 0);
  headerChip.rotation.y = -0.25;
  g.add(headerChip);
  const headerLab = makeLabel("header (10)", "#e6ddff", 0.6);
  headerLab.position.set(XS.input + 3, chipY, 0.5);
  g.add(headerLab);
  registerPickable(headerChip, {
    title: "Header scalars (10)",
    badge: "input",
    body: `<p>partner_mode, is_leaster, play_started, current_trick, alone_called, called_under, picker_rel, partner_rel, leader_rel, picker_position — the game-phase context for this decision (trick ${S.sample.trick + 1}, ${S.sample.phase.toLowerCase()}).</p>`,
  });

  const memMag = vecMag(S.memory.memory_in);
  const memGeom = new THREE.BoxGeometry(3.6, 1.4, 0.3);
  const memMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261,
    emissiveIntensity: 0.15 + clamp(memMag / 10, 0, 1) * 0.5, roughness: 0.4
  });
  const memChip = new THREE.Mesh(memGeom, memMat);
  memChip.position.set(XS.input, chipY - 2.2, 0);
  memChip.rotation.y = -0.25;
  g.add(memChip);
  const memLab = makeLabel(`memory hₜ₋₁ (256) · ‖${memMag.toFixed(1)}‖`, "#ffd99c", 0.6);
  memLab.position.set(XS.input + 3, chipY - 2.2, 0.5);
  g.add(memLab);
  registerPickable(memChip, {
    title: "Prior memory hₜ₋₁",
    badge: "input",
    kv: { "‖memory_in‖": memMag.toFixed(2) },
    body: memMag < 1e-6
      ? `<p>256-d recurrent state from this player's previous decision. Zeros here — this is the seat's first decision of the hand. Carried via a GRU cell — see stage 6.</p>`
      : `<p>256-d recurrent state carried from this seat's previous decisions — it has already seen the earlier phases of this hand. Updated by the GRU cell in stage 6.</p>`,
  });

  return { cardObjs, trickObjs, chipY, spacing, topY };
}

// ============================================================
// STAGE 2: CARD EMBEDDING TABLE (34 × 16) — instanced
// ============================================================
function buildEmbeddingTable() {
  const g = group("embed");
  const lab = makeStageLabel("2 · CARD EMBEDDINGS · (34 × 16)", "#4cc9f0");
  lab.position.set(XS.embed, -9.7, 0);
  g.add(lab);

  const ROWS = 34, COLS = 16;
  const cellW = 0.32, cellH = 0.42, gap = 0.04;
  const totalW = COLS * (cellW + gap);
  const totalH = ROWS * (cellH + gap);

  // Rows referenced by this scenario: hand + cards on the table + called card
  const usedIds = new Set(handCardIds.filter(id => id !== 0));
  for (const code of S.sample.trick_card_codes) {
    if (code !== "PAD") usedIds.add(code === "UNDER" ? 33 : deckIds[code]);
  }
  if (S.sample.called_card && deckIds[S.sample.called_card]) {
    usedIds.add(deckIds[S.sample.called_card]);
  }

  const geom = new THREE.BoxGeometry(cellW, cellH, 0.25);
  const inst = new THREE.InstancedMesh(geom, new THREE.MeshStandardMaterial({
    metalness: 0.2, roughness: 0.55, vertexColors: false,
  }), ROWS * COLS);
  inst.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(ROWS * COLS * 3), 3);

  const tempColor = new THREE.Color();
  const dummy = new THREE.Object3D();

  const embMin = DATA.card_embedding.min;
  const embMax = DATA.card_embedding.max;
  const embRange = Math.max(1e-6, embMax - embMin);
  const table = DATA.card_embedding.table;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      const xLocal = (c - COLS / 2) * (cellW + gap) + cellW / 2;
      const yLocal = (ROWS / 2 - r) * (cellH + gap) - cellH / 2;
      dummy.position.set(XS.embed, yLocal, xLocal); // table standing in YZ plane
      dummy.updateMatrix();
      inst.setMatrixAt(i, dummy.matrix);

      tempColor.setHex(C.dim);
      if (usedIds.has(r)) {
        const v = table[r][c];
        const norm = (v - embMin) / embRange; // 0..1
        // diverging-ish: cool blue for low, white-ish mid, warm for high
        tempColor.setHSL(0.6 - norm * 0.55, 0.9, 0.25 + norm * 0.45);
      }
      inst.setColorAt(i, tempColor);
    }
  }
  inst.instanceMatrix.needsUpdate = true;
  if (inst.instanceColor) inst.instanceColor.needsUpdate = true;

  g.add(inst);

  // Row labels (only used rows)
  const usedRowYs = {};
  for (const r of usedIds) {
    const yLocal = (ROWS / 2 - r) * (cellH + gap) - cellH / 2;
    const code = idToCode[r] || `id ${r}`;
    const rowLab = makeLabel(`${code} (row ${r})`, "#ffe89c", 0.5);
    rowLab.position.set(XS.embed, yLocal, totalW / 2 + 1.4);
    g.add(rowLab);
    usedRowYs[r] = yLocal;
  }

  // Connections: each input card → its row
  for (let i = 0; i < handCardCodes.length; i++) {
    const cid = handCardIds[i];
    if (!(cid in usedRowYs)) continue;
    const start = new THREE.Vector3(XS.input + 2, inputInfo.topY - i * inputInfo.spacing, 0);
    const end = new THREE.Vector3(XS.embed - 0.1, usedRowYs[cid], 0);
    g.add(makeGlowLine(start, end, C.input, 0.3));
  }
  // ... and each on-table card → its row
  let trickIdx = 0;
  for (const code of S.sample.trick_card_codes) {
    if (code === "PAD") continue;
    const cid = code === "UNDER" ? 33 : deckIds[code];
    if (cid in usedRowYs) {
      const start = new THREE.Vector3(
        XS.input + 2, inputInfo.topY - 0.4 - trickIdx * 1.6, 7);
      const end = new THREE.Vector3(XS.embed - 0.1, usedRowYs[cid], 0);
      g.add(makeGlowLine(start, end, C.input, 0.22));
    }
    trickIdx++;
  }

  // Click-target for the whole table
  const tableProxy = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, totalH + 0.5, totalW + 0.5),
    new THREE.MeshBasicMaterial({ visible: false }),
  );
  tableProxy.position.set(XS.embed, 0, 0);
  g.add(tableProxy);
  registerPickable(tableProxy, {
    title: "nn.Embedding(34, 16)",
    badge: "enc",
    body: `<p>The card embedding table. 34 rows (PAD, 32 real cards, UNDER token) × 16 dims. Dims 0–3 = suit one-hot · 4–7 = per-suit rank · 8 = points/11 · 9 = UNDER flag · 10–15 = free to learn.</p>
      <p>The highlighted rows are the cards this scenario touches (hand, table, called card). The same table is reused by the actor's two-tower CALL scorer and the critic's seen-trump-mask head, so any update here propagates everywhere.</p>`,
  });

  return { usedRowYs, totalW, totalH };
}

// ============================================================
// STAGE 3: TOKEN BANK (19 tokens, 64-d each)
// ============================================================
function buildTokens() {
  const g = group("tokens");
  const lab = makeStageLabel("3 · TOKENIZE · (19 × 64)", "#4cc9f0");
  lab.position.set(XS.tokensPre, -9.7, 0);
  g.add(lab);

  const preTok = S.tokens_pre_attn;
  const mask = preTok.mask;
  const tokenVecs = [
    preTok.context,
    preTok.memory,
    ...preTok.hand,
    ...preTok.trick,
    ...preTok.blind,
    ...preTok.bury,
  ];

  const tokenObjs = [];
  const spacingY = 1.5;
  const topY = (19 * spacingY) / 2 - 0.5;
  for (let i = 0; i < 19; i++) {
    const info = TOKEN_INFO[i];
    const active = !!mask[i];
    const mag = vecMag(tokenVecs[i]);
    const tokGeom = new THREE.BoxGeometry(4.5, 0.6, 0.6);
    const color = active ? info.color : C.dim;
    const intensity = active ? 0.35 : 0.05;
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: intensity,
      metalness: 0.3, roughness: 0.4,
      transparent: !active, opacity: active ? 1 : 0.3,
    });
    const tok = new THREE.Mesh(tokGeom, mat);
    const y = topY - i * spacingY;
    tok.position.set(XS.tokensPre, y, 0);
    g.add(tok);
    tokenObjs.push({ mesh: tok, y, info, active, magnitude: mag, vec: tokenVecs[i] });

    let labText = info.type;
    const code = tokenCardCode(i);
    if (info.type === "hand") labText = `hand[${info.idx}] ${code || "PAD"}`;
    else if (info.type === "trick") labText = `trick[${info.idx}]${code ? " " + code : ""}`;
    else if (info.type === "blind") labText = `blind[${info.idx}]`;
    else if (info.type === "bury") labText = `bury[${info.idx}]`;
    const tlab = makeLabel(labText + (active ? "" : "  · PAD"),
      active ? "#cfe9ff" : "#5d6790", 0.45);
    tlab.position.set(XS.tokensPre + 3.5, y, 0);
    g.add(tlab);

    registerPickable(tok, {
      title: `Token ${i}: ${labText}`,
      badge: "enc",
      kv: { "type": info.type, "active": active ? "yes" : "PAD", "‖vec‖": mag.toFixed(2) },
      body: `<p>One of 19 entity tokens. Built by the type-specific MLP, then has the <code>card_type</code> embedding added in (so attention can tell context vs memory vs hand-card etc.).</p>
        <p>Goes through 4 transformer layers next.</p>`,
    });
  }

  // context ← header chip
  const ctxStart = new THREE.Vector3(XS.input + 2, inputInfo.chipY, 0);
  const ctxEnd = new THREE.Vector3(XS.tokensPre - 2.3, tokenObjs[0].y, 0);
  g.add(makeGlowLine(ctxStart, ctxEnd, C.share, 0.4));
  // memory chip → token 1
  const memStart = new THREE.Vector3(XS.input + 2, inputInfo.chipY - 2.2, 0);
  const memEnd = new THREE.Vector3(XS.tokensPre - 2.3, tokenObjs[1].y, 0);
  g.add(makeGlowLine(memStart, memEnd, C.share, 0.4));

  // For each hand card, line from its embedding row → its hand token
  const handTokenStart = 2;
  for (let i = 0; i < handCardCodes.length; i++) {
    const cid = handCardIds[i];
    const rowY = embedInfo.usedRowYs[cid];
    if (rowY === undefined) continue;
    const start = new THREE.Vector3(XS.embed + 0.3, rowY, 0);
    const end = new THREE.Vector3(XS.tokensPre - 2.3, tokenObjs[handTokenStart + i].y, 0);
    g.add(makeGlowLine(start, end, C.enc, 0.35));
  }
  // ... and for each on-table card, row → trick token
  const trickTokenStart = 10;
  for (let ti = 0; ti < 5; ti++) {
    const code = S.sample.trick_card_codes[ti];
    if (code === "PAD") continue;
    const cid = code === "UNDER" ? 33 : deckIds[code];
    const rowY = embedInfo.usedRowYs[cid];
    if (rowY === undefined) continue;
    const start = new THREE.Vector3(XS.embed + 0.3, rowY, 0);
    const end = new THREE.Vector3(XS.tokensPre - 2.3, tokenObjs[trickTokenStart + ti].y, 0);
    g.add(makeGlowLine(start, end, C.enc, 0.3));
  }

  return { tokenObjs };
}

// ============================================================
// STAGE 4: ATTENTION RING (transformer cross-card reasoning)
// ============================================================
function buildAttentionRing() {
  const g = group("attn");
  const lab = makeStageLabel("4 · TRANSFORMER ATTENTION · 4 layers × 4 heads", "#4cc9f0");
  lab.position.set(XS.attnRing, -9.7, 0);
  g.add(lab);

  const N = 19;
  const radius = 9;
  const ringPos = [];
  for (let i = 0; i < N; i++) {
    const theta = (i / N) * Math.PI * 2 - Math.PI / 2;
    const y = Math.sin(theta) * radius + 4;
    const z = Math.cos(theta) * radius;
    ringPos.push(new THREE.Vector3(XS.attnRing, y, z));
  }

  const postTok = [
    S.tokens_post_attn.context,
    S.tokens_post_attn.memory,
    ...S.tokens_post_attn.hand,
    ...S.tokens_post_attn.trick,
    ...S.tokens_post_attn.blind,
    ...S.tokens_post_attn.bury,
  ];
  const ringObjs = [];
  for (let i = 0; i < N; i++) {
    const info = TOKEN_INFO[i];
    const active = !!S.tokens_pre_attn.mask[i];
    const v = postTok[i];
    const mag = vecMag(v);
    const r = 0.5 + clamp(mag / 6, 0, 1) * 0.7;
    const geom = new THREE.SphereGeometry(r, 18, 14);
    const mat = new THREE.MeshStandardMaterial({
      color: active ? info.color : C.dim,
      emissive: active ? info.color : C.dim,
      emissiveIntensity: active ? 0.45 : 0.05,
      metalness: 0.3, roughness: 0.4,
      transparent: !active, opacity: active ? 1 : 0.3,
    });
    const sph = new THREE.Mesh(geom, mat);
    sph.position.copy(ringPos[i]);
    g.add(sph);
    ringObjs.push({ mesh: sph, info, active, pos: ringPos[i] });

    const code = tokenCardCode(i);
    const isTrump = code && trumpCardCodes.includes(code);
    let labText, labColor;
    if (code) { labText = code; labColor = isTrump ? "#ffe89c" : "#cfe9ff"; }
    else if (info.type === "context" || info.type === "memory") { labText = info.type; labColor = "#ffd9a0"; }
    else { labText = info.type + " · PAD"; labColor = "#5d6790"; }
    const tlab = makeLabel(labText, labColor, code ? 0.6 : 0.45);
    const outward = ringPos[i].clone().sub(new THREE.Vector3(XS.attnRing, 4, 0)).normalize();
    tlab.position.copy(ringPos[i]).addScaledVector(outward, r + 1.4);
    g.add(tlab);

    registerPickable(sph, {
      title: code ? `Token ${i} · ${code}${isTrump ? " (trump)" : ""}` : `Token ${i} · ${info.type}`,
      badge: "enc",
      kv: { "type": info.type, "card": code || (active ? "—" : "PAD"), "‖post‖": mag.toFixed(2) },
      body: `<p>After 4 transformer layers each token has been updated by attending to every other (valid) token. Connections here are weighted by the last-layer attention weight.</p>
             <p><b>Sphere size</b> = the L2 norm (magnitude) of this token's 64-d vector <i>after</i> attention — bigger means the transformer wrote a stronger, more activated representation into this slot.</p>`,
    });
  }

  // Lines from token bank → ring
  for (let i = 0; i < N; i++) {
    if (!S.tokens_pre_attn.mask[i]) continue;
    const start = new THREE.Vector3(XS.tokensPre + 2.3, tokensInfo.tokenObjs[i].y, 0);
    const end = ringPos[i].clone();
    g.add(makeGlowLine(start, end, C.enc, 0.18));
  }

  // Attention chords: pair every token with every other; opacity from attn weight
  const attn = S.attention_weights_last_layer; // (19, 19)
  let maxW = 0;
  for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) if (i !== j) maxW = Math.max(maxW, attn[i][j]);
  const chordLines = [];
  for (let i = 0; i < N; i++) {
    if (!S.tokens_pre_attn.mask[i]) continue;
    for (let j = i + 1; j < N; j++) {
      if (!S.tokens_pre_attn.mask[j]) continue;
      const wij = attn[i][j];
      const wji = attn[j][i];
      const w = (wij + wji) / 2;
      const norm = w / maxW;
      if (norm < 0.05) continue; // skip very weak
      const start = ringPos[i];
      const end = ringPos[j];
      const mid = start.clone().add(end).multiplyScalar(0.5);
      const ringCenter = new THREE.Vector3(XS.attnRing, 4, 0);
      mid.lerp(ringCenter, 0.6);
      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      // Tube (not a line) so relative attention strength shows up as thickness.
      const color = new THREE.Color().copy(CHORD_COLD).lerp(CHORD_HOT, norm);
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: chordBaseOpacity(norm), depthWrite: false,
      });
      const mesh = new THREE.Mesh(chordGeometry(curve, norm), mat);
      g.add(mesh);
      chordLines.push({ mesh, curve, norm, baseOpacity: chordBaseOpacity(norm) });
    }
  }

  return { ringObjs, ringPos, chordLines };
}

// ============================================================
// STAGE 5: POOLS (4)
// ============================================================
function buildPools() {
  const g = group("pools");
  const lab = makeStageLabel("5 · ATTENTION POOLS", "#4cc9f0");
  lab.position.set(XS.pools, -9.7, 0);
  g.add(lab);

  const POOLS = [
    { name: "hand",  vec: S.pools.hand_vec,  color: 0x4cc9f0, ringIdxs: [2,3,4,5,6,7,8,9] },
    { name: "trick", vec: S.pools.trick_vec, color: 0x6fb1ff, ringIdxs: [10,11,12,13,14] },
    { name: "blind", vec: S.pools.blind_vec, color: 0x88e0e8, ringIdxs: [15,16] },
    { name: "bury",  vec: S.pools.bury_vec,  color: 0xa6f0c1, ringIdxs: [17,18] },
  ];
  const poolObjs = [];
  for (let i = 0; i < POOLS.length; i++) {
    const p = POOLS[i];
    const mag = vecMag(p.vec);
    const w = 0.8 + clamp(mag / 5, 0, 1.5);
    const y = 8 - i * 4.5;
    const sizeY = p.vec.length === 64 ? 3.5 : 2.2;
    const geom = new THREE.BoxGeometry(w, sizeY, w);
    const mat = new THREE.MeshStandardMaterial({
      color: p.color, emissive: p.color, emissiveIntensity: 0.35,
      metalness: 0.35, roughness: 0.4,
    });
    const m = new THREE.Mesh(geom, mat);
    m.position.set(XS.pools, y, 0);
    g.add(m);
    poolObjs.push({ mesh: m, pool: p, y });

    const tlab = makeLabel(`pool_${p.name} → ${p.vec.length}d`, "#cfe9ff", 0.55);
    tlab.position.set(XS.pools, y + sizeY / 2 + 0.6, 0);
    g.add(tlab);

    for (const ri of p.ringIdxs) {
      if (!S.tokens_pre_attn.mask[ri]) continue;
      const start = attnInfo.ringPos[ri];
      const end = new THREE.Vector3(XS.pools - w / 2, y, 0);
      g.add(makeGlowLine(start, end, p.color, 0.25));
    }

    registerPickable(m, {
      title: `pool_${p.name}`,
      badge: "enc",
      kv: { "out dim": p.vec.length, "‖vec‖": mag.toFixed(2) },
      body: `<p>Multi-query (M=4) × multi-head (H=4) attention pool. Compresses the bag's post-attention tokens into a single vector.</p>`,
    });
  }
  return { poolObjs };
}

// ============================================================
// STAGE 6: GRU + MEMORY FEEDBACK
// ============================================================
function buildMemory() {
  const g = group("gru");
  const lab = makeStageLabel("6 · GRU MEMORY UPDATE", "#f4a261");
  lab.position.set(XS.gru, -9.7, 0);
  g.add(lab);

  const gruGeom = new THREE.CylinderGeometry(1.8, 1.8, 3, 6);
  const gruMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261, emissiveIntensity: 0.4,

  gru.position.set(XS.gru, 6, 0);
  g.add(gru);
  const gruLab = makeLabel("GRUCell · 256", "#ffd99c", 0.55);
  gruLab.position.set(XS.gru, 9, 0);
  g.add(gruLab);

  const memInMag = vecMag(S.memory.memory_in);
  const memOutMag = vecMag(S.memory.memory_out);
  registerPickable(gru, {
    title: "memory_gru (GRUCell)",
    badge: "share",
    kv: { "‖memory_in‖": memInMag.toFixed(2), "‖memory_out‖": memOutMag.toFixed(2) },
    body: `<p>The only true recurrence in the network. memory_out = GRU(context_token_after_attn, memory_in). Stored per-player and read back on the next decision step — the curved arc going back to the left is exactly that feedback.</p>`,
  });

  // Feedback arc: from gru position back to the memory chip at input
  const start = new THREE.Vector3(XS.gru - 1.5, 6, 0);
  const end = new THREE.Vector3(XS.input + 2, inputInfo.chipY - 2.2, 0);
  const curve = new THREE.CubicBezierCurve3(
    start,
    new THREE.Vector3(start.x - 5, 22, 0),
    new THREE.Vector3(end.x + 5, 22, 0),
    end,
  );
  const points = curve.getPoints(80);
  const geom = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xf4a261, transparent: true, opacity: 0.55 });
  const arc = new THREE.Line(geom, mat);
  g.add(arc);

  const arrowGeom = new THREE.ConeGeometry(0.4, 1.0, 12);
  const arrowMat = new THREE.MeshStandardMaterial({
    color: 0xf4a261, emissive: 0xf4a261, emissiveIntensity: 0.6,
  });
  const arrow = new THREE.Mesh(arrowGeom, arrowMat);
  arrow.position.copy(end);
  arrow.rotation.z = Math.PI / 2;
  g.add(arrow);

  const arcLab = makeLabel("memory_out → next-step memory_in", "#ffd99c", 0.5);
  arcLab.position.set(0, 25, 0);
  g.add(arcLab);

  // context_out → GRU
  g.add(makeGlowLine(
    new THREE.Vector3(XS.attnRing, attnInfo.ringPos[0].y, attnInfo.ringPos[0].z),
    new THREE.Vector3(XS.gru, 6, 0),
    C.share, 0.6,
  ));

  return { gru, curve };
}

// ============================================================
// STAGE 7: FEATURES (256-d bar)
// ============================================================
function buildFeatures() {
  const g = group("features");
  const lab = makeStageLabel("7 · SHARED FEATURES (256)", "#f4a261");
  lab.position.set(XS.features, -9.7, 0);
  g.add(lab);

  const features = S.features;
  const COLS = 16, ROWS = 16;
  const cellW = 0.45, cellH = 0.45, gap = 0.06;
  const totalW = COLS * (cellW + gap);
  const totalH = ROWS * (cellH + gap);

  let fmin = features[0], fmax = features[0];
  for (const v of features) { if (v < fmin) fmin = v; if (v > fmax) fmax = v; }
  const frange = Math.max(1e-6, fmax - fmin);

  const geom = new THREE.BoxGeometry(cellW, cellH, 0.3);
  const inst = new THREE.InstancedMesh(geom, new THREE.MeshStandardMaterial({
    metalness: 0.25, roughness: 0.5,
  }), 256);
  inst.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(256 * 3), 3);

  const dummy = new THREE.Object3D();
  const color = new THREE.Color();
  for (let i = 0; i < 256; i++) {
    const r = Math.floor(i / COLS), c = i % COLS;
    const xLocal = (c - COLS / 2) * (cellW + gap) + cellW / 2;
    const yLocal = (ROWS / 2 - r) * (cellH + gap) - cellH / 2;
    dummy.position.set(XS.features, yLocal, xLocal);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);

    const norm = clamp((features[i] - fmin) / frange, 0, 1);
    color.setHSL(0.07 + norm * 0.04, 0.85, 0.2 + norm * 0.55);
    inst.setColorAt(i, color);
  }
  inst.instanceMatrix.needsUpdate = true;
  if (inst.instanceColor) inst.instanceColor.needsUpdate = true;
  g.add(inst);

  const proxy = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, totalH + 0.5, totalW + 0.5),
    new THREE.MeshBasicMaterial({ visible: false }),
  );
  proxy.position.set(XS.features, 0, 0);
  g.add(proxy);
  registerPickable(proxy, {
    title: "Shared features (256)",
    badge: "share",
    kv: { "min": fmin.toFixed(3), "max": fmax.toFixed(3) },
    body: `<p>The 256-d vector that summarizes the entire game state. Consumed by both the actor and critic adapters. After LayerNorm, the values are well-distributed — see the color spread.</p>`,
  });

  for (const p of poolsInfo.poolObjs) {
    const start = new THREE.Vector3(XS.pools, p.y, 0);
    const end = new THREE.Vector3(XS.features - totalW / 2, 0, 0);
    g.add(makeGlowLine(start, end, p.pool.color, 0.3));
  }
  g.add(makeGlowLine(
    new THREE.Vector3(XS.attnRing, attnInfo.ringPos[0].y, attnInfo.ringPos[0].z),
    new THREE.Vector3(XS.features - totalW / 2, 4, 0),
    C.share, 0.3,
  ));

  return { proxy, totalW, totalH };
}

// ============================================================
// STAGE 8: ACTOR heads
// ============================================================
// Live-vs-idle styling: the head that actually decides this scenario is shown
// at full strength; the others stay visible but dimmed.
function headStyle(isLive) {
  return {
    opacity: isLive ? 1.0 : 0.3,
    emissiveBoost: isLive ? 1.0 : 0.25,
    labelColor: isLive ? "#dffbe6" : "#5d6790",
    suffix: isLive ? "" : " · idle",
  };
}

function buildActor() {
  const g = group("actor");
  const lab = makeStageLabel("8 · ACTOR · policy heads", "#80ed99");
  lab.position.set(XS.actor, -9.7, 18);
  g.add(lab);

  const ACTOR_BASE_Y = 12;
  const live = liveHead();

  // adapter cube
  const adapterGeom = new THREE.BoxGeometry(1.6, 3.2, 1.6);
  const adapterMat = new THREE.MeshStandardMaterial({
    color: 0x80ed99, emissive: 0x80ed99, emissiveIntensity: 0.35,
    metalness: 0.35, roughness: 0.4,
  });
  const adapter = new THREE.Mesh(adapterGeom, adapterMat);
  adapter.position.set(XS.actor - 4, ACTOR_BASE_Y, 8);
  g.add(adapter);
  const adapterLab = makeLabel("actor_adapter (256→256)", "#cdf5d8", 0.5);
  adapterLab.position.set(XS.actor - 4, ACTOR_BASE_Y + 2.6, 8);
  g.add(adapterLab);
  registerPickable(adapter, {
    title: "actor_adapter",
    badge: "actor",
    body: `<p>LayerNorm → Linear(256→256) → SiLU → Linear(256→256) → SiLU. Adds nonlinearity before the 4 policy heads.</p>`,
  });

  g.add(makeGlowLine(
    new THREE.Vector3(XS.features, 0, 0),
    adapter.position,
    C.share, 0.5,
  ));

  // ----- (a) pick head — 2 small balls -----
  const pickStyle = headStyle(live === "pick");
  const pickProbs = softmax(S.actor.pick_logits);
  const headX = XS.actor + 2;
  const pickPositions = [
    { name: "PICK", y: ACTOR_BASE_Y + 1.5, z: 13, prob: pickProbs[0] },
    { name: "PASS", y: ACTOR_BASE_Y - 1.5, z: 13, prob: pickProbs[1] },
  ];
  for (const p of pickPositions) {
    const r = 0.45 + p.prob * 1.6;
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(r, 22, 16),
      new THREE.MeshStandardMaterial({
        color: 0x80ed99,
        emissive: 0x80ed99,
        emissiveIntensity: (0.3 + p.prob * 0.7) * pickStyle.emissiveBoost,
        metalness: 0.4, roughness: 0.35,
        transparent: pickStyle.opacity < 1, opacity: pickStyle.opacity,
      }),
    );
    ball.position.set(headX, p.y, p.z);
    g.add(ball);
    const pl = makeLabel(
      `${p.name}: ${(p.prob * 100).toFixed(1)}%${pickStyle.suffix}`,
      pickStyle.labelColor, 0.55);
    pl.position.set(headX, p.y, p.z + r + 0.6);
    g.add(pl);
    registerPickable(ball, {
      title: `pick_head · ${p.name}`,
      badge: "actor",
      kv: {
        "logit": (p.name === "PICK" ? S.actor.pick_logits[0] : S.actor.pick_logits[1]).toFixed(3),
        "prob": p.prob.toFixed(4),
        "live here": live === "pick" ? "yes" : "no",
      },
      body: `<p>pick_head is a Linear(256→2). Logits get divided by <code>temperature_pick</code>, masked to legal actions, and softmaxed against the rest of the action space.${live === "pick" ? "" : " Not the deciding head for this scenario."}</p>`,
    });
    g.add(makeGlowLine(adapter.position, ball.position, 0x80ed99, live === "pick" ? 0.5 : 0.15));
  }

  // ----- (b) two-tower CALL scorer -----
  const callStyle = headStyle(live === "call");
  const callable = S.sample.callable_cards.length
    ? S.sample.callable_cards.map(c => c.code)
    : ["AC", "AS", "AH", "10C", "10S", "10H"]; // illustrative when no call is legal
  const callableIds = callable.map(c => deckIds[c]);
  const cardScores = S.actor.card_scores_all;

  const callLab = makeLabel(
    `two-tower CALL scorer${callStyle.suffix}`, callStyle.labelColor, 0.5);
  callLab.position.set(XS.actor + 6, ACTOR_BASE_Y + 8, 6);
  g.add(callLab);

  const qNode = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0x80ed99, emissive: 0x80ed99,
      emissiveIntensity: 0.6 * callStyle.emissiveBoost,
      transparent: callStyle.opacity < 1, opacity: callStyle.opacity,
    }),
  );
  qNode.position.set(XS.actor + 1, ACTOR_BASE_Y + 5, 6);
  g.add(qNode);
  registerPickable(qNode, {
    title: "two-tower query q = tw_Wg(feat)",
    badge: "actor",
    body: `<p>64-d query produced from the 256-d actor features. Dot-producted against the projection of every card embedding to score CALL actions.</p>`,
  });
  g.add(makeGlowLine(adapter.position, qNode.position, 0x80ed99, live === "call" ? 0.5 : 0.15));

  const minCS = Math.min(...callableIds.map(cid => cardScores[cid]));
  const maxCS = Math.max(...callableIds.map(cid => cardScores[cid]));
  for (let i = 0; i < callable.length; i++) {
    const cid = callableIds[i];
    const s = cardScores[cid];
    const norm = (s - minCS) / Math.max(1e-6, maxCS - minCS);
    const x = XS.actor + 4 + i * 1.4;
    const cardGeom = new THREE.BoxGeometry(1.0, 1.5, 0.18);
    const ccolor = new THREE.Color().setHSL(0.33, 0.6, 0.3 + norm * 0.4);
    const cardMat = new THREE.MeshStandardMaterial({
      color: ccolor, emissive: ccolor,
      emissiveIntensity: (0.2 + norm * 0.7) * callStyle.emissiveBoost,
      roughness: 0.4,
      transparent: callStyle.opacity < 1, opacity: callStyle.opacity,
    });
    const card = new THREE.Mesh(cardGeom, cardMat);
    card.position.set(x, ACTOR_BASE_Y + 5, 6);
    g.add(card);
    const lab2 = makeLabel(callable[i], callStyle.labelColor, 0.4);
    lab2.position.set(x, ACTOR_BASE_Y + 6.5, 6);
    g.add(lab2);
    g.add(makeGlowLine(qNode.position, card.position, 0x80ed99,
      (0.15 + norm * 0.55) * (live === "call" ? 1 : 0.35)));
    registerPickable(card, {
      title: `CALL ${callable[i]}`,
      badge: "actor",
      kv: { "score": s.toFixed(2), "live here": live === "call" ? "yes" : "no (illustrative)" },
      body: `<p>Score = q · tw_We(card_emb[${cid}])ᵀ. Reusing the shared card embedding means the actor inherits everything the embedding has learned elsewhere.</p>`,
    });
  }

  // ----- (c) pointer scorer over 8 hand slots -----
  const ptrStyle = headStyle(live === "pointer");
  const pointerLab = makeLabel(
    `pointer scorer · 8 hand slots${ptrStyle.suffix}`, ptrStyle.labelColor, 0.5);
  pointerLab.position.set(XS.actor + 6, ACTOR_BASE_Y - 3, 6);
  g.add(pointerLab);

  const pNode = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0xb8f0a2, emissive: 0xb8f0a2,
      emissiveIntensity: 0.6 * ptrStyle.emissiveBoost,
      transparent: ptrStyle.opacity < 1, opacity: ptrStyle.opacity,
    }),
  );
  pNode.position.set(XS.actor + 1, ACTOR_BASE_Y - 5, 6);
  g.add(pNode);
  registerPickable(pNode, {
    title: "pointer query (Bahdanau)",
    badge: "actor",
    body: `<p>For each hand slot: score = v · tanh( pointer_Wg(feat) + pointer_Wt(token) ). Same scorer drives bury / under / play.</p>`,
  });
  g.add(makeGlowLine(adapter.position, pNode.position, 0xb8f0a2, live === "pointer" ? 0.5 : 0.15));

  const slotScores = S.actor.slot_scores;
  const realSlots = handCardIds.map((cid, i) => ({ cid, i })).filter(s => s.cid !== 0);
  const minSlot = Math.min(...realSlots.map(s => slotScores[s.i]));
  const maxSlot = Math.max(...realSlots.map(s => slotScores[s.i]));
  for (let i = 0; i < 8; i++) {
    const x = XS.actor + 4 + i * 1.1;
    const cid = handCardIds[i];
    const isPad = cid === 0;
    const norm = isPad ? 0 : (slotScores[i] - minSlot) / Math.max(1e-6, maxSlot - minSlot);
    const cardGeom = new THREE.BoxGeometry(0.9, 1.3, 0.16);
    const ccolor = isPad ? new THREE.Color(0x223060)
                         : new THREE.Color().setHSL(0.32, 0.7, 0.25 + norm * 0.45);
    const cardMat = new THREE.MeshStandardMaterial({
      color: ccolor, emissive: ccolor,
      emissiveIntensity: (isPad ? 0.05 : (0.15 + norm * 0.6)) * ptrStyle.emissiveBoost,
      transparent: isPad || ptrStyle.opacity < 1,
      opacity: isPad ? 0.35 : ptrStyle.opacity,
      roughness: 0.45,
    });
    const card = new THREE.Mesh(cardGeom, cardMat);
    card.position.set(x, ACTOR_BASE_Y - 5, 6);
    g.add(card);
    const code = isPad ? "PAD" : (idToCode[cid] || `id${cid}`);
    const lab2 = makeLabel(code, isPad ? "#5d6790" : ptrStyle.labelColor, 0.4);
    lab2.position.set(x, ACTOR_BASE_Y - 3.5, 6);
    g.add(lab2);
    if (!isPad) {
      g.add(makeGlowLine(pNode.position, card.position, 0xb8f0a2,
        (0.15 + norm * 0.55) * (live === "pointer" ? 1 : 0.35)));
    }
    registerPickable(card, {
      title: isPad ? `slot ${i} · PAD` : `slot ${i} · ${code}`,
      badge: "actor",
      kv: { "score": isPad ? "—" : slotScores[i].toFixed(2) },
      body: isPad
        ? `<p>Empty hand slot. The pointer score is masked out before softmax.</p>`
        : `<p>Pointer slot-score is scattered into BURY ${code}, UNDER ${code}, PLAY ${code} action logits via precomputed maps.</p>`,
    });
  }

  return { adapter };
}

// ============================================================
// STAGE 9: OUTPUT · π(a | s) — generic top-K action bars
// ============================================================
function buildOutput() {
  const g = group("output");
  const lab = makeStageLabel("9 · OUTPUT · π(a | s)", "#ff6b6b");
  lab.position.set(XS.output, -9.7, 0);
  g.add(lab);

  const probs = S.actor.full_probs;
  const entries = S.actor.valid_action_indices
    .map(idx => ({ idx, name: ACTIONS[idx], prob: probs[idx] }))
    .sort((a, b) => b.prob - a.prob);
  const shown = entries.slice(0, 8);
  const hidden = entries.length - shown.length;

  const barSpacing = 3.4;
  const z0 = -((shown.length - 1) / 2) * barSpacing;
  const barObjs = [];
  for (let i = 0; i < shown.length; i++) {
    const e = shown[i];
    const chosen = e.name === S.sample.chosen_action;
    const h = 0.5 + e.prob * 10;
    const color = chosen ? 0x80ed99 : 0x8aa0e0;
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(2.4, h, 2.4),
      new THREE.MeshStandardMaterial({
        color, emissive: color, emissiveIntensity: 0.25 + e.prob * 0.5,
        metalness: 0.3, roughness: 0.4,
      }),
    );
    m.position.set(XS.output, h / 2, z0 + i * barSpacing);
    g.add(m);
    barObjs.push({ mesh: m, entry: e });
    const labOut = makeLabel(
      `${e.name}  ${(e.prob * 100).toFixed(1)}%${chosen ? " ✓" : ""}`,
      chosen ? "#dffbe6" : "#cdd9ff", 0.55);
    labOut.position.set(XS.output, h + 0.8, z0 + i * barSpacing);
    g.add(labOut);
    registerPickable(m, {
      title: `π(${e.name})`,
      badge: "output",
      kv: {
        "prob": e.prob.toFixed(4),
        "logit": S.actor.full_logits[e.idx].toFixed(3),
        "chosen": chosen ? "yes (argmax)" : "no",
      },
      body: `<p>Final action probability after masking illegal actions and applying softmax across all ${entries.length} legal actions of this decision.</p>`,
    });
  }
  if (hidden > 0) {
    const moreLab = makeLabel(`+ ${hidden} more legal actions`, "#8e9bd1", 0.45);
    moreLab.position.set(XS.output, 0.6, z0 + shown.length * barSpacing);
    g.add(moreLab);
  }

  // actor adapter → output bars
  const adapterPos = new THREE.Vector3(XS.actor - 4, 12, 8);
  for (const b of barObjs) {
    g.add(makeGlowLine(adapterPos, b.mesh.position, C.output, 0.2));
  }

  return { barObjs, entries };
}

// ============================================================
// STAGE 10: CRITIC
// ============================================================
function buildCritic() {
  const g = group("critic");
  const lab = makeStageLabel("10 · CRITIC · value + aux", "#ff9ec7");
  lab.position.set(XS.critic, -9.7, -18);
  g.add(lab);

  const CY = -12;

  const adapter = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 3.2, 1.6),
    new THREE.MeshStandardMaterial({
      color: 0xff9ec7, emissive: 0xff9ec7, emissiveIntensity: 0.35,
      metalness: 0.35, roughness: 0.4,
    }),
  );
  adapter.position.set(XS.critic - 4, CY, -8);
  g.add(adapter);
  const adapterLab = makeLabel("critic_adapter", "#ffd6e8", 0.5);
  adapterLab.position.set(XS.critic - 4, CY + 2.6, -8);
  g.add(adapterLab);
  registerPickable(adapter, {
    title: "critic_adapter",
    badge: "critic",
    body: `<p>LayerNorm → Linear(256→256) → SiLU. Feeds value + every auxiliary head — they all share gradients into the encoder.</p>`,
  });
  g.add(makeGlowLine(
    new THREE.Vector3(XS.features, 0, 0),
    adapter.position,
    C.share, 0.5,
  ));

  const heads = [
    { name: "V(s)",   val: S.critic.value.toFixed(3), color: 0xff9ec7, badge: "critic",
      body: `<p>State value used to compute advantages via GAE (γ=λ=0.95). PPO clipped value loss against returns.</p>` },
    { name: "win",    val: S.critic.win_prob.toFixed(3), color: 0xffd166, badge: "aux",
      body: `<p>P(this player wins). BCE loss · coefficient 0.05.</p>` },
    { name: "return", val: S.critic.return_pred.toFixed(3), color: 0xffd166, badge: "aux",
      body: `<p>Expected final scalar return (scale ≈ ±12). Smooth-L1 · coefficient 0.1.</p>` },
    { name: "secret", val: S.critic.secret_prob.toFixed(3), color: 0xffd166, badge: "aux",
      body: `<p>P(I am the secret partner). BCE · coefficient 0.1.</p>` },
    { name: "points", val: S.critic.points_pred.map(v => v.toFixed(1)).join(" / "), color: 0xffd166, badge: "aux",
      body: `<p>Per-seat final point totals (relative order). Smooth-L1 · coefficient 0.2.</p>` },
  ];
  for (let i = 0; i < heads.length; i++) {
    const h = heads[i];
    const xOff = i * 3.3;
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(1, 22, 16),
      new THREE.MeshStandardMaterial({
        color: h.color, emissive: h.color, emissiveIntensity: 0.45,
        metalness: 0.4, roughness: 0.35,
      }),
    );
    ball.position.set(XS.critic + xOff, CY, -4);
    g.add(ball);
    const l = makeLabel(`${h.name}`, "#ffd6e8", 0.5);
    l.position.set(XS.critic + xOff, CY + 1.6, -4);
    g.add(l);
    const v = makeLabel(`${h.val}`, "#fff", 0.5);
    v.position.set(XS.critic + xOff, CY - 1.6, -4);
    g.add(v);
    g.add(makeGlowLine(adapter.position, ball.position, h.color, 0.4));
    registerPickable(ball, {
      title: `${h.name}_head`,
      badge: h.badge,
      kv: { "value": h.val },
      body: h.body,
    });
  }

  // Trump-aux block: seen_trump_mask as a row of 14 cards lit by sigmoid prob
  const trumpLab = makeLabel("trump_aux · seen-mask (key–query over card embeddings)", "#ffe89c", 0.5);
  trumpLab.position.set(XS.critic + 8, CY - 5, -8);
  g.add(trumpLab);

  const seenProbs = S.critic.seen_trump_mask_probs;
  for (let i = 0; i < 14; i++) {
    const p = seenProbs[i];
    const x = XS.critic + i * 1.1;
    const card = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 1.3, 0.18),
      new THREE.MeshStandardMaterial({
        color: 0xffd166, emissive: 0xffd166, emissiveIntensity: 0.1 + p * 0.7,
        roughness: 0.4,
      }),
    );
    card.position.set(x, CY - 7.5, -8);
    g.add(card);
    const lab2 = makeLabel(trumpCardCodes[i], "#ffe89c", 0.35);
    lab2.position.set(x, CY - 6.3, -8);
    g.add(lab2);
    const lab3 = makeLabel(`${(p * 100).toFixed(0)}%`, "#fff7e0", 0.3);
    lab3.position.set(x, CY - 8.7, -8);
    g.add(lab3);
    registerPickable(card, {
      title: `seen_trump[${trumpCardCodes[i]}]`,
      badge: "aux",
      kv: { "P(seen)": p.toFixed(3) },
      body: `<p>Multi-label "have I seen / do I know this trump?" — built as q · (Wk(card_emb[trump]) + δ_per_trump)ᵀ. Reuses the shared card embedding.</p>`,
    });
  }

  const unseenLab = makeLabel(`unseen trump higher than my hand: ${(S.critic.unseen_higher_prob * 100).toFixed(0)}%`, "#ffe89c", 0.5);
  unseenLab.position.set(XS.critic + 8, CY - 10.5, -8);
  g.add(unseenLab);

  return { adapter };
}

function buildScene() {
  sceneRoot = new THREE.Group();
  sceneRoot.name = "sceneRoot";
  scene.add(sceneRoot);
  inputInfo = buildInputCards();
  embedInfo = buildEmbeddingTable();
  tokensInfo = buildTokens();
  attnInfo = buildAttentionRing();
  poolsInfo = buildPools();
  memInfo = buildMemory();
  featInfo = buildFeatures();
  actorInfo = buildActor();
  outputInfo = buildOutput();
  criticInfo = buildCritic();
  styleChords();
  styleConn();
}

// ============================================================

  if (S.sample.is_picker) return "the picker";
  if (S.sample.is_partner) return "the partner";
  return "a defender";
}
function topActionsHtml(k = 4) {
  return outputInfo.entries.slice(0, k)
    .map(e => `<b>${e.name}</b> ${(e.prob * 100).toFixed(1)}%`)
    .join(" · ");
}

// ============================================================
// Camera tween + tour controller
// ============================================================
const camState = {
  curPos: camera.position.clone(),
  curTarget: controls.target.clone(),
  tgtPos: camera.position.clone(),
  tgtTarget: controls.target.clone(),
  t: 1, // interpolation (>=1 means done)
  duration: 1500,
};
function tweenTo(pos, target, duration = 1500) {
  camState.curPos = camera.position.clone();
  camState.curTarget = controls.target.clone();
  camState.tgtPos = new THREE.Vector3(...pos);
  camState.tgtTarget = new THREE.Vector3(...target);
  camState.t = 0;
  camState.duration = duration;
  camState.startTime = performance.now();
}
function updateCameraTween() {
  if (camState.t >= 1) return;
  const elapsed = performance.now() - camState.startTime;
  let t = clamp(elapsed / camState.duration, 0, 1);
  // ease in-out cubic
  const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  camera.position.lerpVectors(camState.curPos, camState.tgtPos, e);
  controls.target.lerpVectors(camState.curTarget, camState.tgtTarget, e);
  camState.t = t;
}

let curStage = 0;
const ZOOM_OUT = 1.6; // >1 frames more of each stage; 1 = original distances
const els = {
  stage: document.getElementById("i-stage"),
  title: document.getElementById("i-title"),
  body: document.getElementById("i-body"),
  meta: document.getElementById("i-meta"),
  sLabel: document.getElementById("s-label"),
  sCounter: document.getElementById("s-counter"),
  sBar: document.getElementById("s-bar"),
};
function showStage(i, moveCamera = true) {
  curStage = clamp(i, 0, STAGES.length - 1);
  const s = STAGES[curStage];
  els.stage.textContent = `${curStage + 1} / ${STAGES.length} · ${s.label} · ${S.label.toLowerCase()}`;
  els.title.innerHTML = `<span class="badge b-${s.badge}">${s.badge}</span> ${s.title}`;
  els.body.innerHTML = s.body();
  els.meta.textContent = "";
  els.sLabel.textContent = s.title;
  els.sCounter.textContent = `${curStage + 1} / ${STAGES.length}`;
  els.sBar.style.width = `${((curStage + 1) / STAGES.length) * 100}%`;
  navItems.forEach((b, idx) => b.classList.toggle("active", idx === curStage));
  if (navItems[curStage]) navItems[curStage].scrollIntoView({ block: "nearest" });
  if (moveCamera) {
    // Pull the camera back along its view direction so more of each stage fits.
    const tgt = new THREE.Vector3(...s.cam.target);
    const pos = new THREE.Vector3(...s.cam.pos).sub(tgt).multiplyScalar(ZOOM_OUT).add(tgt);
    tweenTo([pos.x, pos.y, pos.z], s.cam.target);
  }
}

// Clickable stage navigator — jump straight to any stage and read its description.
const navEl = document.getElementById("stage-nav");
navEl.innerHTML = '<div class="nav-head">Stages · click to jump</div>';
const navItems = STAGES.map((s, i) => {
  const b = document.createElement("button");
  b.className = "nav-item";
  b.innerHTML = `<span class="dot b-${s.badge}"></span><span>${s.title}</span>`;
  b.addEventListener("click", () => { stopTour(); showStage(i); });
  navEl.appendChild(b);
  return b;
});

// ============================================================
// Scenario selector
// ============================================================
const scenBar = document.getElementById("scenario-bar");
scenBar.innerHTML = '<span class="scen-head">Decision</span>';
const scenButtons = DATA.scenarios.map((sc, i) => {
  const b = document.createElement("button");
  b.textContent = sc.label;
  b.addEventListener("click", () => switchScenario(i));
  scenBar.appendChild(b);
  return b;
});
function switchScenario(i) {
  if (i === scenIdx) return;
  stopTour();
  setScenarioData(i);
  scenButtons.forEach((b, bi) => b.classList.toggle("active", bi === i));
  disposeScene();
  buildScene();
  // Refresh the current stage's text (and reframe its camera) for the new data.
  showStage(curStage);
}

// ============================================================
// Tour playback
// ============================================================
let playing = false;
let timer = null;
const speed = document.getElementById("speed");
function nextStage() {
  if (curStage + 1 >= STAGES.length) return false;
  showStage(curStage + 1);
  return true;
}
function startTour() {
  if (playing) return;
  playing = true;
  document.getElementById("btn-play").textContent = "⏸ Pause";
  const tick = () => {
    if (!playing) return;
    if (!nextStage()) { stopTour(); return; }
    timer = setTimeout(tick, parseInt(speed.value, 10));
  };
  timer = setTimeout(tick, parseInt(speed.value, 10));
}
function stopTour() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
  document.getElementById("btn-play").textContent = "▶ Play tour";
}
document.getElementById("btn-play").addEventListener("click", () => playing ? stopTour() : startTour());
document.getElementById("btn-prev").addEventListener("click", () => { stopTour(); showStage(curStage - 1); });
document.getElementById("btn-next").addEventListener("click", () => { stopTour(); showStage(curStage + 1); });
document.getElementById("btn-reset").addEventListener("click", () => { stopTour(); showStage(0); });
document.getElementById("chk-emphasis").addEventListener("change", (e) => {
  emphasize = e.target.checked;
  styleChords();
  styleConn();
});
document.getElementById("chk-rotate").addEventListener("change", (e) => {
  controls.autoRotate = e.target.checked;
  controls.autoRotateSpeed = 0.6;
});

// ============================================================
// Picking (click + hover tooltip)
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById("tooltip");
let hovered = null;

function setHovered(obj) {
  if (hovered === obj) return;
  hovered = obj;
  if (obj && obj.userData.pickInfo) {
    const info = obj.userData.pickInfo;
    let txt = info.title;
    if (info.kv) {
      for (const [k, v] of Object.entries(info.kv)) {
        txt += `\n${k}: ${v}`;
      }
    }
    tooltip.textContent = txt;
    tooltip.style.display = "block";
  } else {
    tooltip.style.display = "none";
  }
}
renderer.domElement.addEventListener("mousemove", (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = e.clientX + "px";
  tooltip.style.top = e.clientY + "px";
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(PICKABLES, false);
  setHovered(hits.length ? hits[0].object : null);
});
renderer.domElement.addEventListener("click", (e) => {
  if (!hovered) return;
  const info = hovered.userData.pickInfo;
  if (!info) return;
  els.stage.textContent = "selection";
  els.title.innerHTML = `<span class="badge b-${info.badge}">${info.badge}</span> ${info.title}`;
  let kvHtml = "";
  if (info.kv) {
    kvHtml = `<div class="kv">${Object.entries(info.kv).map(([k, v]) => `<div class="k">${k}</div><div class="v">${v}</div>`).join("")}</div>`;
  }
  els.body.innerHTML = kvHtml + (info.body || "");
});

// ============================================================
// Resize + render loop
// ============================================================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Pulse animation: subtle scale breathing on the "active" chord lines, etc.
let pulseT = 0;
function animate(now) {
  requestAnimationFrame(animate);
  controls.update();
  updateCameraTween();
  pulseT = (now || 0) * 0.001;
  // Gentle pulse on attention chords proportional to weight
  const breath = 0.6 + Math.sin(pulseT * 1.3) * 0.4;
  for (const c of attnInfo.chordLines) {
    if (!c.mesh.visible) continue;
    c.mesh.material.opacity = Math.min(1, c.baseOpacity * (0.7 + breath * 0.4));
  }
  renderer.render(scene, camera);
}

// ============================================================
// Boot
// ============================================================
buildScene();
scenButtons[0].classList.add("active");
showStage(0);
requestAnimationFrame(animate);
</script>
