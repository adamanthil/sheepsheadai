<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sheepshead AI · Landmark Variations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    #root { width: 100%; height: 100%; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="landmark-variants.jsx"></script>
  <script type="text/babel">
    function App() {
      const W = 770, H = 860;
      return (
        <DesignCanvas title="Sheepshead AI · Landmark / Hero variations" subtitle="The left panel of the home page — exploring how the wordmark and the cards share space.">
          <DCSection id="ref" title="Reference" subtitle="What we have today, for comparison.">
            <DCArtboard id="a" label="A · Current — cards over wordmark" width={W} height={H}><HeroA_Current /></DCArtboard>
          </DCSection>

          <DCSection id="alts" title="Alternatives" subtitle="Cards stay decorative, but the word ‘Sheepshead’ reads cleanly.">
            <DCArtboard id="b" label="B · Masthead band" width={W} height={H}><HeroB_Masthead /></DCArtboard>
            <DCArtboard id="c" label="C · Monogram drop-card" width={W} height={H}><HeroC_DropCard /></DCArtboard>
            <DCArtboard id="d" label="D · Corner flourish" width={W} height={H}><HeroD_Corner /></DCArtboard>
            <DCArtboard id="f" label="F · Side rail" width={W} height={H}><HeroF_SideRail /></DCArtboard>
            <DCArtboard id="e" label="E · Type only (ghost ♣)" width={W} height={H}><HeroE_TypeOnly /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
