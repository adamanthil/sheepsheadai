<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sheepshead AI · Hero Tuning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Libre+Caslon+Display&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Zilla+Slab:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    #root { width: 100%; height: 100%; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="hero-tune.jsx"></script>
  <script type="text/babel">
    const W = 770, H = 860;
    function App() {
      return (
        <DesignCanvas title="Sheepshead AI · Hero tuning" subtitle="Same original layout — tuning where the cards sit, and how the wordmark is set.">
          <DCSection id="cards" title="Card placement" subtitle="Original wordmark. Cards lowered so they stop covering the ‘a’ and ‘d’. Still overlapping, just politely.">
            <DCArtboard id="c0" label="Current — top 80" width={W} height={H}><HeroPanel cardTop={80} /></DCArtboard>
            <DCArtboard id="c1" label="Nudged — top 132" width={W} height={H}><HeroPanel cardTop={132} /></DCArtboard>
            <DCArtboard id="c2" label="Lower — top 168" width={W} height={H}><HeroPanel cardTop={168} /></DCArtboard>
            <DCArtboard id="c3" label="Lower + cascade arrangement" width={W} height={H}><HeroPanel cardTop={150} cardLayout="cascade" /></DCArtboard>
          </DCSection>

          <DCSection id="type" title="Wordmark treatments" subtitle="Different fonts and text treatments. Cards held at the ‘nudged’ position so you can compare type fairly.">
            <DCArtboard id="t0" label="A · Instrument Serif (current)" width={W} height={H}><HeroPanel wordmark="og" cardTop={150} /></DCArtboard>
            <DCArtboard id="t1" label="B · Inline AI accent — one line" width={W} height={H}><HeroPanel wordmark="inline" cardTop={150} /></DCArtboard>
            <DCArtboard id="t2" label="C · Libre Caslon — broadsheet" width={W} height={H}><HeroPanel wordmark="caslon" cardTop={150} /></DCArtboard>
            <DCArtboard id="t3" label="D · Bodoni — Didone masthead" width={W} height={H}><HeroPanel wordmark="didone" cardTop={150} /></DCArtboard>
            <DCArtboard id="t4" label="E · Zilla Slab — tavern slab" width={W} height={H}><HeroPanel wordmark="slab" cardTop={150} /></DCArtboard>
            <DCArtboard id="t5" label="F · Mono product tag" width={W} height={H}><HeroPanel wordmark="monotag" cardTop={150} /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
