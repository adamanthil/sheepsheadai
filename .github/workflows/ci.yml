name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      # Not used by the smoke tests yet; API-flow tests (Phase 4) run against it.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: sheepshead
          POSTGRES_PASSWORD: sheepshead
          POSTGRES_DB: sheepshead
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sheepshead"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # Python 3.14 comes from requires-python in pyproject.toml; the server
      # code uses PEP 758 syntax, so older interpreters cannot parse it.
      - run: uv sync --extra server --extra dev
      - run: uv run ruff check app/server
      - run: uv run python -m compileall -q app/server
      # Apply migrations to the service container (exercises graphile-migrate)
      # so the API-flow tests run against the real schema.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
        working-directory: app/db
      - run: npx graphile-migrate migrate
        working-directory: app/db
        env:
          DATABASE_URL: postgres://sheepshead:sheepshead@localhost:5432/sheepshead
      - run: uv run pytest app/server/tests -q
        env:
          TEST_DATABASE_URL: postgres://sheepshead:sheepshead@localhost:5432/sheepshead
      # The committed OpenAPI schema (and the TS types generated from it)
      # must match the live server schemas.
      - run: uv run python app/scripts/export_openapi.py
      - run: git diff --exit-code app/web/openapi.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npm run gen:api
      - run: git diff --exit-code lib/api.gen.ts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: ""
