name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      # Not used by the smoke tests yet; API-flow tests (Phase 4) run against it.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: sheepshead
          POSTGRES_PASSWORD: sheepshead
          POSTGRES_DB: sheepshead
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sheepshead"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # Python 3.14 comes from requires-python in pyproject.toml; the server
      # code uses PEP 758 syntax, so older interpreters cannot parse it.
      - run: uv sync --extra server --extra dev
      - run: uv run ruff check server
      - run: uv run python -m compileall -q server
      - run: uv run pytest server/tests -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: ""
